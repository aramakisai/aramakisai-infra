---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: mailserver-restic-secret
  namespace: prod
  annotations:
    argocd.argoproj.io/sync-options: Replace=true
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: mailserver-restic-secret
    creationPolicy: Owner
    template:
      engineVersion: v2
      mergePolicy: Replace
      data:
        RESTIC_REPOSITORY: "{{ .RESTIC_REPOSITORY_BASE }}/mailserver"
        RESTIC_PASSWORD: "{{ .MAILSERVER_RESTIC_PASSWORD }}"
        AWS_ACCESS_KEY_ID: "{{ .HETZNER_OS_ACCESS_KEY_ID }}"
        AWS_SECRET_ACCESS_KEY: "{{ .HETZNER_OS_SECRET_ACCESS_KEY }}"
  data:
    - secretKey: RESTIC_REPOSITORY_BASE
      remoteRef:
        key: RESTIC_REPOSITORY_BASE
    - secretKey: MAILSERVER_RESTIC_PASSWORD
      remoteRef:
        key: MAILSERVER_RESTIC_PASSWORD
    - secretKey: HETZNER_OS_ACCESS_KEY_ID
      remoteRef:
        key: HETZNER_OS_ACCESS_KEY_ID
    - secretKey: HETZNER_OS_SECRET_ACCESS_KEY
      remoteRef:
        key: HETZNER_OS_SECRET_ACCESS_KEY
