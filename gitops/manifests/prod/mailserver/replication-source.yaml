---
apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: mailserver-backup
  namespace: prod
spec:
  # B2 Application Key がトランザクションキャップに到達したため一時停止中。
  # B2 ダッシュボードでキャップを引き上げ後、paused を false に戻すこと。
  paused: true
  sourcePVC: mailserver-data
  trigger:
    schedule: "0 */6 * * *"
  restic:
    pruneIntervalDays: 7
    repository: mailserver-restic-secret
    retain:
      hourly: 12
      daily: 7
    copyMethod: Direct
    moverSecurityContext:
      runAsUser: 0
      runAsGroup: 0
      fsGroup: 0
