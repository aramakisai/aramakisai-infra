---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mailserver
  namespace: prod
  labels:
    app: mailserver
  annotations:
    secret.reloader.stakater.com/reload: "mail-tls,mailserver-secrets,dovecot-oauth2-config"
    configmap.reloader.stakater.com/reload: "mailserver-config"
spec:
  serviceName: mailserver
  replicas: 1
  selector:
    matchLabels:
      app: mailserver
  template:
    metadata:
      labels:
        app: mailserver
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      terminationGracePeriodSeconds: 30
      nodeSelector:
        kubernetes.io/hostname: prod-node-1
      containers:
        - name: mailserver
          image: mailserver/docker-mailserver:14.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: smtp
              containerPort: 25
            - name: submission
              containerPort: 587
            - name: smtps
              containerPort: 465
            - name: imap
              containerPort: 143
            - name: imaps
              containerPort: 993
          env:
            - name: OVERRIDE_HOSTNAME
              value: "mail.aramakisai.com"
            - name: TLS_LEVEL
              value: "modern"
            # LDAP 認証構成
            - name: LDAP_ENABLED
              value: "1"
            - name: ACCOUNT_PROVISIONER
              value: "LDAP"
            - name: LDAP_SERVER_HOST
              value: "ldap://authentik-ldap-outpost.prod.svc.cluster.local"
            - name: LDAP_SEARCH_BASE
              value: "dc=ldap,dc=goauthentik,dc=io"
            - name: LDAP_BIND_DN
              value: "cn=mailserver-service,ou=users,dc=ldap,dc=goauthentik,dc=io"
            - name: LDAP_BIND_PW
              valueFrom:
                secretKeyRef:
                  name: mailserver-secrets
                  key: LDAP_BIND_PASSWORD
            # mailListAddress=true: ML専用Userのみを配送先候補にする (個人メール受信廃止)
            - name: LDAP_QUERY_FILTER_USER
              value: "(&(objectClass=inetOrgPerson)(mail=%s)(ak-active=true)(mailListAddress=true))"
            - name: LDAP_QUERY_FILTER_ALIAS
              value: "(&(objectClass=inetOrgPerson)(mailAlias=%s)(ak-active=true))"
            # ak-active はグループエントリには存在しないため、グループでは
            # mail 属性のみでフィルタする (ユーザーと違いグループに有効/無効の概念はない)
            # mailListMigrated=true が設定されたグループ (新方式へ移行済み) は
            # fan-out 展開の対象から除外する
            - name: LDAP_QUERY_FILTER_GROUP
              value: "(&(objectClass=group)(mail=%s)(!(mailListMigrated=true)))"
            # 2026-06-29: ML メールアドレスと同一メールを持つ別 LDAP エントリが存在し、
            # Dovecot userdb が複数マッチで TEMPFAIL を返していた。
            # mailListAddress=true を追加して ML 専用ユーザーに一意に絞り込む。
            - name: DOVECOT_USER_FILTER
              value: "(&(objectClass=inetOrgPerson)(mail=%u)(ak-active=true)(mailListAddress=true))"
            - name: DOVECOT_PASS_FILTER
              value: "(&(objectClass=inetOrgPerson)(mail=%u)(ak-active=true)(mailListAddress=true))"
            # 送信者なりすまし防止: MLアドレスをFromに使える送信者をグループメンバーに限定する
            # 2026-06-23 hotfix: SENDERSフィルタを設定すると docker-mailserver の
            # 仕様上 USER/ALIAS/GROUP フィルタの自動OR結合が無効化される
            # (SENDERSフィルタが唯一の送信者認可チェックになる)。元の値は
            # objectClass=group限定だったため、システム通知用の noreply も含め
            # 個人ユーザーからの送信が一切できず、SMTP認証成功後に Postfix が
            # 553 5.7.1 Sender address rejected: not owned by user で全件拒否
            # していた。個人ユーザーのメール送受信は方針として禁止のため、
            # 例外は noreply (cn=noreply) のみに限定して許可する
            # (他の個人ユーザーには広げない)。
            # 2026-06-26: Roundcube OAuth2 で email claim を ML グループの mail 属性に
            # 変更したため、SASL ユーザー名が ML 専用 User のメールアドレスになる。
            # このため ML 専用 User (mailListAddress=true) 自身も送信者として許可する
            # (groups の member 展開結果に ML 専用 User は含まれないため)。
            - name: LDAP_QUERY_FILTER_SENDERS
              value: "(|(&(objectClass=group)(mail=%s))(&(objectClass=inetOrgPerson)(mail=%s)(mailListAddress=true))(&(objectClass=inetOrgPerson)(mail=%s)(cn=noreply)))"
            - name: SPOOF_PROTECTION
              value: "1"
            # auth_bind=yes: Dovecot が LDAP に直接バインドしてユーザー認証 (PLAIN auth)
            - name: DOVECOT_AUTH_BIND
              value: "yes"
            # Authentik LDAP は mailUidNumber/mailGidNumber/mailHomeDirectory を持たないため
            # UID/GID に docker(5000) を使い、メールパスを静的に指定する
            # acl_groups は LDAP user_attrs に含めない。
            # oauth2 passdb は introspection レスポンスのフィールドを自動転送しないため、
            # dovecot-oauth2.conf.ext の pass_attrs で introspection の "userdb_acl_groups"
            # クレームを passdb extra field にマップする (dovecot-oauth2-external-secret.yaml 参照)。
            # passdb extra の "userdb_xxx" → userdb フィールド "xxx" の Dovecot 規約により
            # acl_groups へ反映される。%{passdb:xxx} は LDAP user_attrs では展開されないため不可。
            # 2026-06-26: auth_username_format 削除により %d がユーザーの入力ドメイン (gmail.com 等)
            # に展開されるようになった。メールボックスは aramakisai.com 配下に統一しているため
            # %d の代わりに静的に aramakisai.com を指定する。
            # 2026-06-28: 全属性静的値のため Dovecot が LDAP に attrs=[] (全属性要求) を送り、
            # Authentik outpost が ml-admin の mailAlias multi-value 属性をシリアライズ失敗して
            # 空応答を返す → Dovecot userdb TEMPFAIL → admin@ 宛 451 エラー。
            # mail=_ldap_check を先頭に追加し attrs=["mail"] を強制することで回避する。
            - name: DOVECOT_USER_ATTRS
              value: "mail=_ldap_check,=uid=5000,=gid=5000,=home=/var/mail/aramakisai.com/%n,=mail=maildir:/var/mail/aramakisai.com/%n"
            # Roundcube OAuth2 クライアントシークレット (OAUTHBEARER introspection 用)
            - name: MAIL_OAUTH2_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: mailserver-secrets
                  key: MAIL_OAUTH2_CLIENT_SECRET
            # SMTP 直接配送 (2026-07-01: Resend リレー廃止)
            # DEFAULT_RELAY_HOST 未設定 → Postfix が宛先ドメインの MX へ直接配送する
            # セキュリティ・スパム設定
            - name: ENABLE_FAIL2BAN
              value: "1"
            - name: ENABLE_RSPAMD
              value: "1"
            - name: ENABLE_CLAMAV
              value: "0"
            # Rspamd有効時の公式推奨構成: Amavisと機能が重複するため無効化しメモリを削減する
            - name: ENABLE_AMAVIS
              value: "0"
            # TLS 設定 (cert-manager 証明書マウント位置の指定)
            - name: SSL_TYPE
              value: "manual"
            - name: SSL_CERT_PATH
              value: "/etc/dms/tls-secret/tls.crt"
            - name: SSL_KEY_PATH
              value: "/etc/dms/tls-secret/tls.key"
          resources:
            # ENABLE_AMAVIS=0 ロールアウト後、26時間の実トラフィックで安定して
            # 424Mi (kubectl top) を実測。requestは実測値に小さめのマージンを乗せ、
            # limitはrspamd等のスパイクに備え約1.8倍の余裕を持たせる。
            requests:
              cpu: "200m"
              memory: "448Mi"
            limits:
              cpu: "1000m"
              memory: "768Mi"
          volumeMounts:
            - name: data
              mountPath: /var/mail
            - name: dms-config
              mountPath: /tmp/docker-mailserver/postfix-main.cf
              subPath: postfix-main.cf
              readOnly: true
            - name: dms-config
              mountPath: /tmp/docker-mailserver/dovecot.cf
              subPath: dovecot.cf
              readOnly: true
            - name: dms-config
              mountPath: /etc/dovecot/conf.d/auth-ldap.conf.ext
              subPath: auth-ldap.conf.ext
              readOnly: true
            - name: dms-config
              mountPath: /etc/dovecot/conf.d/05-acl-plugin.conf
              subPath: 05-acl-plugin.conf
              readOnly: true
            - name: dms-config
              mountPath: /tmp/docker-mailserver/ldap-groups.cf
              subPath: ldap-groups.cf
              readOnly: true
            # ldap-senders.cf は DMS が標準サポートしない override 対象のため、
            # user-patches.sh (DMS公式拡張フック) 内で直接生成する (configmap.yaml参照)
            - name: dms-config
              mountPath: /tmp/docker-mailserver/user-patches.sh
              subPath: user-patches.sh
              readOnly: true
            - name: dovecot-oauth2
              mountPath: /etc/dovecot/dovecot-oauth2.conf.ext
              subPath: dovecot-oauth2.conf.ext
              readOnly: true
            - name: tls
              mountPath: /etc/dms/tls-secret
              readOnly: true
            - name: dkim-keys
              mountPath: /tmp/docker-mailserver/opendkim/keys
              readOnly: true
            - name: dms-config
              mountPath: /tmp/docker-mailserver/opendkim/KeyTable
              subPath: opendkim-keytable
              readOnly: true
            - name: dms-config
              mountPath: /tmp/docker-mailserver/opendkim/SigningTable
              subPath: opendkim-signingtable
              readOnly: true
            - name: dms-config
              mountPath: /tmp/docker-mailserver/opendkim/TrustedHosts
              subPath: opendkim-trustedhosts
              readOnly: true
            - name: dms-config
              mountPath: /tmp/docker-mailserver/rspamd/override.d/worker-proxy.inc
              subPath: rspamd-worker-proxy.inc
              readOnly: true
            - name: dms-config
              mountPath: /tmp/docker-mailserver/rspamd/override.d/worker-controller.inc
              subPath: rspamd-worker-controller.inc
              readOnly: true
          livenessProbe:
            tcpSocket:
              port: 25
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            tcpSocket:
              port: 25
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: mailserver-data
        - name: dms-config
          configMap:
            name: mailserver-config
            items:
              - key: postfix-main.cf
                path: postfix-main.cf
              - key: dovecot.cf
                path: dovecot.cf
              - key: auth-ldap.conf.ext
                path: auth-ldap.conf.ext
              - key: 05-acl-plugin.conf
                path: 05-acl-plugin.conf
              - key: ldap-groups.cf
                path: ldap-groups.cf
              - key: user-patches.sh
                path: user-patches.sh
              - key: opendkim-keytable
                path: opendkim-keytable
              - key: opendkim-signingtable
                path: opendkim-signingtable
              - key: opendkim-trustedhosts
                path: opendkim-trustedhosts
              - key: rspamd-worker-proxy.inc
                path: rspamd-worker-proxy.inc
              - key: rspamd-worker-controller.inc
                path: rspamd-worker-controller.inc
        - name: dovecot-oauth2
          secret:
            secretName: dovecot-oauth2-config
        - name: tls
          secret:
            secretName: mail-tls
        - name: dkim-keys
          secret:
            defaultMode: 420
            optional: true
            secretName: mailserver-dkim
            items:
              - key: dkim-key
                path: aramakisai.com/mail.private
