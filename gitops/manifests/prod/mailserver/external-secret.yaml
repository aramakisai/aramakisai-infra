---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: mailserver-secrets
  namespace: prod
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: mailserver-secrets
    creationPolicy: Owner
  data:
    # LDAP bind用トークン
    - secretKey: AUTHENTIK_LDAP_OUTPOST_TOKEN
      remoteRef:
        key: AUTHENTIK_LDAP_OUTPOST_TOKEN
    # Resend SMTP リレー用 API キー
    - secretKey: RESEND_API_KEY
      remoteRef:
        key: RESEND_API_KEY
