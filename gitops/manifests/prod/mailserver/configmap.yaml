---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mailserver-config
  namespace: prod
data:
  # Postfix 設定オーバーライド:
  # virtual_mailbox_domains から LDAP lookup を除外 (query_filter が空で Operations error になるため)
  # /etc/postfix/vhost に aramakisai.com が静的に書かれているのでそれだけで十分
  postfix-main.cf: |
    virtual_mailbox_domains = /etc/postfix/vhost
  # LDAP passdb オーバーライド:
  # result_failure = continue により、LDAP 認証失敗時に oauth2 passdb へ fallthrough させる
  # (OAUTHBEARER を使う Roundcube が LDAP bind 失敗後に oauth2 passdb で認証できるようにする)
  auth-ldap.conf.ext: |
    passdb {
      driver = ldap
      args = /etc/dovecot/dovecot-ldap.conf.ext
      result_failure = continue
      result_internalfail = continue
    }
    userdb {
      driver = ldap
      args = /etc/dovecot/dovecot-ldap.conf.ext
    }
  # Dovecot 認証設定オーバーライド
  dovecot.cf: |
    auth_mechanisms = plain login oauthbearer xoauth2

    # OAUTHBEARER: Authentik introspection endpoint でトークン検証 (ファイル参照)
    passdb {
      driver = oauth2
      mechanisms = oauthbearer xoauth2
      args = /etc/dovecot/dovecot-oauth2.conf.ext
    }
