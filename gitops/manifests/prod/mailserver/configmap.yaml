---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mailserver-config
  namespace: prod
data:
  # Postfix 設定オーバーライド:
  # virtual_mailbox_domains から LDAP lookup を除外 (query_filter が空で Operations error になるため)
  # /etc/postfix/vhost に aramakisai.com が静的に書かれているのでそれだけで十分
  postfix-main.cf: |
    virtual_mailbox_domains = /etc/postfix/vhost
  # LDAP passdb オーバーライド:
  # mechanisms = plain login により、OAUTHBEARER では LDAP を試みない。
  # OAUTHBEARER の場合は oauth2 passdb のみを使用する。
  # LDAP bind を OAUTHBEARER トークンで試みると Authentik のレピュテーションスコアが下がり
  # mailserver-service の bind も遅延するため、virtual_alias_maps lookup がタイムアウトする。
  auth-ldap.conf.ext: |
    passdb {
      driver = ldap
      args = /etc/dovecot/dovecot-ldap.conf.ext
      mechanisms = plain login
      result_failure = continue
      result_internalfail = continue
    }
    userdb {
      driver = ldap
      args = /etc/dovecot/dovecot-ldap.conf.ext
    }
  # Dovecot ACL plugin の有効化 (mail_plugins への acl 追加):
  # DMS の dovecot.cf 相当 (下の dovecot.cf キー) は /etc/dovecot/local.conf として
  # !include conf.d/*.conf の後に読み込まれる。一方 conf.d/15-lda.conf や
  # conf.d/20-imap.conf は protocol lda/imap { mail_plugins = $mail_plugins } を
  # 既に明示宣言しており、Dovecotはその時点の(acl追加前の)グローバル値で確定させてしまうため、
  # local.conf側でグローバルmail_pluginsを変更してもIMAP/LDA向けには反映されない
  # (doveconf -nで実機確認済み、protocol imap側が空のまま)。
  # そのため、acl追加分のみ conf.d/*.conf より前に読まれるファイル名 (05-) で別途注入する。
  05-acl-plugin.conf: |
    mail_plugins = $mail_plugins acl
  # Dovecot 認証設定オーバーライド
  dovecot.cf: |
    auth_mechanisms = plain login oauthbearer xoauth2

    # OAUTHBEARER: Authentik introspection endpoint でトークン検証 (ファイル参照)
    passdb {
      driver = oauth2
      mechanisms = oauthbearer xoauth2
      args = /etc/dovecot/dovecot-oauth2.conf.ext
    }

    plugin {
      acl = vfile
      # acl_shared_dict: Dovecot が共有メールボックスの ACL 情報をキャッシュするための辞書。
      # 設定しないと "Mailbox not found from dovecot-acl-list" エラーが発生し、
      # 共有メールボックスが LIST に表示されない (acl_lookup_dict not enabled)。
      # /var/mail/aramakisai.com/ は docker:docker (0777) 所有で書込可能。
      acl_shared_dict = file:/var/mail/aramakisai.com/.acl_shared_dict
    }

    # 既定の inbox (private) namespace は separator 未指定で Maildir 既定の '.' を使う。
    # 一方で下の shared namespace 群は separator = '/' を指定しているため、
    # Dovecot の "All list=yes namespaces must use the same separator" 制約に抵触し、
    # 共有メールボックスへのアクセス・doveadm mailbox 操作が一切できない (タスク3.2で発覚)。
    # inbox namespace の separator も '/' に揃えて解消する (既存個人メールボックスはネスト
    # フォルダを持たないフラット構成のため、IMAP 区切り文字変更の影響は無い)。
    namespace inbox {
      inbox = yes
      separator = /
    }

    # ML 7件分の共有メールボックスを静的に定義する (acl_shared_dict は不使用、件数固定のため)
    # INDEX は /var/indexes ではなく /var/mail/.indexes 配下に置く: /var はルート所有 (0755) で
    # dovecot 実効 uid 5000 が mkdir できず "Permission denied" で Shared 名前空間が一切開けない
    # (タスク4.1で発覚)。メール PVC のルート /var/mail は 0777 docker 所有で書込可能なため、
    # ここに共有 index を置く。DMS は全ユーザー単一 uid 5000 のため共有 index で問題ない。
    #
    # subscriptions = no + list = children: 共有メールボックスの LIST 可視性を ACL で
    # fail-closed に制御する (Req 2.2)。
    #
    # list = yes は子の有無に関わらず namespace prefix を常に LIST へ出すため、アクセス権の
    # ない部署も \Noselect ノードとして全ユーザーに名前が漏れる (実機確認)。一方 list = children は
    # 「ユーザーが LIST 可能な子メールボックスを持つ namespace のみ表示」する。Dovecot vfile ACL は
    # 子に dovecot-acl が無ければ親 (= 部署ルート) の ACL を継承するため、子メールボックスの可視性も
    # group= マッチ (acl_groups) で決まる。結果:
    #   - 部署メンバー (acl_groups=<dept>): 自部署の子のみ可視 → 自部署のみ LIST に出る
    #   - リーダー (acl_groups=leader,...): 全部署が group=leader を継承するため全部署の子が可視
    #     → 全部署が LIST に出る (実機確認: 会計のみユーザーは pr の子を一切 LIST できない)
    # acl_groups は oauth2 introspection の userdb_acl_groups 経由で注入される
    # (dovecot-oauth2-external-secret.yaml の pass_attrs 参照)。
    #
    # 前提: list = children のゲートには各部署 maildir に最低1つの子メールボックスが必要。
    # 受信専用で一度もクライアント接続していない部署は子が無く LIST に出ないため、
    # acl-postsync-job.yaml が全部署に標準サブフォルダ (Drafts/Sent/Junk/Trash) を冪等作成する。
    # 部署受信トレイ (maildir ルート) は "Shared/<dept>" 自体を SELECT してアクセスする。
    # subscriptions = no は Roundcube 側 imap_force_list=true で補い、購読不要で表示させる。
    namespace {
      type = shared
      separator = /
      prefix = Shared/planning/
      location = maildir:/var/mail/aramakisai.com/planning:INDEX=/var/mail/.indexes/aramakisai.com/planning
      subscriptions = no
      list = children
    }
    namespace {
      type = shared
      separator = /
      prefix = Shared/accounting/
      location = maildir:/var/mail/aramakisai.com/accounting:INDEX=/var/mail/.indexes/aramakisai.com/accounting
      subscriptions = no
      list = children
    }
    namespace {
      type = shared
      separator = /
      prefix = Shared/booth/
      location = maildir:/var/mail/aramakisai.com/booth:INDEX=/var/mail/.indexes/aramakisai.com/booth
      subscriptions = no
      list = children
    }
    namespace {
      type = shared
      separator = /
      prefix = Shared/stage/
      location = maildir:/var/mail/aramakisai.com/stage:INDEX=/var/mail/.indexes/aramakisai.com/stage
      subscriptions = no
      list = children
    }
    namespace {
      type = shared
      separator = /
      prefix = Shared/pr/
      location = maildir:/var/mail/aramakisai.com/pr:INDEX=/var/mail/.indexes/aramakisai.com/pr
      subscriptions = no
      list = children
    }
    namespace {
      type = shared
      separator = /
      prefix = Shared/admin/
      location = maildir:/var/mail/aramakisai.com/admin:INDEX=/var/mail/.indexes/aramakisai.com/admin
      subscriptions = no
      list = children
    }
    namespace {
      type = shared
      separator = /
      prefix = Shared/general-affairs/
      location = maildir:/var/mail/aramakisai.com/general-affairs:INDEX=/var/mail/.indexes/aramakisai.com/general-affairs
      subscriptions = no
      list = children
    }
    namespace {
      type = shared
      separator = /
      prefix = Shared/noreply/
      location = maildir:/var/mail/aramakisai.com/noreply:INDEX=/var/mail/.indexes/aramakisai.com/noreply
      subscriptions = no
      list = children
    }
  # Postfix LDAP グループマップ オーバーライド (メーリングリスト用):
  # DMS が自動生成する ldap-groups.cf は result_attribute=mail のみのため、
  # マッチしたグループ自身の mail (= 検索キーと同じ) が返るだけでメンバーに展開されない。
  # special_result_attribute=member でメンバー DN を取得し、leaf_result_attribute=mail で
  # 各メンバーの mail 属性に展開する。result_attribute は空にすることで、
  # マッチしたグループ自身の mail (検索キーと同一アドレス) が結果に混入し
  # 「グループ自身宛の配送が宛先不明でバウンスする」問題を回避する。
  # timeout=30: special_result_attribute による複数回の LDAP ラウンドトリップが
  # デフォルトの 10 秒を超えることがあり、"map lookup problem ... try again later"
  # でメッセージが受理されず消失することがあるため延長する。
  # bind/bind_dn/bind_pw/query_filter/search_base/server_host/start_tls/version は
  # LDAP_* 環境変数から _replace_by_env_in_file により自動置換される (DMS ldap.sh)。
  ldap-groups.cf: |
    bind = yes
    bind_dn =
    bind_pw =
    query_filter =
    result_attribute =
    leaf_result_attribute = mail
    search_base =
    server_host =
    special_result_attribute = member
    start_tls = no
    timeout = 30
    version = 3
  # 送信者なりすまし防止 (LDAP_QUERY_FILTER_SENDERS / SPOOF_PROTECTION 用) の最終ファイルを
  # DMS公式の拡張フック (user-patches.sh、_setup完了後に実行) で生成する。
  # DMSのldap.shは/tmp/docker-mailserver/ldap-{users,groups,aliases,domains}.cfのみを
  # /etc/postfix/へコピーする実装でsendersは対象外、かつ/etc/postfix/ldap-senders.cfへの
  # 直接マウントもConfigMapボリュームがread-onlyのため後続のldap.shによる
  # _replace_by_env_in_file (sed -i) が失敗する (いずれも実機確認済み、
  # research.md「Phase 0実装時の発見」参照)。そのため _setup 完了後に呼ばれる
  # user-patches.sh で、ldap-groups.cf と同じ member 展開パターン
  # (special_result_attribute=member / leaf_result_attribute=mail / timeout=30) を持つ
  # ldap-senders.cf を直接生成する。mailListMigrated の値は一切参照しないため、
  # fan-out の移行状態に関係なく全MLで送信制限が機能する。
  user-patches.sh: |
    #!/bin/bash
    cat > /etc/postfix/ldap-senders.cf <<INNEREOF
    bind = yes
    bind_dn = ${LDAP_BIND_DN}
    bind_pw = ${LDAP_BIND_PW}
    query_filter = ${LDAP_QUERY_FILTER_SENDERS}
    result_attribute =
    leaf_result_attribute = mail
    search_base = ${LDAP_SEARCH_BASE}
    server_host = ${LDAP_SERVER_HOST}
    special_result_attribute = member
    start_tls = no
    timeout = 30
    version = 3
    INNEREOF
