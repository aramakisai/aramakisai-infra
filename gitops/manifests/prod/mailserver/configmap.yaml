---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mailserver-config
  namespace: prod
data:
  # Postfix 設定オーバーライド:
  # virtual_mailbox_domains から LDAP lookup を除外 (query_filter が空で Operations error になるため)
  # /etc/postfix/vhost に aramakisai.com が静的に書かれているのでそれだけで十分
  postfix-main.cf: |
    virtual_mailbox_domains = /etc/postfix/vhost
  # LDAP passdb オーバーライド:
  # mechanisms = plain login により、OAUTHBEARER では LDAP を試みない。
  # OAUTHBEARER の場合は oauth2 passdb のみを使用する。
  # LDAP bind を OAUTHBEARER トークンで試みると Authentik のレピュテーションスコアが下がり
  # mailserver-service の bind も遅延するため、virtual_alias_maps lookup がタイムアウトする。
  auth-ldap.conf.ext: |
    passdb {
      driver = ldap
      args = /etc/dovecot/dovecot-ldap.conf.ext
      mechanisms = plain login
      result_failure = continue
      result_internalfail = continue
    }
    userdb {
      driver = ldap
      args = /etc/dovecot/dovecot-ldap.conf.ext
    }
  # Dovecot 認証設定オーバーライド
  dovecot.cf: |
    auth_mechanisms = plain login oauthbearer xoauth2

    # OAUTHBEARER: Authentik introspection endpoint でトークン検証 (ファイル参照)
    passdb {
      driver = oauth2
      mechanisms = oauthbearer xoauth2
      args = /etc/dovecot/dovecot-oauth2.conf.ext
    }

    # ユーザー名のみでのIMAP/SMTP AUTHログインを許可 (フルアドレス入力にも後方互換)
    auth_username_format = %n@aramakisai.com  # confidential:allow

    # ML共有メールボックスへのアクセス制御 (LDAP memberOf → acl_groups → ACLファイル)
    mail_plugins = $mail_plugins acl

    # conf.d/20-imap.conf が local.conf (本ファイル) より先に読み込まれ、
    # protocol imap 用の mail_plugins をその時点の値 (acl追加前) で確定させてしまうため、
    # 上記のグローバル変更だけではIMAP接続にaclプラグインが反映されない。
    # protocol ブロックを本ファイル側でも明示的に再宣言し、最新の $mail_plugins を反映させる。
    protocol imap {
      mail_plugins = $mail_plugins
    }

    plugin {
      acl = vfile
    }

    # ML 7件分の共有メールボックスを静的に定義する (acl_shared_dict は不使用、件数固定のため)
    namespace {
      type = shared
      separator = /
      prefix = Shared/planning/
      location = maildir:/var/mail/aramakisai.com/planning:INDEX=/var/indexes/aramakisai.com/planning
      subscriptions = no
    }
    namespace {
      type = shared
      separator = /
      prefix = Shared/accounting/
      location = maildir:/var/mail/aramakisai.com/accounting:INDEX=/var/indexes/aramakisai.com/accounting
      subscriptions = no
    }
    namespace {
      type = shared
      separator = /
      prefix = Shared/booth/
      location = maildir:/var/mail/aramakisai.com/booth:INDEX=/var/indexes/aramakisai.com/booth
      subscriptions = no
    }
    namespace {
      type = shared
      separator = /
      prefix = Shared/stage/
      location = maildir:/var/mail/aramakisai.com/stage:INDEX=/var/indexes/aramakisai.com/stage
      subscriptions = no
    }
    namespace {
      type = shared
      separator = /
      prefix = Shared/pr/
      location = maildir:/var/mail/aramakisai.com/pr:INDEX=/var/indexes/aramakisai.com/pr
      subscriptions = no
    }
    namespace {
      type = shared
      separator = /
      prefix = Shared/admin/
      location = maildir:/var/mail/aramakisai.com/admin:INDEX=/var/indexes/aramakisai.com/admin
      subscriptions = no
    }
    namespace {
      type = shared
      separator = /
      prefix = Shared/general-affairs/
      location = maildir:/var/mail/aramakisai.com/general-affairs:INDEX=/var/indexes/aramakisai.com/general-affairs
      subscriptions = no
    }
  # Postfix LDAP グループマップ オーバーライド (メーリングリスト用):
  # DMS が自動生成する ldap-groups.cf は result_attribute=mail のみのため、
  # マッチしたグループ自身の mail (= 検索キーと同じ) が返るだけでメンバーに展開されない。
  # special_result_attribute=member でメンバー DN を取得し、leaf_result_attribute=mail で
  # 各メンバーの mail 属性に展開する。result_attribute は空にすることで、
  # マッチしたグループ自身の mail (検索キーと同一アドレス) が結果に混入し
  # 「グループ自身宛の配送が宛先不明でバウンスする」問題を回避する。
  # timeout=30: special_result_attribute による複数回の LDAP ラウンドトリップが
  # デフォルトの 10 秒を超えることがあり、"map lookup problem ... try again later"
  # でメッセージが受理されず消失することがあるため延長する。
  # bind/bind_dn/bind_pw/query_filter/search_base/server_host/start_tls/version は
  # LDAP_* 環境変数から _replace_by_env_in_file により自動置換される (DMS ldap.sh)。
  ldap-groups.cf: |
    bind = yes
    bind_dn =
    bind_pw =
    query_filter =
    result_attribute =
    leaf_result_attribute = mail
    search_base =
    server_host =
    special_result_attribute = member
    start_tls = no
    timeout = 30
    version = 3
  # 送信者なりすまし防止 (LDAP_QUERY_FILTER_SENDERS / SPOOF_PROTECTION 用):
  # ldap-groups.cf と同じ member 展開パターンを流用し、smtpd_sender_login_maps の
  # 照合先 (Fromアドレス→許可された個人アドレス一覧) を返す。
  # mailListMigrated の値は一切参照しないため、fan-out の移行状態に関係なく
  # 全MLで送信制限が機能する。
  ldap-senders.cf: |
    bind = yes
    bind_dn =
    bind_pw =
    query_filter =
    result_attribute =
    leaf_result_attribute = mail
    search_base =
    server_host =
    special_result_attribute = member
    start_tls = no
    timeout = 30
    version = 3
