---
# Dovecot oauth2 設定ファイルを Secret として生成する ExternalSecret
# client_secret を含むため ConfigMap ではなく Secret にする
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: dovecot-oauth2-config
  namespace: prod
  annotations:
    argocd.argoproj.io/sync-options: Replace=true
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: dovecot-oauth2-config
    creationPolicy: Owner
    template:
      data:
        dovecot-oauth2.conf.ext: |
          introspection_url = https://idp.aramakisai.com/application/o/introspect/
          introspection_mode = post
          client_id = aramakisai-mail
          client_secret = {{ .MAIL_OAUTH2_CLIENT_SECRET }}
          username_attribute = email
          active_attribute = active
          active_value = true
          # oauth2 passdb は introspection レスポンスのフィールドを自動転送しない。
          # pass_attrs (passdb static 形式) で明示マップする必要がある。
          # introspection レスポンスの "userdb_acl_groups" クレーム (Authentik の
          # mail_acl_groups scope が返す) を passdb extra field "userdb_acl_groups" に設定すると、
          # Dovecot の "passdb extra field userdb_xxx → userdb field xxx" 規約により
          # userdb field acl_groups へ反映され、Dovecot ACL plugin の group= マッチが機能する。
          # %{oauth2:<name>} は introspection レスポンスの該当フィールドを参照する。
          pass_attrs = userdb_acl_groups=%{oauth2:userdb_acl_groups}
  data:
    - secretKey: MAIL_OAUTH2_CLIENT_SECRET
      remoteRef:
        key: MAIL_OAUTH2_CLIENT_SECRET
