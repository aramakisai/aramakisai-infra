---
# Dovecot oauth2 設定ファイルを Secret として生成する ExternalSecret
# client_secret を含むため ConfigMap ではなく Secret にする
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: dovecot-oauth2-config
  namespace: prod
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: dovecot-oauth2-config
    creationPolicy: Owner
    template:
      data:
        dovecot-oauth2.conf.ext: |
          introspection_url = https://idp.aramakisai.com/application/o/roundcube/introspect/
          introspection_mode = post
          client_id = aramakisai-mail
          client_secret = {{ .ROUNDCUBE_OAUTH2_CLIENT_SECRET }}
          username_attribute = email
          active_attribute = active
          active_value = true
  data:
    - secretKey: ROUNDCUBE_OAUTH2_CLIENT_SECRET
      remoteRef:
        key: ROUNDCUBE_OAUTH2_CLIENT_SECRET
