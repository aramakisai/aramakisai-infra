---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: directus
  namespace: prod
  labels:
    app: directus
  annotations:
    secret.reloader.stakater.com/reload: "directus-secrets"
spec:
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: directus
  template:
    metadata:
      labels:
        app: directus
    spec:
      containers:
        - name: directus
          image: directus/directus:11.1.2
          ports:
            - containerPort: 8055
          envFrom:
            - secretRef:
                name: directus-secrets   # ESO が生成
          env:
            # DB 接続 (CNPG が提供する RW エンドポイント)
            - name: DB_CLIENT
              value: pg
            - name: DB_HOST
              value: directus-db-rw.prod.svc.cluster.local
            - name: DB_PORT
              value: "5432"
            - name: DB_DATABASE
              value: directus
            - name: DB_USER
              value: directus
            # DB_PASSWORD は directus-secrets Secret から注入
            - name: PUBLIC_URL
              value: https://api.aramakisai.com
            - name: STORAGE_LOCATIONS
              value: s3
            - name: STORAGE_S3_DRIVER
              value: s3
            - name: STORAGE_S3_BUCKET
              value: aramakisai-backups
            - name: STORAGE_S3_ROOT
              value: directus-uploads
            - name: STORAGE_S3_ENDPOINT
              value: https://fsn1.your-objectstorage.com
            - name: STORAGE_S3_REGION
              value: fsn1
            - name: STORAGE_S3_FORCE_PATH_STYLE
              value: "false"
            - name: EMAIL_TRANSPORT
              value: smtp
            - name: EMAIL_FROM
              value: noreply@aramakisai.com # confidential:allow
            - name: EMAIL_SMTP_HOST
              value: mail.aramakisai.com
            - name: EMAIL_SMTP_PORT
              value: "587"
            # フルアドレス必須 (Dovecot mail=%u 検索、bae2c4c で domain 補完撤去のため)
            - name: EMAIL_SMTP_USER
              value: noreply@aramakisai.com # confidential:allow
            - name: EMAIL_SMTP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: directus-secrets
                  key: EMAIL_SMTP_PASSWORD
            - name: CORS_ENABLED
              value: "true"
            - name: CORS_ORIGIN
              value: "https://aramakisai.com"
            # Authentik OIDC SSO
            - name: AUTH_PROVIDERS
              value: authentik
            - name: AUTH_AUTHENTIK_DRIVER
              value: openid
            - name: AUTH_AUTHENTIK_CLIENT_ID
              value: directus-prod
            - name: AUTH_AUTHENTIK_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: directus-secrets
                  key: AUTH_AUTHENTIK_CLIENT_SECRET
            - name: AUTH_AUTHENTIK_ISSUER_URL
              value: https://idp.aramakisai.com/application/o/directus-prod/
            - name: AUTH_AUTHENTIK_IDENTIFIER_KEY
              value: email
            - name: AUTH_AUTHENTIK_ALLOW_PUBLIC_REGISTRATION
              value: "true"
            # デフォルトscope (openid profile email) には groups が含まれないため、
            # ROLE_MAPPING を設定していても groups クレーム自体がトークンに乗らず
            # role 更新処理がスキップされていた (2026-07-18 発覚)。
            - name: AUTH_AUTHENTIK_SCOPE
              value: "openid profile email groups"
            # AUTH_AUTHENTIK_ROLE_CLAIM は Directus に存在しない変数名だったため、
            # groups クレームが一切 role に変換されず role=null で全ユーザーが作成される
            # バグを生んでいた (2026-07-18 発覚)。正しくは GROUP_CLAIM_NAME (デフォルト groups) +
            # ROLE_MAPPING の組み合わせ。role id は migrations-configmap.yaml の
            # EXECUTIVE_ROLE_ID / STUDENT_EXHIBITOR_ROLE_ID と一致させること。
            # json: プレフィックス必須。無いとカンマ区切り値として配列扱いされ
            # roleMap が意図通り機能しない (2026-07-18 発覚、二重の設定ミス)。
            - name: AUTH_AUTHENTIK_ROLE_MAPPING
              value: 'json:{"executive": "65869bf1-6622-4bab-8aec-785d0db2c32a", "student_exhibitor": "49c93d00-c61f-418b-a1db-5118260f4667"}'
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              # sharp画像変換・CSV import/export等でスパイクするため512Miを維持
              # (384Miへ削減検討したが、これらの操作はCloudflareキャッシュ対象外でcgroup単位OOMリスクがあるため見送り)
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /server/info
              port: 8055
            initialDelaySeconds: 15
            periodSeconds: 10
