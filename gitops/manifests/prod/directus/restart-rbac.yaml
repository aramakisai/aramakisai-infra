---
# schema-apply Job 完了後に directus Deployment を rollout restart するための
# ServiceAccount と RBAC。directus Deployment に対する get, patch のみを許可する最小権限。
apiVersion: v1
kind: ServiceAccount
metadata:
  name: directus-restart
  namespace: prod
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: directus-restart
  namespace: prod
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    resourceNames: ["directus"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: directus-restart
  namespace: prod
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: directus-restart
subjects:
  - kind: ServiceAccount
    name: directus-restart
    namespace: prod
