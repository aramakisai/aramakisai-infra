---
# Directus 用 PostgreSQL クラスター (CloudNativePG)
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: directus-db
  namespace: prod
  annotations:
    cnpg.io/skipEmptyWalArchiveCheck: enabled
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:16.8

  postgresql:
    parameters:
      max_connections: "100"
      shared_buffers: "64MB"
      effective_cache_size: "128MB"
      work_mem: "4MB"
      wal_compression: "on"

  bootstrap:
    recovery:
      source: directus-db

  externalClusters:
    - name: directus-db
      barmanObjectStore:
        destinationPath: "s3://aramakisai-backups/cnpg/directus-db"
        endpointURL: "https://fsn1.your-objectstorage.com"
        serverName: directus-db
        s3Credentials:
          accessKeyId:
            name: hetzner-os-credentials
            key: ACCESS_KEY_ID
          secretAccessKey:
            name: hetzner-os-credentials
            key: SECRET_ACCESS_KEY
          region:
            name: hetzner-os-credentials
            key: REGION
        wal:
          compression: gzip
        data:
          compression: gzip

  backup:
    barmanObjectStore:
      destinationPath: "s3://aramakisai-backups/cnpg/directus-db"
      endpointURL: "https://fsn1.your-objectstorage.com"
      serverName: directus-db
      s3Credentials:
        accessKeyId:
          name: hetzner-os-credentials
          key: ACCESS_KEY_ID
        secretAccessKey:
          name: hetzner-os-credentials
          key: SECRET_ACCESS_KEY
        region:
          name: hetzner-os-credentials
          key: REGION
      wal:
        compression: gzip
      data:
        compression: gzip
    retentionPolicy: "3d"

  storage:
    size: 10Gi   # Directus はアセットを DB に保存するため authentik より大きめ

  resources:
    requests:
      memory: "256Mi"
      cpu: "250m"
    limits:
      # idle時実使用量は約60Miだが、barman-cloud-backup/wal-archiveの
      # バックアップ処理時にメモリスパイクするため256Miでは不足しOOM crash loopした
      # (2026-06-19)。512Miに戻す。
      memory: "512Mi"
      cpu: "500m"
