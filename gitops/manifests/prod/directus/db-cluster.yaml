---
# Directus 用 PostgreSQL クラスター (CloudNativePG)
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: directus-db
  namespace: prod
  annotations:
    # DR recovery 時に既存 WAL archive を継続して使うためチェックをスキップ
    cnpg.io/skipEmptyWalArchiveCheck: enabled
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:16.8

  postgresql:
    parameters:
      max_connections: "100"
      shared_buffers: "64MB"
      effective_cache_size: "128MB"
      work_mem: "4MB"

  # DR / 移行共通の recovery bootstrap
  # S3から最新バックアップをリストアする
  bootstrap:
    recovery:
      source: directus-db-source

  externalClusters:
    - name: directus-db-source
      barmanObjectStore:
        destinationPath: "s3://aramakisai-backups/cnpg/directus-db"
        endpointURL: "https://s3.us-west-004.backblazeb2.com"
        serverName: directus-db
        s3Credentials:
          accessKeyId:
            name: b2-credentials
            key: ACCESS_KEY_ID
          secretAccessKey:
            name: b2-credentials
            key: SECRET_ACCESS_KEY
        wal:
          compression: gzip

  backup:
    barmanObjectStore:
      destinationPath: "s3://aramakisai-backups/cnpg/directus-db"
      endpointURL: "https://s3.us-west-004.backblazeb2.com"
      serverName: directus-db
      s3Credentials:
        accessKeyId:
          name: b2-credentials
          key: ACCESS_KEY_ID
        secretAccessKey:
          name: b2-credentials
          key: SECRET_ACCESS_KEY
      wal:
        compression: gzip
      data:
        compression: gzip
    retentionPolicy: "7d"

  storage:
    size: 10Gi   # Directus はアセットを DB に保存するため authentik より大きめ

  resources:
    requests:
      memory: "256Mi"
      cpu: "250m"
    limits:
      memory: "512Mi"
      cpu: "500m"
