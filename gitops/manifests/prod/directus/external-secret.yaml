---
# Directus アプリケーション用シークレット
# Infisical の prod 環境から取得する
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: directus-secrets
  namespace: prod
  annotations:
    argocd.argoproj.io/sync-options: Replace=true
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: directus-secrets
    creationPolicy: Owner
  data:
    - secretKey: SECRET
      remoteRef:
        key: DIRECTUS_SECRET
    - secretKey: ADMIN_EMAIL
      remoteRef:
        key: DIRECTUS_ADMIN_EMAIL
    - secretKey: ADMIN_PASSWORD
      remoteRef:
        key: DIRECTUS_ADMIN_PASSWORD
    - secretKey: DB_PASSWORD
      remoteRef:
        key: DIRECTUS_DB_PASSWORD
    - secretKey: STORAGE_S3_KEY
      remoteRef:
        key: HETZNER_OS_ACCESS_KEY_ID
    - secretKey: STORAGE_S3_SECRET
      remoteRef:
        key: HETZNER_OS_SECRET_ACCESS_KEY
    # SMTP送信用パスワード (Authentikのnoreplyアカウントと同一キーを再利用)
    - secretKey: EMAIL_SMTP_PASSWORD
      remoteRef:
        key: NOREPLY_SMTP_PASSWORD
    # Authentik OIDC SSO
    - secretKey: AUTH_AUTHENTIK_CLIENT_SECRET
      remoteRef:
        key: DIRECTUS_PROD_OIDC_CLIENT_SECRET
---
# CloudNativePG Cluster 用 DB 認証情報
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: directus-db-credentials
  namespace: prod
  annotations:
    argocd.argoproj.io/sync-options: Replace=true
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: directus-db-credentials
    creationPolicy: Owner
    template:
      data:
        # CNPG が期待するキー形式
        username: "directus"
        password: "{{ .DIRECTUS_DB_PASSWORD }}"
  data:
    - secretKey: DIRECTUS_DB_PASSWORD
      remoteRef:
        key: DIRECTUS_DB_PASSWORD
