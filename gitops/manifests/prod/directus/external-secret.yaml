---
# Directus アプリケーション用シークレット
# Infisical の prod 環境から取得する
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: directus-secrets
  namespace: prod
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: directus-secrets
    creationPolicy: Owner
  data:
    - secretKey: SECRET
      remoteRef:
        key: DIRECTUS_SECRET
    - secretKey: ADMIN_EMAIL
      remoteRef:
        key: DIRECTUS_ADMIN_EMAIL
    - secretKey: ADMIN_PASSWORD
      remoteRef:
        key: DIRECTUS_ADMIN_PASSWORD
    - secretKey: DB_PASSWORD
      remoteRef:
        key: DIRECTUS_DB_PASSWORD
---
# CloudNativePG Cluster 用 DB 認証情報
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: directus-db-credentials
  namespace: prod
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: directus-db-credentials
    creationPolicy: Owner
    template:
      data:
        # CNPG が期待するキー形式
        username: "directus"
        password: "{{ .DIRECTUS_DB_PASSWORD }}"
  data:
    - secretKey: DIRECTUS_DB_PASSWORD
      remoteRef:
        key: DIRECTUS_DB_PASSWORD
