---
# CloudNativePG Cluster 用 DB 認証情報
# この Secret の username / password キーは、同ディレクトリの db-cluster.yaml にある
# bootstrap.initdb.secret.name (wikijs-db-credentials) から参照される
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: wikijs-db-credentials
  namespace: prod
  annotations:
    argocd.argoproj.io/sync-options: Replace=true
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: wikijs-db-credentials
    creationPolicy: Owner
    template:
      data:
        # CNPG が期待するキー形式
        username: "wikijs"
        password: "{{ .WIKIJS_DB_PASSWORD }}"
  data:
    - secretKey: WIKIJS_DB_PASSWORD
      remoteRef:
        key: WIKIJS_DB_PASSWORD
