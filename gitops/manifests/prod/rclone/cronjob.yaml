---
# Backblaze B2 → Google Drive 二次バックアップ同期 (毎日 04:00 UTC)
# CNPG 02:00 フルバックアップ完了後に実行する
apiVersion: batch/v1
kind: CronJob
metadata:
  name: rclone-gdrive-sync
  namespace: prod
spec:
  schedule: "0 4 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: rclone
              image: rclone/rclone:latest
              command:
                - /bin/sh
                - -c
                - |
                  echo "$SA_JSON" > /tmp/sa.json
                  rclone sync \
                    :s3,provider=Other,endpoint=$(S3_ENDPOINT),access_key_id=$(ACCESS_KEY_ID),secret_access_key=$(SECRET_ACCESS_KEY):aramakisai-backups \
                    :drive,service_account_file=/tmp/sa.json,root_folder_id=$(GDRIVE_FOLDER_ID): \
                    --transfers=4 \
                    --log-level=INFO
                  rm -f /tmp/sa.json
              env:
                - name: S3_ENDPOINT
                  value: "s3.us-west-004.backblazeb2.com"
              envFrom:
                - secretRef:
                    name: b2-credentials
                - secretRef:
                    name: rclone-gdrive-secret
              resources:
                requests:
                  memory: "128Mi"
                  cpu: "100m"
                limits:
                  memory: "256Mi"
                  cpu: "200m"
