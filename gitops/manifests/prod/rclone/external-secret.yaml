---
# Google Drive Service Account 認証情報 (rclone CronJob が参照)
# prod namespace に rclone-gdrive-secret Secret を展開する
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: rclone-gdrive-secret
  namespace: prod
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: rclone-gdrive-secret
    creationPolicy: Owner
  data:
    - secretKey: SA_JSON
      remoteRef:
        key: GOOGLE_SERVICE_ACCOUNT_JSON
      decodingStrategy: Base64
    - secretKey: GDRIVE_FOLDER_ID
      remoteRef:
        key: GDRIVE_FOLDER_ID
