---
# wikijs-auth-strategy UPSERT Job 成功後に wikijs Deployment を rollout restart するための
# ServiceAccount と RBAC。Wiki.js は起動時にのみ認証ストラテジー/グループデータを読み込むため、
# 新しい設定を適用するために再起動を行う。wikijs Deployment に対する get, patch のみを許可する最小権限。
apiVersion: v1
kind: ServiceAccount
metadata:
  name: wikijs-restart
  namespace: prod
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: wikijs-restart
  namespace: prod
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    resourceNames: ["wikijs"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: wikijs-restart
  namespace: prod
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: wikijs-restart
subjects:
  - kind: ServiceAccount
    name: wikijs-restart
    namespace: prod
