---
# Wiki.js データ用ストレージ (/wiki/data マウント、content/uploads/cache含む, requarks/wiki:2 イメージ)
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: wikijs-uploads
  namespace: prod
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 2Gi
