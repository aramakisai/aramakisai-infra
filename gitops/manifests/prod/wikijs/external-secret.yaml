---
# Wiki.js Deployment (DB_TYPE/DB_HOST/DB_PORT/DB_USER/DB_PASS/DB_NAME直接参照用のDB_PASS)
# および auth-strategy Job (OIDC用WIKIJS_OIDC_CLIENT_SECRET、スキーマガード失敗通知用DISCORD_OPS_WEBHOOK_URL)用シークレット
# Infisical の prod 環境から取得する
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: wikijs-secrets
  namespace: prod
  annotations:
    argocd.argoproj.io/sync-options: Replace=true
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: wikijs-secrets
    creationPolicy: Owner
  data:
    - secretKey: DB_PASS
      remoteRef:
        key: WIKIJS_DB_PASSWORD
    - secretKey: WIKIJS_OIDC_CLIENT_SECRET
      remoteRef:
        key: WIKIJS_OIDC_CLIENT_SECRET
    - secretKey: DISCORD_OPS_WEBHOOK_URL
      remoteRef:
        key: DISCORD_OPS_WEBHOOK_URL
