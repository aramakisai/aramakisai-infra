---
# Wiki.js Postgres DBへのAuthentik OIDC認証ストラテジーおよび2つのデフォルトグループの
# スキーマドリフトガード付き宣言的UPSERT用SQLを保持するConfigMap。
# (別構築の) ArgoCD PostSync hook Job である auth-strategy-job から読み取り専用でマウントされる。
apiVersion: v1
data:
  expected-columns.txt: |
    autoEnrollGroups,config,displayName,domainWhitelist,isEnabled,key,order,selfRegistration,strategyKey
  upsert.sql: |
    -- Wiki.js "authentication" テーブルへ Authentik OIDC ストラテジーを宣言的UPSERT
    -- key = 'authentik-oidc'。既存の 'local' 行(root管理者フォールバックログイン)には触れない。
    -- domainWhitelist/autoEnrollGroups は Wiki.js 側 `_.get(str.domainWhitelist, 'v', [])` の読み出し仕様に
    -- 合わせて {"v": [...]} 形式でラップする。
    INSERT INTO "authentication" (
      key, "isEnabled", config, "selfRegistration",
      "domainWhitelist", "autoEnrollGroups", "order", "strategyKey", "displayName"
    )
    VALUES (
      'authentik-oidc',
      true,
      jsonb_build_object(
        'clientId', 'wikijs',
        'clientSecret', :'oidc_client_secret',
        'authorizationURL', 'https://idp.aramakisai.com/application/o/authorize/',
        'tokenURL', 'https://idp.aramakisai.com/application/o/token/',
        'userInfoURL', 'https://idp.aramakisai.com/application/o/userinfo/',
        'issuer', 'https://idp.aramakisai.com/application/o/wikijs/',
        'emailClaim', 'email',
        'displayNameClaim', 'name',
        'mapGroups', true,
        'groupsClaim', 'groups'
      ),
      false,
      '{"v": []}'::jsonb,
      '{"v": []}'::jsonb,
      1,
      'oidc',
      'Authentik SSO'
    )
    ON CONFLICT (key) DO UPDATE SET
      "isEnabled" = EXCLUDED."isEnabled",
      config = EXCLUDED.config,
      "selfRegistration" = EXCLUDED."selfRegistration",
      "domainWhitelist" = EXCLUDED."domainWhitelist",
      "autoEnrollGroups" = EXCLUDED."autoEnrollGroups",
      "order" = EXCLUDED."order",
      "strategyKey" = EXCLUDED."strategyKey",
      "displayName" = EXCLUDED."displayName";

    -- Wiki.js "groups" テーブルへ Authentikグループ"管理者"/"リーダー"対応行を非破壊的に作成
    -- name列にUNIQUE制約がないためON CONFLICTは使えず、WHERE NOT EXISTSでINSERT-if-absentにする。
    -- 既存行がある場合は一切UPDATEしない(Admin UI経由の手動権限調整を尊重)。
    INSERT INTO "groups" (name, permissions, "pageRules", "isSystem", "createdAt", "updatedAt")
    SELECT '管理者', '["manage:system"]'::jsonb, '[]'::jsonb, false,
      to_char(now() at time zone 'utc', 'YYYY-MM-DD"T"HH24:MI:SS.MS"Z"'),
      to_char(now() at time zone 'utc', 'YYYY-MM-DD"T"HH24:MI:SS.MS"Z"')
    WHERE NOT EXISTS (SELECT 1 FROM "groups" WHERE name = '管理者');

    INSERT INTO "groups" (name, permissions, "pageRules", "isSystem", "createdAt", "updatedAt")
    SELECT 'リーダー', '["manage:system"]'::jsonb, '[]'::jsonb, false,
      to_char(now() at time zone 'utc', 'YYYY-MM-DD"T"HH24:MI:SS.MS"Z"'),
      to_char(now() at time zone 'utc', 'YYYY-MM-DD"T"HH24:MI:SS.MS"Z"')
    WHERE NOT EXISTS (SELECT 1 FROM "groups" WHERE name = 'リーダー');
  schema-guard-query.sql: |
    SELECT string_agg(column_name, ',' ORDER BY column_name) FROM information_schema.columns WHERE table_name = 'authentication';
kind: ConfigMap
metadata:
  name: wikijs-auth-strategy
  namespace: prod
