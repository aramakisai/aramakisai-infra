---
# wikijs-auth-strategy Job (sync-wave 0) が実行された後、新しい認証ストラテジーや
# グループ設定を反映させるために wikijs Deployment を rollout restart する。
# Wiki.js は起動時にのみこの設定を読み込むため、Job 完了後に再起動が必要となる。
# sync-wave: "1" に設定することで、ArgoCD が UPSERT Job (sync-wave 0) の成功を
# 待ってから再起動を行うように制御（ゲート）している。
apiVersion: batch/v1
kind: Job
metadata:
  name: wikijs-restart
  namespace: prod
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
    argocd.argoproj.io/sync-wave: "1"
spec:
  ttlSecondsAfterFinished: 3600
  backoffLimit: 2
  template:
    spec:
      serviceAccountName: wikijs-restart
      restartPolicy: OnFailure
      containers:
        - name: restart
          image: alpine/k8s:1.32.13
          command: ["kubectl", "-n", "prod", "rollout", "restart", "deployment/wikijs"]
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
