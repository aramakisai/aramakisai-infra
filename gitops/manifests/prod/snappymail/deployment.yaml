---
# Snappymail Webmail
#
# image バージョンは https://github.com/the-djmaze/snappymail/releases で確認して固定すること
# 更新手順: image タグを変更 → GitOps PR → ArgoCD が自動 sync
#
# 認証方式: Authentik OAuth2 のみ (login-authentik プラグイン)
#   - ログインフォームは非表示 (Admin → Login → "Allow users to login from any domain" = off)
#   - 認証は Authentik OAuth2 Authorization Code フロー
#   - IMAP/SMTP 接続は OAUTHBEARER SASL (Stalwart が Authentik OIDC で token を検証)
#
# Init Container が行うこと:
#   1. ConfigMap (snappymail-plugin-authentik) から index.php を読み込む
#   2. PVC 上の /var/lib/snappymail/_data_/plugins/login-authentik/ にコピー
#   ※ Snappymail Admin で "login-authentik" プラグインを有効化し
#      Client ID / Client Secret を設定すること (下部コメント参照)
#
# 初回セットアップ手順 (Admin → login-authentik プラグイン設定):
#   kubectl port-forward -n prod deploy/snappymail 8888:8888
#   → http://localhost:8888/?admin
#   CLIENT_ID=$(kubectl get secret snappymail-secrets -n prod \
#     -o jsonpath='{.data.SNAPPYMAIL_OAUTH2_CLIENT_ID}' | base64 -d)
#   CLIENT_SECRET=$(kubectl get secret snappymail-secrets -n prod \
#     -o jsonpath='{.data.SNAPPYMAIL_OAUTH2_CLIENT_SECRET}' | base64 -d)
#   → Extensions → login-authentik → Enable → Client ID / Client Secret を貼り付け
#   → Login → "Hide login form" → enabled
apiVersion: apps/v1
kind: Deployment
metadata:
  name: snappymail
  namespace: prod
  labels:
    app: snappymail
  annotations:
    # OAuth2 クレデンシャルが更新されたら自動再起動
    secret.reloader.stakater.com/reload: "snappymail-secrets"
    # プラグインが更新されたら自動再起動
    configmap.reloader.stakater.com/reload: "snappymail-plugin-authentik"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: snappymail
  template:
    metadata:
      labels:
        app: snappymail
    spec:
      initContainers:
        - name: install-authentik-plugin
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              # 1. プラグインのインストール
              PLUGIN_DIR="/data/_data_/plugins/login-authentik"
              mkdir -p "$PLUGIN_DIR"
              cp /plugin-src/index.php "$PLUGIN_DIR/index.php"
              echo "login-authentik plugin installed to $PLUGIN_DIR"

              # 2. 初期設定ディレクトリの作成
              CONFIGS_DIR="/data/_data_/_default_/configs"
              DOMAINS_DIR="/data/_data_/_default_/domains"
              mkdir -p "$CONFIGS_DIR" "$DOMAINS_DIR"

              # 3. plugin-login-authentik.ini の生成 (存在しない場合)
              if [ ! -f "$CONFIGS_DIR/plugin-login-authentik.ini" ]; then
                printf '%s\n' \
                  '[plugin]' \
                  "client_id = \"${SNAPPYMAIL_OAUTH2_CLIENT_ID}\"" \
                  "client_secret = \"${SNAPPYMAIL_OAUTH2_CLIENT_SECRET}\"" \
                  'authorize_uri = "https://idp.aramakisai.com/application/o/authorize/"' \
                  'token_uri = "https://idp.aramakisai.com/application/o/token/"' \
                  'userinfo_uri = "https://idp.aramakisai.com/application/o/userinfo/"' \
                  > "$CONFIGS_DIR/plugin-login-authentik.ini"
                echo "Generated plugin-login-authentik.ini"
              fi

              # 4. domains/aramakisai.com.json の生成 (存在しない場合)
              if [ ! -f "$DOMAINS_DIR/aramakisai.com.json" ]; then
                printf '%s\n' \
                  '{' \
                  '    "IMAP": {' \
                  '        "host": "stalwart-mail.prod.svc.cluster.local",' \
                  '        "port": 993,' \
                  '        "type": 1,' \
                  '        "timeout": 300,' \
                  '        "shortLogin": false,' \
                  '        "lowerLogin": true,' \
                  '        "sasl": [' \
                  '            "OAUTHBEARER",' \
                  '            "XOAUTH2",' \
                  '            "PLAIN",' \
                  '            "LOGIN"' \
                  '        ],' \
                  '        "ssl": {' \
                  '            "verify_peer": false,' \
                  '            "verify_peer_name": false,' \
                  '            "allow_self_signed": true,' \
                  '            "SNI_enabled": true,' \
                  '            "disable_compression": true,' \
                  '            "security_level": 1' \
                  '        }' \
                  '    },' \
                  '    "SMTP": {' \
                  '        "host": "stalwart-mail.prod.svc.cluster.local",' \
                  '        "port": 587,' \
                  '        "type": 2,' \
                  '        "timeout": 60,' \
                  '        "shortLogin": false,' \
                  '        "lowerLogin": true,' \
                  '        "sasl": [' \
                  '            "OAUTHBEARER",' \
                  '            "XOAUTH2",' \
                  '            "PLAIN",' \
                  '            "LOGIN"' \
                  '        ],' \
                  '        "ssl": {' \
                  '            "verify_peer": false,' \
                  '            "verify_peer_name": false,' \
                  '            "allow_self_signed": true,' \
                  '            "SNI_enabled": true,' \
                  '            "disable_compression": true,' \
                  '            "security_level": 1' \
                  '        },' \
                  '        "useAuth": true,' \
                  '        "setSender": false,' \
                  '        "usePhpMail": false' \
                  '    }' \
                  '}' \
                  > "$DOMAINS_DIR/aramakisai.com.json"
                echo "Generated domains/aramakisai.com.json"
              fi

              # 5. 所有者の修正 (www-data)
              chown -R 33:33 /data/_data_
          env:
            - name: SNAPPYMAIL_OAUTH2_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: snappymail-secrets
                  key: SNAPPYMAIL_OAUTH2_CLIENT_ID
            - name: SNAPPYMAIL_OAUTH2_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: snappymail-secrets
                  key: SNAPPYMAIL_OAUTH2_CLIENT_SECRET
          volumeMounts:
            - name: data
              mountPath: /data
            - name: plugin-src
              mountPath: /plugin-src
              readOnly: true
      containers:
        - name: snappymail
          image: djmaze/snappymail:v2.38.2
          lifecycle:
            postStart:
              exec:
                command:
                  - sh
                  - -c
                  - |
                    # application.ini 適用用のスクリプトファイルを一時生成 (Bourne shell での syntax error 回避)
                    printf '%s\n' \
                      'CONFIG_FILE="/var/lib/snappymail/_data_/_default_/configs/application.ini"' \
                      'i=1' \
                      'while [ $i -le 60 ]; do' \
                      '  if [ -f "$CONFIG_FILE" ]; then' \
                      '    echo "Found application.ini, applying GitOps configurations..."' \
                      '    sed -i "s/enable = Off/enable = On/" "$CONFIG_FILE"' \
                      '    sed -i "s/enabled_list.*/enabled_list = \"login-authentik\"/" "$CONFIG_FILE"' \
                      '    if ! grep -q "hide_login_form" "$CONFIG_FILE"; then' \
                      '      sed -i "/\\[login\\]/a hide_login_form = On" "$CONFIG_FILE"' \
                      '    else' \
                      '      sed -i "s/hide_login_form = .*/hide_login_form = On/" "$CONFIG_FILE"' \
                      '    fi' \
                      '    sed -i "s/default_domain.*/default_domain = \"aramakisai.com\"/" "$CONFIG_FILE"' \
                      '    NEW_HASH=`php -r '\''echo password_hash(getenv("SNAPPYMAIL_ADMIN_PASSWORD"), PASSWORD_BCRYPT);'\''`' \
                      '    if [ -n "$NEW_HASH" ]; then' \
                      '      sed -i "s|admin_password = \".*\"|admin_password = \"$NEW_HASH\"|" "$CONFIG_FILE"' \
                      '    fi' \
                      '    echo "GitOps configurations successfully applied to application.ini"' \
                      '    break' \
                      '  fi' \
                      '  sleep 1' \
                      '  i=`expr $i + 1`' \
                      'done' \
                      > /tmp/apply.sh
                    sh /tmp/apply.sh &
          ports:
            - name: http
              containerPort: 8888
          env:
            - name: SNAPPYMAIL_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: snappymail-secrets
                  key: SNAPPYMAIL_ADMIN_PASSWORD
          volumeMounts:
            - name: data
              mountPath: /var/lib/snappymail
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /
              port: 8888
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 8888
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: snappymail-data
        - name: plugin-src
          configMap:
            name: snappymail-plugin-authentik
