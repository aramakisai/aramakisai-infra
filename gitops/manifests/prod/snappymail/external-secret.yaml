---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: snappymail-secrets
  namespace: prod
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: snappymail-secrets
    creationPolicy: Owner
  data:
    - secretKey: SNAPPYMAIL_ADMIN_PASSWORD
      remoteRef:
        key: SNAPPYMAIL_ADMIN_PASSWORD
    # Authentik OAuth2 アプリ (snappymail) のクライアント認証情報
    # Authentik WebUI → Applications → Providers → Snappymail OAuth2 → Client ID / Secret
    - secretKey: SNAPPYMAIL_OAUTH2_CLIENT_ID
      remoteRef:
        key: SNAPPYMAIL_OAUTH2_CLIENT_ID
    - secretKey: SNAPPYMAIL_OAUTH2_CLIENT_SECRET
      remoteRef:
        key: SNAPPYMAIL_OAUTH2_CLIENT_SECRET
