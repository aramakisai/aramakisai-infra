---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: snappymail-secrets
  namespace: prod
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: snappymail-secrets
    creationPolicy: Owner
  data:
    - secretKey: SNAPPYMAIL_ADMIN_PASSWORD
      remoteRef:
        key: SNAPPYMAIL_ADMIN_PASSWORD
