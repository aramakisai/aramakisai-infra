---
# Snappymail — Authentik OAuth2 プラグイン (login-authentik)
#
# 役割:
#   Snappymail のログインフォームを廃止し、Authentik OAuth2 のみで認証する。
#   login-gmail プラグインと同じ仕組み:
#     1. ログイン時に Authentik の OAuth2 Authorization Code フローに誘導
#     2. コールバックで access_token / refresh_token を取得
#     3. Snappymail の IMAP/SMTP 接続に OAUTHBEARER (XOAUTH2) を使用
#     4. Stalwart が Authentik の OIDC discovery で token を検証
#
# ⚠️  Stalwart の active directory を authentik-oidc に変更すること
#     (LDAP のままでは XOAUTH2 が検証されず IMAP ログイン失敗)
#
# 適用後の Snappymail Admin 設定 (port-forward → http://localhost:8888/?admin):
#   Extensions → login-authentik → Enable
#   Extensions → login-authentik → Client ID: <Infisical: SNAPPYMAIL_OAUTH2_CLIENT_ID>
#   Extensions → login-authentik → Client Secret: <Infisical: SNAPPYMAIL_OAUTH2_CLIENT_SECRET>
#   Login → "Hide login form" → Enabled  (パスワードフォームを非表示にする)
apiVersion: v1
kind: ConfigMap
metadata:
  name: snappymail-plugin-authentik
  namespace: prod
data:
  index.php: |
    <?php
    /**
     * Snappymail plugin: login-authentik
     *
     * Authentik OAuth2 / OIDC によるログイン。
     * ログイン時に Authentik にリダイレクトし、取得した access_token を
     * IMAP/SMTP の OAUTHBEARER SASL メカニズムに渡す。
     *
     * Stalwart 側の設定:
     *   Directory authentik-oidc が active (Authentication.directoryId = "#authentik-oidc")
     *   Stalwart が Authentik の OIDC discovery で token を検証する。
     */

    use RainLoop\Model\MainAccount;
    use RainLoop\Providers\Storage\Enumerations\StorageType;

    class LoginAuthentikPlugin extends \RainLoop\Plugins\AbstractPlugin
    {
        const
            NAME        = 'Login Authentik OAuth2',
            VERSION     = '1.0',
            RELEASE     = '2026-05-29',
            REQUIRED    = '2.36.1',
            CATEGORY    = 'Login',
            LICENSE     = 'MIT',
            DESCRIPTION = 'Authentik OIDC/OAuth2 login for IMAP & SMTP using OAUTHBEARER';

        // Snappymail 内部での token 保存用プレフィックス
        const TOKENS_PREFIX = ':AUT:';

        public function Init(): void
        {
            $this->UseLangs(false);
            $this->addHook('imap.before-login', 'clientLogin');
            $this->addHook('smtp.before-login', 'clientLogin');
            $this->addHook('sieve.before-login', 'clientLogin');
            $this->addPartHook('LoginAuthentik', 'ServiceLoginAuthentik');
            $this->addHook('filter.http-paths', 'httpPaths');
        }

        public function configMapping(): array
        {
            return [
                \RainLoop\Plugins\Property::NewInstance('client_id')
                    ->SetLabel('Client ID')
                    ->SetType(\RainLoop\Enumerations\PluginPropertyType::STRING)
                    ->SetDefaultValue(''),

                \RainLoop\Plugins\Property::NewInstance('client_secret')
                    ->SetLabel('Client Secret')
                    ->SetType(\RainLoop\Enumerations\PluginPropertyType::STRING)
                    ->SetDefaultValue(''),

                \RainLoop\Plugins\Property::NewInstance('authorize_uri')
                    ->SetLabel('Authorize URI')
                    ->SetType(\RainLoop\Enumerations\PluginPropertyType::STRING)
                    ->SetDefaultValue('https://idp.aramakisai.com/application/o/authorize/'),

                \RainLoop\Plugins\Property::NewInstance('token_uri')
                    ->SetLabel('Token URI')
                    ->SetType(\RainLoop\Enumerations\PluginPropertyType::STRING)
                    ->SetDefaultValue('https://idp.aramakisai.com/application/o/token/'),

                \RainLoop\Plugins\Property::NewInstance('userinfo_uri')
                    ->SetLabel('Userinfo URI')
                    ->SetType(\RainLoop\Enumerations\PluginPropertyType::STRING)
                    ->SetDefaultValue('https://idp.aramakisai.com/application/o/userinfo/'),
            ];
        }

        /**
         * IMAP/SMTP/Sieve ログイン前フック。
         * パスワードが ":AUT:" プレフィックスを持つ場合、
         * access_token を取り出して OAUTHBEARER を優先させる。
         */
        public function clientLogin(
            \RainLoop\Model\Account $oAccount,
            \MailSo\Net\NetClient $oClient,
            \MailSo\Net\ConnectSettings $oSettings
        ): void {
            $sPassword  = $oSettings->passphrase;
            $iPrefixLen = strlen(static::TOKENS_PREFIX);

            if ($sPassword && static::TOKENS_PREFIX === substr($sPassword, 0, $iPrefixLen)) {
                $aTokens      = json_decode(substr($sPassword, $iPrefixLen), true);
                $sAccessToken = $aTokens['access_token'] ?? '';
            }

            if (!empty($sAccessToken)) {
                // access_token をそのまま passphrase に設定し、OAUTHBEARER を優先
                $oSettings->passphrase = $sAccessToken;
                array_unshift($oSettings->SASLMechanisms, 'OAUTHBEARER', 'XOAUTH2');
            }
        }

        /**
         * ?LoginAuthentik ルートのハンドラ。
         * code なし → Authentik の Authorization endpoint へリダイレクト
         * code あり → token 交換 → SSO ハッシュ生成 → ログイン
         */
        public function ServiceLoginAuthentik(): bool
        {
            $oActions = \RainLoop\Api::Actions();
            $oHttp    = $oActions->Http();
            $oHttp->ServerNoCache();

            // Snappymail のベース URI (コールバック後の戻り先)
            $sBaseUri    = preg_replace('/.LoginAuthentik.*$/D', '', $_SERVER['REQUEST_URI']);
            $sRedirectUri = $oHttp->GetFullUrl() . '?LoginAuthentik';

            try {
                // Authentik からエラーが返ってきた場合
                if (isset($_GET['error'])) {
                    throw new \RuntimeException(
                        'Authentik error: ' . htmlspecialchars($_GET['error'])
                    );
                }

                // --- Authorization Code コールバック ---
                if (isset($_GET['code'], $_GET['state']) && 'authentik_snappymail' === $_GET['state']) {
                    $aTokens = $this->exchangeCodeForTokens($_GET['code'], $sRedirectUri);
                    if (empty($aTokens['access_token'])) {
                        throw new \RuntimeException('Failed to obtain access_token from Authentik');
                    }

                    $sEmail = $this->getEmailFromToken($aTokens['access_token'], $aTokens);
                    if (!$sEmail) {
                        throw new \RuntimeException('Cannot determine email from token');
                    }

                    // Snappymail が IMAP ログイン時に使う "パスワード" として token を保存
                    $sTokenPassword = static::TOKENS_PREFIX . json_encode([
                        'access_token'  => $aTokens['access_token'],
                        'refresh_token' => $aTokens['refresh_token'] ?? '',
                    ]);

                    // SSO ハッシュを生成してリダイレクト (IMAP ログインを伴う)
                    $sHash = \RainLoop\Api::CreateUserSsoHash($sEmail, $sTokenPassword);
                    if ($sHash) {
                        $oActions->Location($sBaseUri . '?Sso&hash=' . $sHash);
                    } else {
                        throw new \RuntimeException('SSO hash generation failed — check IMAP/OAUTHBEARER config');
                    }
                    exit;
                }

                // --- Authorization Code フローを開始 ---
                $sAuthorizeUri = $this->Config()->Get('plugin', 'authorize_uri',
                    'https://idp.aramakisai.com/application/o/authorize/');
                $sClientId = $this->Config()->Get('plugin', 'client_id', '');

                if (!$sClientId) {
                    throw new \RuntimeException('login-authentik plugin: client_id is not configured');
                }

                $oActions->Location($sAuthorizeUri . '?' . http_build_query([
                    'client_id'             => $sClientId,
                    'response_type'         => 'code',
                    'scope'                 => 'openid email profile',
                    'state'                 => 'authentik_snappymail',
                    'redirect_uri'          => $sRedirectUri,
                    // PKCE (推奨だが省略版)
                ]));
                exit;

            } catch (\Exception $e) {
                // エラー画面に戻す
                \SnappyMail\Log::error('LoginAuthentik', $e->getMessage());
                $oActions->Location($sBaseUri . '?error=' . urlencode($e->getMessage()));
                exit;
            }

            return true;
        }

        /**
         * Authorization Code → access_token / refresh_token に交換
         */
        protected function exchangeCodeForTokens(string $sCode, string $sRedirectUri): array
        {
            $sTokenUri    = $this->Config()->Get('plugin', 'token_uri',
                'https://idp.aramakisai.com/application/o/token/');
            $sClientId    = $this->Config()->Get('plugin', 'client_id', '');
            $sClientSecret = $this->Config()->Get('plugin', 'client_secret', '');

            $ch = curl_init($sTokenUri);
            curl_setopt_array($ch, [
                CURLOPT_POST           => true,
                CURLOPT_RETURNTRANSFER => true,
                CURLOPT_POSTFIELDS     => http_build_query([
                    'grant_type'    => 'authorization_code',
                    'code'          => $sCode,
                    'redirect_uri'  => $sRedirectUri,
                    'client_id'     => $sClientId,
                    'client_secret' => $sClientSecret,
                ]),
                CURLOPT_HTTPHEADER     => ['Content-Type: application/x-www-form-urlencoded'],
            ]);
            $sResult = curl_exec($ch);
            $iCode   = curl_getinfo($ch, CURLINFO_HTTP_CODE);
            curl_close($ch);

            if (!$sResult || $iCode !== 200) {
                throw new \RuntimeException("Token endpoint returned HTTP {$iCode}");
            }

            return json_decode($sResult, true) ?: [];
        }

        /**
         * access_token (JWT) または userinfo endpoint からメールアドレスを取得
         */
        protected function getEmailFromToken(string $sAccessToken, array $aTokens): ?string
        {
            // 1. id_token から取得 (Authentik は id_token にも email を含む)
            if (!empty($aTokens['id_token'])) {
                $aParts = explode('.', $aTokens['id_token']);
                if (count($aParts) === 3) {
                    $aPayload = json_decode(
                        base64_decode(strtr($aParts[1], '-_', '+/')), true
                    );
                    if (!empty($aPayload['email'])) {
                        return $aPayload['email'];
                    }
                }
            }

            // 2. userinfo endpoint に問い合わせ
            $sUserinfoUri = $this->Config()->Get('plugin', 'userinfo_uri',
                'https://idp.aramakisai.com/application/o/userinfo/');

            $ch = curl_init($sUserinfoUri);
            curl_setopt_array($ch, [
                CURLOPT_RETURNTRANSFER => true,
                CURLOPT_HTTPHEADER     => ["Authorization: Bearer {$sAccessToken}"],
            ]);
            $sResult = curl_exec($ch);
            curl_close($ch);

            if ($sResult) {
                $aInfo = json_decode($sResult, true);
                return $aInfo['email'] ?? null;
            }

            return null;
        }

        // Sec-Fetch ポリシー緩和 (クロスサイトリダイレクトを許可)
        public function httpPaths(array $aPaths): void
        {
            if (!empty($aPaths[0]) && 'LoginAuthentik' === $aPaths[0]) {
                $oConfig = \RainLoop\Api::Config();
                $oConfig->Set('security', 'secfetch_allow',
                    trim($oConfig->Get('security', 'secfetch_allow', '') . ';site=cross-site', ';')
                );
            }
        }
    }
