---
# Stalwart Mail Server
# StatefulSet を使用: Pod identity の安定性がメールサーバーに必要
#
# image バージョンは stalwartlabs/mail-server の GitHub Releases で確認して固定すること
# https://github.com/stalwartlabs/mail-server/releases
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: stalwart
  namespace: prod
  labels:
    app: stalwart
spec:
  serviceName: stalwart-mail
  replicas: 1   # メールサーバーはシングルインスタンス推奨 (HA は複雑)
  selector:
    matchLabels:
      app: stalwart
  template:
    metadata:
      labels:
        app: stalwart
    spec:
      # prod-node-1 に固定:
      # hostNetwork = true のため Pod が稼働するノードの IP でのみ応答する。
      # DNS (mail.aramakisai.com) も prod-node-1 の IP 1 件のみを指定している。
      # PVC は ReadWriteOnce のため、スケジューラーも実質的にこのノードに固定される。
      nodeSelector:
        kubernetes.io/hostname: prod-node-1
      # hostNetwork: true — K3s + Cilium 環境では hostPort が機能しないため
      # Pod がホストのネットワーク名前空間を直接使用してポートを公開する
      hostNetwork: true
      # hostNetwork 使用時は DNS ポリシーを ClusterFirstWithHostNet に変更する
      # (デフォルトの ClusterFirst はホストネットワーク Pod では機能しない)
      dnsPolicy: ClusterFirstWithHostNet
      containers:
        - name: stalwart
          # latest は使用しない。バージョンを固定してデプロイ時の再現性を確保する
          # 更新手順: image タグを変更 → GitOps PR → ArgoCD が自動 sync
          # 注意: Docker Hub イメージ名は stalwartlabs/mail-server (旧・Archived) ではなく
          #       stalwartlabs/stalwart (新) を使用すること
          image: stalwartlabs/stalwart:v0.15.5
          ports:
            - name: smtp
              containerPort: 25
            - name: submission
              containerPort: 587
            - name: smtps
              containerPort: 465
            - name: imap
              containerPort: 143
            - name: imaps
              containerPort: 993
            - name: https
              containerPort: 443
              # Cloudflare Tunnel → stalwart-admin ClusterIP 経由
          # stalwart-secrets (ESO 生成) から全環境変数を注入
          # 含まれるキー: STALWART_ADMIN_SECRET, CLOUDFLARE_API_TOKEN
          envFrom:
            - secretRef:
                name: stalwart-secrets
          volumeMounts:
            - name: data
              mountPath: /opt/stalwart
            - name: config
              mountPath: /opt/stalwart/etc
              readOnly: true
              # v0.15.5 のデフォルト設定パス: /opt/stalwart/etc/config.toml
              # /opt/stalwart (PVC) の etc/ サブディレクトリを ConfigMap で上書き
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            tcpSocket:
              port: 25
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: 25
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: stalwart-data
        - name: config
          configMap:
            name: stalwart-config
