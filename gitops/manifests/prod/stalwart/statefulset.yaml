---
# Stalwart Mail Server
# StatefulSet を使用: Pod identity の安定性がメールサーバーに必要
#
# image バージョンは stalwartlabs/mail-server の GitHub Releases で確認して固定すること
# https://github.com/stalwartlabs/mail-server/releases
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: stalwart
  namespace: prod
  labels:
    app: stalwart
  annotations:
    # mail-tls: cert-manager が TLS 証明書を更新したら再起動
    # stalwart-secrets: STALWART_ADMIN_SECRET がローテーションされたら再起動
    #   → STALWART_RECOVERY_ADMIN は Pod 起動時の K8s env 展開で解決するため、
    #     再起動しないと旧パスワードのまま残り PostSync Job が 401 になる
    secret.reloader.stakater.com/reload: "mail-tls,stalwart-secrets"
spec:
  serviceName: stalwart-mail
  replicas: 0   # 移行のため一時的に0へスケールダウン
  selector:
    matchLabels:
      app: stalwart
  template:
    metadata:
      labels:
        app: stalwart
    spec:
      # hostNetwork: true — K3s + Cilium 環境では hostPort が機能しないため
      # Pod がホストのネットワーク名前空間を直接使用してポートを公開する
      hostNetwork: true
      # hostNetwork 使用時は DNS ポリシーを ClusterFirstWithHostNet に変更する
      # (デフォルトの ClusterFirst はホストネットワーク Pod では機能しない)
      dnsPolicy: ClusterFirstWithHostNet
      # root で実行する理由:
      #   1. hostNetwork + port 25 のバインドには root (または NET_BIND_SERVICE) が必要
      #   2. v0.15 が root で作成した PVC ファイル (RocksDB) へのアクセスに必要
      #      v0.16 Alpine イメージがデフォルト non-root になったため権限エラーが発生する
      # 終了猶予: デフォルト 30 秒。メールキューが空になるのを待つ時間
      # 本番運用開始後は配送中メールの損失を避けるため 60 秒程度に伸ばすこと
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsUser: 0
        runAsGroup: 0
      containers:
        - name: stalwart
          # latest は使用しない。バージョンを固定してデプロイ時の再現性を確保する
          # 更新手順: image タグを変更 → GitOps PR → ArgoCD が自動 sync
          # 注意: Docker Hub イメージ名は stalwartlabs/mail-server (旧・Archived) ではなく
          #       stalwartlabs/stalwart (新) を使用すること
          image: stalwartlabs/stalwart:v0.16.6-alpine
          # v0.16 config: --config /etc/stalwart/config.json (Dockerfile デフォルト)
          ports:
            - name: smtp
              containerPort: 25
            - name: submission
              containerPort: 587
            - name: smtps
              containerPort: 465
            - name: imap
              containerPort: 143
            - name: imaps
              containerPort: 993
            # nginx-ingress バックエンド: TLS は nginx-ingress が終端し HTTP で転送
            - name: http
              containerPort: 8080
          # stalwart-secrets (ESO 生成) から全環境変数を注入
          # 含まれるキー: STALWART_ADMIN_SECRET, CLOUDFLARE_API_TOKEN
          envFrom:
            - secretRef:
                name: stalwart-secrets
          env:
            # STALWART_ADMIN_SECRET を明示定義: 環境変数として Pod 内で参照可能にする
            - name: STALWART_ADMIN_SECRET
              valueFrom:
                secretKeyRef:
                  name: stalwart-secrets
                  key: STALWART_ADMIN_SECRET
            # STALWART_RECOVERY_ADMIN: OIDC directoryId 設定時は通常の admin 認証が通らないため常設。
            # STALWART_ADMIN_SECRET と同じパスワードを使い、PostSync Job もこれで認証する。
            # $(VAR_NAME) は Kubernetes の env 展開機能で STALWART_ADMIN_SECRET の値に置換される。
            - name: STALWART_RECOVERY_ADMIN
              value: "admin:$(STALWART_ADMIN_SECRET)"
          volumeMounts:
            - name: data
              mountPath: /opt/stalwart
            - name: config
              mountPath: /etc/stalwart
              readOnly: true
              # v0.16 のデフォルト config パス: /etc/stalwart/config.json
              # (Dockerfile: CMD ["--config", "/etc/stalwart/config.json"])
            - name: tls
              mountPath: /etc/stalwart/tls
              readOnly: true
              # cert-manager が生成した mail-tls Secret (tls.crt / tls.key) をマウント
              # Stalwart の Certificate オブジェクトがこのパスを参照する
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          # SMTP port 25 で疎通確認: nginx-ingress が port 443 を担当するため
          # port 443 への依存をなくし SMTP/IMAP が正常な限り Healthy とする
          livenessProbe:
            tcpSocket:
              port: 25
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: 25
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: stalwart-data
        # config + settings を同一ディレクトリ (/etc/stalwart) に projected で合成
        # /etc/stalwart/config.json   ← stalwart-config ConfigMap
        # /etc/stalwart/settings.ndjson ← stalwart-settings ConfigMap
        - name: config
          projected:
            defaultMode: 420  # 0644 in octal (rw-r--r--)
            sources:
              - configMap:
                  name: stalwart-config
              - configMap:
                  name: stalwart-settings
        # cert-manager が prod namespace に作成する mail-tls Secret
        # /etc/stalwart/tls/tls.crt と /etc/stalwart/tls/tls.key をマウント
        - name: tls
          secret:
            secretName: mail-tls
