---
# Stalwart メールデータ PVC リストア (VolSync restic → stalwart-data PVC)
# DR / 移行時に一時的に適用する。リストア完了後は削除する。
apiVersion: volsync.backube/v1alpha1
kind: ReplicationDestination
metadata:
  name: stalwart-restore
  namespace: prod
spec:
  trigger:
    manual: restore-once
  restic:
    repository: stalwart-restic-secret
    destinationPVC: stalwart-data
    copyMethod: Direct
    moverSecurityContext:
      runAsUser: 0
      runAsGroup: 0
      fsGroup: 0
