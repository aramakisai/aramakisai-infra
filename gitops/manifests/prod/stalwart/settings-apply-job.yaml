---
# Stalwart 設定自動適用 Job (ArgoCD PostSync Hook)
#
# ArgoCD が stalwart アプリを sync するたびに本 Job が実行され、
# settings-configmap の settings-update.ndjson をクラスターに適用する。
#
# 前提:
#   - Stalwart が HTTPS port 443 で稼働していること (初回セットアップ済み)
#   - stalwart-secrets に STALWART_ADMIN_SECRET が存在すること (ESO 経由)
#
# ⚠️  DB が空 (PVC リセット直後) の場合は本 Job は機能しない。
#      手動で settings.ndjson を適用してから HTTPS を有効化すること。
#      手順: settings-configmap.yaml の末尾コメント「適用手順」を参照。
#
# hook-delete-policy: BeforeHookCreation
#   - 次回 sync 前に前回の Job を削除して再作成する
#   - 失敗した Job は削除されずに残る (デバッグ用)
#
# settings-update.ndjson との対応:
#   - NetworkListener: destroy + create (リスナー設定を最新化)
#   - MtaRoute: destroy + create (リレー設定を最新化)
#   - MtaOutboundStrategy: update (ルーティングポリシーを更新)
#   - SystemSettings: update (ホスト名を更新) + Domain ID を動的取得して defaultDomainId を設定
#   - Domain / DkimSignature / DnsServer / AcmeProvider: 変更しない
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: stalwart-settings-apply
  namespace: prod
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: stalwart-settings-apply
  namespace: prod
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["delete"]
    resourceNames: ["stalwart-0"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: stalwart-settings-apply
  namespace: prod
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: stalwart-settings-apply
subjects:
  - kind: ServiceAccount
    name: stalwart-settings-apply
    namespace: prod
---
apiVersion: batch/v1
kind: Job
metadata:
  name: stalwart-settings-apply
  namespace: prod
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    # Stalwart StatefulSet の sync が完了してから実行する
    argocd.argoproj.io/sync-wave: "1"
spec:
  backoffLimit: 2
  activeDeadlineSeconds: 300
  template:
    spec:
      restartPolicy: OnFailure
      serviceAccountName: stalwart-settings-apply
      containers:
        - name: stalwart-cli
          image: alpine:3.19
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e

              # ── stalwart-cli のダウンロード ────────────────────────────────
              echo ">>> stalwart-cli をダウンロード中..."
              apk add --no-cache wget xz curl > /dev/null 2>&1
              wget -qO /tmp/stalwart-cli.tar.xz \
                https://github.com/stalwartlabs/cli/releases/download/v1.0.7/stalwart-cli-x86_64-unknown-linux-musl.tar.xz
              # BusyBox tar は -J 非対応のため xz で展開してから tar
              xz -d /tmp/stalwart-cli.tar.xz
              tar -xf /tmp/stalwart-cli.tar -C /tmp/
              # アーカイブはディレクトリ stalwart-cli-x86_64-unknown-linux-musl/ を含む
              # その中に stalwart-cli バイナリがある
              mv /tmp/stalwart-cli-x86_64-unknown-linux-musl/stalwart-cli /tmp/stalwart-cli
              chmod +x /tmp/stalwart-cli
              echo "    ✅ stalwart-cli v1.0.7 取得完了"

              # ── Stalwart HTTPS の起動待機 (最大 120 秒) ──────────────────
              # 認証方式: STALWART_RECOVERY_ADMIN (admin:$(STALWART_ADMIN_SECRET)) を使用。
              # Authentication.directoryId = authentik-oidc の環境では通常の admin auth が
              # OIDC バックエンドに回されて拒否されるため、Recovery Admin を常設している。
              STALWART_URL="http://stalwart-mail.prod.svc.cluster.local:8080"
              echo ">>> Stalwart HTTP API の起動を待機中 ($STALWART_URL)..."
              READY=0
              for i in $(seq 1 24); do
                if /tmp/stalwart-cli \
                    --url "$STALWART_URL" \
                    --user admin --password "$STALWART_ADMIN_SECRET" \
                    query Domain > /dev/null 2>&1; then
                  echo "    ✅ Stalwart 応答確認 (attempt $i)"
                  READY=1
                  break
                fi
                echo "    attempt $i/24 — 5 秒後にリトライ..."
                sleep 5
              done

              if [ "$READY" -eq 0 ]; then
                echo "❌ Stalwart が 120 秒以内に応答しませんでした。" >&2
                echo "   DB が空の場合は手動セットアップが必要です:" >&2
                echo "   settings-configmap.yaml の末尾「適用手順」を参照してください。" >&2
                exit 1
              fi

              # ── settings-update.ndjson の適用 ────────────────────────────
              echo ">>> settings-update.ndjson を適用中..."
              /tmp/stalwart-cli \
                --url "$STALWART_URL" \
                --user admin --password "$STALWART_ADMIN_SECRET" \
                apply --file /settings/settings-update.ndjson

              echo "    ✅ settings-update.ndjson の適用完了"

              # ── defaultDomainId を動的に設定 ─────────────────────────────
              # #dom-1 は plan 内参照のため settings-update.ndjson では使えない。
              # 実際の Domain ID を query して SystemSettings に設定する。
              echo ">>> Domain ID を取得して defaultDomainId を更新中..."
              DOMAIN_ID=$(/tmp/stalwart-cli \
                --url "$STALWART_URL" \
                --user admin --password "$STALWART_ADMIN_SECRET" \
                --no-color \
                query Domain 2>/dev/null | awk 'NR==2 {print $1}')

              if [ -n "$DOMAIN_ID" ]; then
                printf '{"@type":"update","object":"SystemSettings","value":{"defaultDomainId":"%s"}}\n' "$DOMAIN_ID" \
                  | /tmp/stalwart-cli \
                      --url "$STALWART_URL" \
                      --user admin --password "$STALWART_ADMIN_SECRET" \
                      apply --stdin
                echo "    ✅ defaultDomainId を $DOMAIN_ID に設定しました"
              else
                echo "    ⚠ ドメインが見つかりません。defaultDomainId の更新をスキップします。"
              fi

              echo "    ✅ 設定の適用が完了しました"

              # ── Stalwart Pod を再起動して設定をロード ────────────────────
              # stalwart-cli apply は DB に設定を書き込むが、
              # 配信エンジンのゲートウェイ設定はランタイムで再読み込みされない。
              # Pod を削除すると StatefulSet が再作成し、最新 DB 設定でロードされる。
              echo ">>> Stalwart Pod を再起動して新しいゲートウェイ設定をロード中..."
              KUBE_TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
              HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -k -X DELETE \
                -H "Authorization: Bearer $KUBE_TOKEN" \
                "https://kubernetes.default.svc/api/v1/namespaces/prod/pods/stalwart-0")
              if [ "$HTTP_CODE" = "200" ]; then
                echo "    ✅ stalwart-0 を削除しました (StatefulSet が自動再作成します)"
              else
                echo "    ⚠ Pod 削除の HTTP ステータス: $HTTP_CODE (既に再起動済みの可能性あり)"
              fi
          env:
            - name: STALWART_ADMIN_SECRET
              valueFrom:
                secretKeyRef:
                  name: stalwart-secrets
                  key: STALWART_ADMIN_SECRET
          volumeMounts:
            - name: settings
              mountPath: /settings
              readOnly: true
      volumes:
        - name: settings
          configMap:
            name: stalwart-settings
            items:
              - key: settings-update.ndjson
                path: settings-update.ndjson
