---
# Stalwart: メールポートは外部公開が必要
# Hetzner ではパブリック IP への NodePort を使用する
# (LoadBalancer は追加費用が発生するため NodePort を選択)
#
# SMTP (25) はスパム対策で多くのプロバイダーがブロックするため
# Hetzner に 25番ポート開放申請が必要な場合がある
apiVersion: v1
kind: Service
metadata:
  name: stalwart
  namespace: prod
  labels:
    app: stalwart
spec:
  type: NodePort
  selector:
    app: stalwart
  ports:
    - name: smtp
      port: 25
      targetPort: 25
      nodePort: 30025
    - name: submission
      port: 587
      targetPort: 587
      nodePort: 30587
    - name: smtps
      port: 465
      targetPort: 465
      nodePort: 30465
    - name: imap
      port: 143
      targetPort: 143
      nodePort: 30143
    - name: imaps
      port: 993
      targetPort: 993
      nodePort: 30993
    - name: https
      port: 443
      targetPort: 443
      nodePort: 30443
