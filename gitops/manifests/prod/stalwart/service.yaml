---
# stalwart-mail: クラスター内部からメールポートへアクセスするための ClusterIP
#
# 外部からのメール (SMTP/IMAP) は StatefulSet の hostPort で直接ノードに到達するため、
# このサービスはクラスター内部向け (Prometheus scrape 等の将来用途) のみ。
# NodePort は不要: hostPort が標準ポートをそのまま公開しているため。
apiVersion: v1
kind: Service
metadata:
  name: stalwart-mail
  namespace: prod
  labels:
    app: stalwart
spec:
  type: ClusterIP
  selector:
    app: stalwart
  ports:
    - name: smtp
      port: 25
      targetPort: 25
    - name: submission
      port: 587
      targetPort: 587
    - name: smtps
      port: 465
      targetPort: 465
    - name: imap
      port: 143
      targetPort: 143
    - name: imaps
      port: 993
      targetPort: 993
    # nginx-ingress → Stalwart HTTP バックエンド (HTTPS TLS 終端後の平文転送)
    - name: http
      port: 8080
      targetPort: 8080
