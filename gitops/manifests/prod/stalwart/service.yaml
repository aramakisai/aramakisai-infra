---
# stalwart-mail: クラスター内部からメールポートへアクセスするための ClusterIP
#
# 外部からのメール (SMTP/IMAP) は StatefulSet の hostPort で直接ノードに到達するため、
# このサービスはクラスター内部向け (Prometheus scrape 等の将来用途) のみ。
# NodePort は不要: hostPort が標準ポートをそのまま公開しているため。
apiVersion: v1
kind: Service
metadata:
  name: stalwart-mail
  namespace: prod
  labels:
    app: stalwart
spec:
  type: ClusterIP
  selector:
    app: stalwart
  ports:
    - name: smtp
      port: 25
      targetPort: 25
    - name: submission
      port: 587
      targetPort: 587
    - name: smtps
      port: 465
      targetPort: 465
    - name: imap
      port: 143
      targetPort: 143
    - name: imaps
      port: 993
      targetPort: 993
---
# stalwart-admin: Web Admin UI 向け ClusterIP
# Cloudflare Tunnel (cloudflared) がこの ClusterIP を経由して
# mail-admin.aramakisai.com へのアクセスを転送する
# 外部からは直接到達不可 (ファイアウォールでポート 443 を開放しない)
apiVersion: v1
kind: Service
metadata:
  name: stalwart-admin
  namespace: prod
  labels:
    app: stalwart
spec:
  type: ClusterIP
  selector:
    app: stalwart
  ports:
    - name: https
      port: 443
      targetPort: 443
