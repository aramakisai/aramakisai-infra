---
# Stalwart Mail Server 設定ファイル (v0.16+)
#
# v0.16 以降の変更点:
#   - config.json は「データストアの場所」だけを記述する最小設定ファイル
#   - リスナー・認証・ドメイン・DKIM 等の全設定は RocksDB に保存され、
#     Web Admin UI (http://<node>:8080/admin) から管理する
#   - 旧 config.toml の設定内容は Admin UI で再設定が必要
#
# Web Admin: https://mail-admin.aramakisai.com  (Cloudflare Tunnel 経由 / port 443)
#   初期セットアップ時のみ: http://<prod-node-1-tailscale-ip>:8080/admin  (recovery mode)
#
# ACME (TLS 証明書): Admin UI > Settings > Certificates > ACME Providers
#   Provider: Let's Encrypt, DNS-01, Cloudflare
#   CLOUDFLARE_API_TOKEN は stalwart-secrets (ESO) から自動注入済み
apiVersion: v1
kind: ConfigMap
metadata:
  name: stalwart-config
  namespace: prod
data:
  # v0.16 の config.json: データストアの場所のみ記述する
  # その他の設定 (リスナー・認証・ルーティング等) はすべて DB に保存し Admin UI で管理
  config.json: |
    {
      "@type": "RocksDb",
      "path": "/opt/stalwart/data"
    }
