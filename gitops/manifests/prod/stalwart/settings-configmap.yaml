---
# Stalwart v0.16 設定プラン (NDJSON 形式)
#
# このファイルが Stalwart の「設定のソース・オブ・トゥルース」となる。
# 変更したら stalwart-cli apply で再適用すること。
#
# ⚠️  再適用時の注意:
#   - NetworkListener / AcmeProvider / DnsServer / DkimSignature → destroy してから create (冪等)
#   - Directory (LDAP/OIDC) → destroy してから create (冪等)
#     Authentication.directoryId は destroy 中に一時的に無効になるが
#     同一 apply 内で create + update するため問題ない
#   - Domain → 初回のみ create。再適用時にドメインを変更する場合は手動で destroy すること
#     (destroy すると紐付いているアカウントも削除されるため注意)
#   - Account → NDJSON には含めない (別途 admin-account-create.sh で作成)
#     再適用でアカウントを上書きするとメールが消える危険があるため
#
# 適用方法 → 下部の「適用手順」コメントを参照
#
# DKIM について:
#   dkimManagement: Automatic → Stalwart が Ed25519 鍵を自動生成・自動ローテーション
#   dnsManagement.publishRecords: ["dkim"] → 生成した DKIM TXT レコードを Cloudflare に自動登録
#   (MX / SPF / DMARC は Terraform 管理のため publishRecords に含めない)
#
# 古い DKIM 鍵 (202605e / 202605r) について:
#   v0.16.6 起動時に DB が初期化され秘密鍵が消失した。公開鍵だけ残っても署名できないため
#   terraform/dns.tf から古い DKIM レコードを削除して `terraform apply` で Cloudflare から除去すること。
#   新しい DKIM レコードは Stalwart が自動で Cloudflare に登録する。
apiVersion: v1
kind: ConfigMap
metadata:
  name: stalwart-settings
  namespace: prod
data:
  settings.ndjson: |
    {"@type":"destroy","object":"NetworkListener"}
    {"@type":"destroy","object":"Certificate"}
    {"@type":"destroy","object":"AcmeProvider"}
    {"@type":"destroy","object":"DnsServer"}
    {"@type":"destroy","object":"DkimSignature"}
    {"@type":"destroy","object":"MtaRoute"}
    {"@type":"create","object":"DnsServer","value":{"cf-dns":{"@type":"Cloudflare","description":"Cloudflare DNS (DKIM 自動登録)","secret":{"@type":"EnvironmentVariable","variableName":"CLOUDFLARE_API_TOKEN"}}}}
    {"@type":"create","object":"Certificate","value":{"cert-main":{"certificate":{"@type":"File","filePath":"/etc/stalwart/tls/tls.crt"},"privateKey":{"@type":"File","filePath":"/etc/stalwart/tls/tls.key"}}}}
    {"@type":"create","object":"Domain","value":{"dom-1":{"name":"aramakisai.com","certificateManagement":{"@type":"Manual","certificateId":"#cert-main"},"dkimManagement":{"@type":"Automatic","algorithms":{"Dkim1Ed25519Sha256":true}},"dnsManagement":{"@type":"Automatic","dnsServerId":"#cf-dns","publishRecords":{"dkim":true}},"subAddressing":{"@type":"Enabled"}}}}
    {"@type":"create","object":"NetworkListener","value":{"smtp":{"name":"smtp","bind":{"[::]:25":true},"protocol":"smtp","tlsImplicit":false},"submission":{"name":"submission","bind":{"[::]:587":true},"protocol":"smtp","tlsImplicit":false},"smtps":{"name":"smtps","bind":{"[::]:465":true},"protocol":"smtp","tlsImplicit":true},"imap":{"name":"imap","bind":{"[::]:143":true},"protocol":"imap","tlsImplicit":false},"imaps":{"name":"imaps","bind":{"[::]:993":true},"protocol":"imap","tlsImplicit":true},"https":{"name":"https","bind":{"[::]:8080":true},"protocol":"http","tlsImplicit":false}}}
    {"@type":"create","object":"MtaRoute","value":{"resend-relay":{"@type":"Relay","name":"resend-relay","description":"Resend SMTP リレー (Hetzner port 25 新規アカウント制限回避)","address":"smtp.resend.com","port":587,"implicitTls":false,"authUsername":"resend","authSecret":{"@type":"EnvironmentVariable","variableName":"RESEND_API_KEY"}}}}
    {"@type":"update","object":"MtaOutboundStrategy","value":{"route":{"match":{"0":{"if":"is_local_domain(rcpt_domain)","then":"'local'"}},"else":"'resend-relay'"}}}
    {"@type":"update","object":"SystemSettings","value":{"defaultHostname":"mail.aramakisai.com","defaultDomainId":"#dom-1"}}
    {"@type":"destroy","object":"Directory"}
    {"@type":"create","object":"Directory","value":{"authentik-ldap":{"@type":"Ldap","description":"Authentik LDAP Outpost — IMAP/SMTP パスワード認証 + Stalwart 内蔵 OAuth2 のバックエンド","url":"ldap://ak-outpost-stalwart-ldap-outpost.prod.svc.cluster.local:389","baseDn":"dc=ldap,dc=goauthentik,dc=io","bindDn":"cn=stalwart-service,ou=users,dc=ldap,dc=goauthentik,dc=io","bindSecret":{"@type":"EnvironmentVariable","variableName":"STALWART_JOB_TOKEN"},"filterLogin":"(&(objectClass=inetOrgPerson)(|(mail=?)(uid=?)))","filterMailbox":"(&(objectClass=inetOrgPerson)(|(mail=?)(mailAlias=?)))","filterMemberOf":"(&(objectClass=group)(member=?))","attrEmail":{"mail":true},"attrEmailAlias":{"mailAlias":true},"attrMemberOf":{"memberOf":true},"groupClass":"group"}}}
    {"@type":"create","object":"Directory","value":{"authentik-oidc":{"@type":"Oidc","description":"Authentik OIDC — Roundcube OAUTHBEARER 検証","issuerUrl":"https://idp.aramakisai.com/application/o/roundcube/","requireAudience":"roundcube","requireScopes":{"openid":true,"email":true},"claimUsername":"preferred_username","usernameDomain":"aramakisai.com","claimName":"preferred_username","claimGroups":"groups"}}}
    {"@type":"update","object":"Authentication","value":{"directoryId":"#authentik-oidc"}}
    {"@type":"destroy","object":"AllowedIp"}
    {"@type":"create","object":"AllowedIp","value":{"cluster-pod-cidr":{"address":"10.42.0.0/16","reason":"Kubernetes Pod network (Cilium overlay)"},"cluster-node-cidr":{"address":"10.0.1.0/24","reason":"Kubernetes Node network"}}}
    {"@type":"destroy","object":"Tracer"}
    {"@type":"create","object":"Tracer","value":{"console":{"@type":"Stdout","level":"info","ansi":false,"enable":true}}}

  # ============================================================
  # settings-update.ndjson — PostSync Job 用・冪等再適用 NDJSON
  # ============================================================
  #
  # settings.ndjson との差分:
  #   - Domain は create せず何もしない (destroy すると全アカウント・メールが消えるため)
  #   - DkimSignature は destroy しない (再生成すると DKIM 鍵が変わり DNS 更新が必要になるため)
  #   - DnsServer / AcmeProvider は destroy しない (Domain から参照されており objectIsLinked エラーになるため)
  #   - NetworkListener と MtaRoute は destroy+create で確実に最新化
  #   - Directory (LDAP/OIDC) は destroy+create で確実に最新化
  #     (Authentication.directoryId は apply 完了後に再設定されるため一時的な無効状態は許容)
  #   - MtaOutboundStrategy と SystemSettings は update で更新
  #
  # 適用対象:
  #   - Stalwart が稼働中 (HTTPS port 443 が生きている) 場合のみ動作する
  #   - DB が空 (PVC リセット直後) の場合は手動で settings.ndjson を適用すること
  #
  settings-update.ndjson: |
    {"@type":"destroy","object":"NetworkListener"}
    {"@type":"destroy","object":"Certificate"}
    {"@type":"destroy","object":"MtaRoute"}
    {"@type":"create","object":"Certificate","value":{"cert-main":{"certificate":{"@type":"File","filePath":"/etc/stalwart/tls/tls.crt"},"privateKey":{"@type":"File","filePath":"/etc/stalwart/tls/tls.key"}}}}
    {"@type":"create","object":"NetworkListener","value":{"smtp":{"name":"smtp","bind":{"[::]:25":true},"protocol":"smtp","tlsImplicit":false},"submission":{"name":"submission","bind":{"[::]:587":true},"protocol":"smtp","tlsImplicit":false,"directoryId":"#authentik-ldap"},"smtps":{"name":"smtps","bind":{"[::]:465":true},"protocol":"smtp","tlsImplicit":true,"directoryId":"#authentik-ldap"},"imap":{"name":"imap","bind":{"[::]:143":true},"protocol":"imap","tlsImplicit":false,"directoryId":"#authentik-ldap"},"imaps":{"name":"imaps","bind":{"[::]:993":true},"protocol":"imap","tlsImplicit":true,"directoryId":"#authentik-ldap"},"https":{"name":"https","bind":{"[::]:8080":true},"protocol":"http","tlsImplicit":false}}}
    {"@type":"create","object":"MtaRoute","value":{"resend-relay":{"@type":"Relay","name":"resend-relay","description":"Resend SMTP リレー (Hetzner port 25 新規アカウント制限回避)","address":"smtp.resend.com","port":587,"implicitTls":false,"authUsername":"resend","authSecret":{"@type":"EnvironmentVariable","variableName":"RESEND_API_KEY"}}}}
    {"@type":"update","object":"MtaOutboundStrategy","value":{"route":{"match":{"0":{"if":"is_local_domain(rcpt_domain)","then":"'local'"}},"else":"'resend-relay'"}}}
    {"@type":"update","object":"SystemSettings","value":{"defaultHostname":"mail.aramakisai.com"}}
    {"@type":"create","object":"Directory","value":{"authentik-ldap":{"@type":"Ldap","description":"Authentik LDAP Outpost — IMAP/SMTP パスワード認証 + Stalwart 内蔵 OAuth2 のバックエンド","url":"ldap://ak-outpost-stalwart-ldap-outpost.prod.svc.cluster.local:389","baseDn":"dc=ldap,dc=goauthentik,dc=io","bindDn":"cn=stalwart-service,ou=users,dc=ldap,dc=goauthentik,dc=io","bindSecret":{"@type":"EnvironmentVariable","variableName":"STALWART_JOB_TOKEN"},"filterLogin":"(&(objectClass=inetOrgPerson)(|(mail=?)(uid=?)))","filterMailbox":"(&(objectClass=inetOrgPerson)(|(mail=?)(mailAlias=?)))","filterMemberOf":"(&(objectClass=group)(member=?))","attrEmail":{"mail":true},"attrEmailAlias":{"mailAlias":true},"attrMemberOf":{"memberOf":true},"groupClass":"group"}}}
    {"@type":"create","object":"Directory","value":{"authentik-oidc":{"@type":"Oidc","description":"Authentik OIDC — Roundcube OAUTHBEARER 検証","issuerUrl":"https://idp.aramakisai.com/application/o/roundcube/","requireAudience":"roundcube","requireScopes":{"openid":true,"email":true},"claimUsername":"preferred_username","usernameDomain":"aramakisai.com","claimName":"preferred_username","claimGroups":"groups"}}}
    {"@type":"update","object":"Authentication","value":{"directoryId":"#authentik-oidc"}}
    {"@type":"destroy","object":"AllowedIp"}
    {"@type":"create","object":"AllowedIp","value":{"cluster-pod-cidr":{"address":"10.42.0.0/16","reason":"Kubernetes Pod network (Cilium overlay)"},"cluster-node-cidr":{"address":"10.0.1.0/24","reason":"Kubernetes Node network"}}}
    {"@type":"destroy","object":"Tracer"}
    {"@type":"create","object":"Tracer","value":{"console":{"@type":"Stdout","level":"info","ansi":false,"enable":true}}}

# ============================================================
# 適用手順 (recovery mode が有効な状態で実行すること)
# ============================================================
#
# 1. stalwart-cli を取得 (ローカル Mac/Linux に)
#    wget -qO- https://github.com/stalwartlabs/cli/releases/download/v1.0.7/stalwart-cli-x86_64-unknown-linux-musl.tar.xz \
#      | tar -xJf - -C /tmp/ && chmod +x /tmp/stalwart-cli
#
# 2. ArgoCD sync でこの ConfigMap と StatefulSet の変更を反映 (recovery mode で起動済みであること)
#
# 3. kubectl port-forward でローカルに転送
#    kubectl port-forward -n prod pod/stalwart-0 8080:8080
#
# 4. Infisical から admin パスワードを取得
#    ADMIN_PASS=$(kubectl get secret stalwart-secrets -n prod \
#      -o jsonpath='{.data.STALWART_ADMIN_SECRET}' | base64 -d)
#
# 5. サーバー設定プランを適用
#    /tmp/stalwart-cli --url http://localhost:8080 \
#      --credentials "admin:$ADMIN_PASS" \
#      apply gitops/manifests/prod/stalwart/settings.ndjson
#
# 6. admin アカウントを作成 (パスワードは Infisical の STALWART_ADMIN_SECRET)
#    echo "{\"@type\":\"create\",\"object\":\"Account\",\"value\":{\"admin-acct\":{\"@type\":\"User\",\"name\":\"admin@aramakisai.com\",\"domainId\":\"dom-1\",\"credentials\":[{\"@type\":\"Password\",\"secret\":\"$ADMIN_PASS\"}],\"roles\":{\"@type\":\"Admin\"},\"permissions\":{\"@type\":\"Inherit\"},\"encryptionAtRest\":{\"@type\":\"Disabled\"}}}}" \
#      | /tmp/stalwart-cli --url http://localhost:8080 \
#          --credentials "admin:$ADMIN_PASS" \
#          apply -
#
# 7. port-forward を停止して StatefulSet から recovery mode を解除
#    (STALWART_RECOVERY_MODE と STALWART_RECOVERY_ADMIN の env 2行を削除)
#    → ArgoCD sync で再起動 → 通常モードで起動
#
# 8. Terraform で古い DKIM レコードを削除
#    terraform/dns.tf から dkim_ed25519 / dkim_rsa リソースを削除して
#    terraform apply -target cloudflare_record.dkim_ed25519 \
#                   -target cloudflare_record.dkim_rsa
#    (Stalwart が自動的に新しい DKIM レコードを Cloudflare に登録する)
