---
# mail.aramakisai.com の TLS 証明書 (cert-manager / Let's Encrypt)
#
# cert-manager が DNS-01 (Cloudflare) チャレンジで証明書を取得し
# Secret "mail-tls" として prod namespace に保存する。
# nginx-ingress の Ingress リソースがこの Secret を TLS 終端に使用する。
#
# 将来的に Stalwart SMTP/IMAP TLS (port 465/993) でも同じ Secret を
# mount して使用できるよう prod namespace に作成する。
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: mail-tls
  namespace: prod
spec:
  secretName: mail-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - mail.aramakisai.com
  # 有効期限 90 日、30 日前に自動更新 (Let's Encrypt デフォルト)
  duration: 2160h   # 90d
  renewBefore: 720h # 30d
