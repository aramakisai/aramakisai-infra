---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: stalwart-secrets
  namespace: prod
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: stalwart-secrets
    creationPolicy: Owner
  data:
    - secretKey: STALWART_ADMIN_SECRET
      remoteRef:
        key: STALWART_ADMIN_SECRET
    # Cloudflare DNS-01 ACME チャレンジ用トークン
    # Infisical に登録する際は Zone:DNS:Edit 権限のみの最小権限トークンを使うこと
    # (CLOUDFLARE_API_TOKEN (全権) とは別に発行すること)
    - secretKey: CLOUDFLARE_API_TOKEN
      remoteRef:
        key: STALWART_CF_API_TOKEN
    # Resend SMTP リレー用 API キー
    # Hetzner 新規アカウントは port 25 アウトバウンドが制限されるため
    # すべての外部宛送信を smtp.resend.com:587 経由にルーティングする
    # Infisical キー名: RESEND_API_KEY
    - secretKey: RESEND_API_KEY
      remoteRef:
        key: RESEND_API_KEY
    # PostSync Job 用サービスアカウント (Authentik サービスアカウント・最小権限)
    # Authentik で作成したサービスアカウントのユーザー名とトークン
    # Stalwart Admin ロールのみ付与 (mail-admins グループには属さない)
    - secretKey: STALWART_JOB_USER
      remoteRef:
        key: STALWART_JOB_USER
    - secretKey: STALWART_JOB_TOKEN
      remoteRef:
        key: STALWART_JOB_TOKEN
    # Authentik LDAP Outpost サービストークン
    # Stalwart の LDAP ディレクトリが Authentik に bind する際のパスワードとして使用
    # (cn=ldapservice の bindSecret)
    # 同じトークンは authentik-ldap-outpost-token Secret にも格納され
    # LDAP Outpost コンテナ (AUTHENTIK_TOKEN) でも使用される
    # Infisical キー名: AUTHENTIK_LDAP_OUTPOST_TOKEN
    - secretKey: AUTHENTIK_LDAP_OUTPOST_TOKEN
      remoteRef:
        key: AUTHENTIK_LDAP_OUTPOST_TOKEN
