---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: stalwart-secrets
  namespace: prod
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: stalwart-secrets
    creationPolicy: Owner
  data:
    - secretKey: STALWART_ADMIN_SECRET
      remoteRef:
        key: STALWART_ADMIN_SECRET
