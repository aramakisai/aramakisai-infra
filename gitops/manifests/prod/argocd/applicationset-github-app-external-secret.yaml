---
# ArgoCD ApplicationSet の pullRequest generator (GitHub App 認証) 用 Secret。
# directus-schema-preview ApplicationSet が aramakisai-infra の open PR 一覧を
# 取得するために使用する。専用の最小権限 GitHub App
# (aramakisai-infra への pull-requests: read-only) の資格情報。
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: argocd-applicationset-github-app
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-options: Replace=true
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: argocd-applicationset-github-app
    creationPolicy: Owner
    template:
      metadata:
        labels:
          app.kubernetes.io/part-of: argocd
  data:
    - secretKey: githubAppID
      remoteRef:
        key: ARGOCD_APPLICATIONSET_GITHUB_APP_ID
    - secretKey: githubAppInstallationID
      remoteRef:
        key: ARGOCD_APPLICATIONSET_GITHUB_APP_INSTALLATION_ID
    - secretKey: githubAppPrivateKey
      remoteRef:
        key: ARGOCD_APPLICATIONSET_GITHUB_APP_PRIVATE_KEY
