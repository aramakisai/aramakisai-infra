---
# Vaultwarden アプリケーション用シークレット
# Infisical の prod 環境から取得する
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: vaultwarden-secrets
  namespace: prod
  annotations:
    argocd.argoproj.io/sync-options: Replace=true
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: vaultwarden-secrets
    creationPolicy: Owner
  data:
    - secretKey: ADMIN_TOKEN
      remoteRef:
        key: VAULTWARDEN_ADMIN_TOKEN
    # SMTP送信用パスワード (Authentikのnoreplyアカウントと同一キーを再利用)
    - secretKey: SMTP_PASSWORD
      remoteRef:
        key: NOREPLY_SMTP_PASSWORD
    - secretKey: ORG_CREATION_USERS
      remoteRef:
        key: VAULTWARDEN_ORG_CREATION_USERS
    - secretKey: SSO_CLIENT_ID
      remoteRef:
        key: VAULTWARDEN_OIDC_CLIENT_ID
    - secretKey: SSO_CLIENT_SECRET
      remoteRef:
        key: VAULTWARDEN_OIDC_CLIENT_SECRET
---
# CloudNativePG Cluster 用 DB 認証情報
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: vaultwarden-db-credentials
  namespace: prod
  annotations:
    argocd.argoproj.io/sync-options: Replace=true
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: vaultwarden-db-credentials
    creationPolicy: Owner
    template:
      data:
        username: "vaultwarden"
        password: "{{ .VAULTWARDEN_DB_PASSWORD }}"
        url: "postgresql://vaultwarden:{{ .VAULTWARDEN_DB_PASSWORD }}@vaultwarden-db-rw:5432/app"
  data:
    - secretKey: VAULTWARDEN_DB_PASSWORD
      remoteRef:
        key: VAULTWARDEN_DB_PASSWORD
---
# VolSync restic バックアップ用認証情報
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: vaultwarden-restic-secret
  namespace: prod
  annotations:
    argocd.argoproj.io/sync-options: Replace=true
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: vaultwarden-restic-secret
    creationPolicy: Owner
    template:
      engineVersion: v2
      mergePolicy: Replace
      data:
        RESTIC_REPOSITORY: "{{ .RESTIC_REPOSITORY_BASE }}/vaultwarden"
        RESTIC_PASSWORD: "{{ .VAULTWARDEN_RESTIC_PASSWORD }}"
        AWS_ACCESS_KEY_ID: "{{ .HETZNER_OS_ACCESS_KEY_ID }}"
        AWS_SECRET_ACCESS_KEY: "{{ .HETZNER_OS_SECRET_ACCESS_KEY }}"
  data:
    - secretKey: RESTIC_REPOSITORY_BASE
      remoteRef:
        key: RESTIC_REPOSITORY_BASE
    - secretKey: VAULTWARDEN_RESTIC_PASSWORD
      remoteRef:
        key: VAULTWARDEN_RESTIC_PASSWORD
    - secretKey: HETZNER_OS_ACCESS_KEY_ID
      remoteRef:
        key: HETZNER_OS_ACCESS_KEY_ID
    - secretKey: HETZNER_OS_SECRET_ACCESS_KEY
      remoteRef:
        key: HETZNER_OS_SECRET_ACCESS_KEY
