---
# Vaultwarden アプリケーション用シークレット
# Infisical の prod 環境から取得する
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: vaultwarden-secrets
  namespace: prod
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: vaultwarden-secrets
    creationPolicy: Owner
  data:
    - secretKey: ADMIN_TOKEN
      remoteRef:
        key: VAULTWARDEN_ADMIN_TOKEN
    # SMTP設定時に有効化。SMTP_USERNAME と SMTP_PASSWORD は同時に設定すること
    # - secretKey: SMTP_PASSWORD
    #   remoteRef:
    #     key: VAULTWARDEN_SMTP_PASSWORD
    - secretKey: ORG_CREATION_USERS
      remoteRef:
        key: VAULTWARDEN_ORG_CREATION_USERS
    - secretKey: SSO_CLIENT_ID
      remoteRef:
        key: VAULTWARDEN_OIDC_CLIENT_ID
    - secretKey: SSO_CLIENT_SECRET
      remoteRef:
        key: VAULTWARDEN_OIDC_CLIENT_SECRET
---
# CloudNativePG Cluster 用 DB 認証情報
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: vaultwarden-db-credentials
  namespace: prod
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: vaultwarden-db-credentials
    creationPolicy: Owner
    template:
      data:
        username: "vaultwarden"
        password: "{{ .VAULTWARDEN_DB_PASSWORD }}"
  data:
    - secretKey: VAULTWARDEN_DB_PASSWORD
      remoteRef:
        key: VAULTWARDEN_DB_PASSWORD
---
# VolSync restic バックアップ用認証情報
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: vaultwarden-restic-secret
  namespace: prod
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: vaultwarden-restic-secret
    creationPolicy: Owner
  data:
    - secretKey: RESTIC_REPOSITORY
      remoteRef:
        key: VAULTWARDEN_RESTIC_REPOSITORY
    - secretKey: RESTIC_PASSWORD
      remoteRef:
        key: VAULTWARDEN_RESTIC_PASSWORD
    - secretKey: AWS_ACCESS_KEY_ID
      remoteRef:
        key: B2_APPLICATION_KEY_ID
    - secretKey: AWS_SECRET_ACCESS_KEY
      remoteRef:
        key: B2_APPLICATION_KEY
