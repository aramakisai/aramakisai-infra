---
# Vaultwarden Password Manager
#
# image バージョンは https://hub.docker.com/r/vaultwarden/server/tags で確認して固定すること
# 更新手順: image タグを変更 → GitOps PR → ArgoCD が自動 sync
#
# 認証方式: Authentik OIDC SSO (SSO_ONLY=true でパスワードログイン無効化)
#   - SSO_ENABLED=true, SSO_ONLY=true
#   - 新規登録は SIGNUPS_ALLOWED=false で無効化 (管理者招待制)
#   - 管理者ポータルは ADMIN_TOKEN で保護
#
# DB: PostgreSQL (CloudNativePG Cluster: vaultwarden-db)
# Storage: PVC (vaultwarden-data) for attachments / sends / icon_cache
#
# 凍結中 (2026-07-11): replicas: 0。DB/PVC/バックアップはデータ保持のため削除しない。
# 再開手順: replicas を 1 に戻す → db-cluster.yaml の instances も 1 に戻す →
# scheduled-backup.yaml / vaultwarden-rbac-sync の suspend/replicas も元に戻す
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vaultwarden
  namespace: prod
  labels:
    app: vaultwarden
  annotations:
    secret.reloader.stakater.com/reload: "vaultwarden-secrets"
spec:
  replicas: 0
  selector:
    matchLabels:
      app: vaultwarden
  template:
    metadata:
      labels:
        app: vaultwarden
    spec:
      containers:
        - name: vaultwarden
          image: vaultwarden/server:1.36.0
          ports:
            - name: http
              containerPort: 80
          env:
            - name: ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: vaultwarden-secrets
                  key: ADMIN_TOKEN
            - name: ORG_CREATION_USERS
              valueFrom:
                secretKeyRef:
                  name: vaultwarden-secrets
                  key: ORG_CREATION_USERS
            - name: SSO_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: vaultwarden-secrets
                  key: SSO_CLIENT_ID
            - name: SSO_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: vaultwarden-secrets
                  key: SSO_CLIENT_SECRET
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: vaultwarden-db-credentials
                  key: url
            - name: DATA_FOLDER
              value: "/data"
            - name: WEBSOCKET_ENABLED
              value: "true"
            - name: DOMAIN
              value: "https://vault.aramakisai.com"
            - name: SIGNUPS_ALLOWED
              value: "false"
            - name: SIGNUPS_DOMAINS_WHITELIST
              value: ""
            - name: SSO_ENABLED
              value: "true"
            - name: SSO_AUTHORITY
              value: "https://idp.aramakisai.com/application/o/vaultwarden/"
            - name: SSO_SCOPES
              value: "openid email profile groups"
            - name: SSO_ONLY
              value: "true"
            - name: SSO_SIGNUPS_MATCH_EMAIL
              value: "true"
            - name: SSO_PKCE
              value: "true"
            - name: SSO_ALLOW_UNKNOWN_EMAIL_VERIFICATION
              value: "true"
            - name: SMTP_HOST
              value: "mail.aramakisai.com"
            - name: SMTP_PORT
              value: "587"
            - name: SMTP_SECURITY
              value: "starttls"
            # フルアドレス必須: DOVECOT_PASS_FILTER は mail=%u で検索するため、
            # ドメイン無し "noreply" では mail=noreply にマッチせず unknown user になる
            # (Dovecot の auth_username_format によるドメイン補完は commit bae2c4c で
            # OAuth2 フルメールログイン対応のため撤去済み)。
            - name: SMTP_USERNAME
              value: "noreply@aramakisai.com" # confidential:allow
            - name: SMTP_FROM
              value: "noreply@aramakisai.com" # confidential:allow
            - name: SMTP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: vaultwarden-secrets
                  key: SMTP_PASSWORD
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /alive
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /alive
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: vaultwarden-data
