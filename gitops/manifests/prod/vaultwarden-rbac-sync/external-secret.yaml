---
# vaultwarden-rbac-sync 用シークレット
# Infisical の prod 環境から取得する
#
# AUTHENTIK_API_TOKEN: terraform/authentik_vaultwarden_rbac_sync.tf で発行した専用トークン
#   (apply後にterraform outputから手動でInfisicalへ反映、PRESENCE_AUTHENTIK_API_TOKENと同パターン)
# VAULTWARDEN_SA_CLIENT_ID / VAULTWARDEN_SA_CLIENT_SECRET: 専用サービスアカウントの
#   Personal API Key。発行手順は .kiro/steering/vaultwarden-rbac.md を参照
#   (SSO_ONLY一時解除を伴う一回限りの手動ブートストラップ作業)
# Discord通知は無効化済み (DISCORD_WEBHOOK_URL未設定→sync.py側でnotify skip)
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: vaultwarden-rbac-sync-secrets
  namespace: prod
  annotations:
    argocd.argoproj.io/sync-options: Replace=true
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: vaultwarden-rbac-sync-secrets
    creationPolicy: Owner
  data:
    - secretKey: AUTHENTIK_API_TOKEN
      remoteRef:
        key: VAULTWARDEN_RBAC_SYNC_AUTHENTIK_API_TOKEN
    - secretKey: VAULTWARDEN_SA_CLIENT_ID
      remoteRef:
        key: VAULTWARDEN_SA_CLIENT_ID
    - secretKey: VAULTWARDEN_SA_CLIENT_SECRET
      remoteRef:
        key: VAULTWARDEN_SA_CLIENT_SECRET
    - secretKey: TRIGGER_TOKEN
      remoteRef:
        key: TF_VAR_vaultwarden_rbac_sync_trigger_token
    - secretKey: VAULTWARDEN_ORG_KEY
      remoteRef:
        key: VAULTWARDEN_ORG_KEY
