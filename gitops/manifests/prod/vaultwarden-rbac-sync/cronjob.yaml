---
# Vaultwarden RBAC Sync の定期実行エントリポイント (Requirement 10.1, 10.2, 10.3)。
# --mode=cron で sync.py を起動し、Lease取得→SyncOrchestrator実行(dry_run=False固定)→Lease解放を行う。
# cronjob.yaml と deployment.yaml (Trigger Receiver) は同一の script-configmap.yaml (sync.py) を
# マウントし、command の --mode 引数のみが異なる (design.md File Structure Plan参照)。
# 凍結中 (2026-07-11): suspend: true。Vaultwarden本体が停止中のためsync対象なし
apiVersion: batch/v1
kind: CronJob
metadata:
  name: vaultwarden-rbac-sync
  namespace: prod
spec:
  suspend: true
  schedule: "0 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        spec:
          serviceAccountName: vaultwarden-rbac-sync
          restartPolicy: Never
          containers:
            - name: sync
              image: alpine/k8s:1.32.13
              command: ["python3", "/scripts/sync.py", "--mode=cron"]
              env:
                - name: AUTHENTIK_BASE_URL
                  value: "http://authentik-server.prod.svc.cluster.local"
                - name: VAULTWARDEN_BASE_URL
                  value: "http://vaultwarden.prod.svc.cluster.local"
              envFrom:
                - secretRef:
                    name: vaultwarden-rbac-sync-secrets
              volumeMounts:
                - name: script
                  mountPath: /scripts
                - name: mapping
                  mountPath: /etc/vaultwarden-rbac-sync
              resources:
                requests:
                  cpu: 10m
                  memory: 64Mi
                limits:
                  cpu: 200m
                  memory: 128Mi
          volumes:
            - name: script
              configMap:
                name: vaultwarden-rbac-sync-script
            - name: mapping
              configMap:
                name: vaultwarden-rbac-sync-mapping
