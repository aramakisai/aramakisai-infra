---
# Authentikグループ -> Vaultwarden Organization/Collection/権限レベルのマッピング設定。
# 自然キー: (authentik_group, organization, collection_id)。1グループが複数エントリを持てる (Requirement 4.4)。
# permission は can_view / can_view_except_passwords / can_edit / can_manage の4種別のみ (Requirement 4.2)。
# ConfigMap更新のみで反映される (CronJob/Deployment再デプロイ不要)。
#
# collection_id は Vaultwarden Collection の UUID を直接指定する (Collection名ではない)。
# 実機検証 (research.md「Vaultwarden Collection名はOrg鍵でクライアント暗号化される」2026-06-25) の結果、
# Collection名はOrganization鍵でクライアント側暗号化されたCipherStringとしてのみAPIから取得できることが
# 判明したため、人間可読名での照合はできない。collection_id は Organization Owner/Admin が実ブラウザで
# Web Vaultにログインし対象Collectionを開いて確認する (.kiro/steering/vaultwarden-rbac.md 参照)。
# collection_label はレビュー用の任意コメントで、照合には使わない。
# サンプルは .kiro/steering/vaultwarden-rbac.md の実例 (広報班の Twitter アカウント) に基づく
# (collection_id は実環境確認前のプレースホルダー)。
apiVersion: v1
kind: ConfigMap
metadata:
  name: vaultwarden-rbac-sync-mapping
  namespace: prod
data:
  mapping.json: |
    {
      "mappings": [
        {
          "authentik_group": "広報",
          "organization": "SNSアカウント",
          "collection_id": "00000000-0000-0000-0000-000000000000",
          "collection_label": "広報",
          "permission": "can_view"
        }
      ]
    }
