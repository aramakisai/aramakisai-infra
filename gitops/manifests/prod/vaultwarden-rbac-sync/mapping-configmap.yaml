---
# Authentikグループ -> Vaultwarden Organization/Collection/権限レベルのマッピング設定。
# 自然キー: (authentik_group, organization, collection_id)。1グループが複数エントリを持てる (Requirement 4.4)。
# permission は can_view / can_view_except_passwords / can_edit / can_manage の4種別のみ (Requirement 4.2)。
# ConfigMap更新のみで反映される (CronJob/Deployment再デプロイ不要)。
#
# collection_id は Vaultwarden Collection の UUID を直接指定する (Collection名ではない)。
# 実機検証 (research.md「Vaultwarden Collection名はOrg鍵でクライアント暗号化される」2026-06-25) の結果、
# Collection名はOrganization鍵でクライアント側暗号化されたCipherStringとしてのみAPIから取得できることが
# 判明したため、人間可読名での照合はできない。collection_id は Organization Owner/Admin が実ブラウザで
# Web Vaultにログインし対象Collectionを開いて確認する (.kiro/steering/vaultwarden-rbac.md 参照)。
# collection_label はレビュー用の任意コメントで、照合には使わない。
#
# 実Authentikグループ構成 (2026-06-25, 管理用APIトークンでのGroup一覧取得により確認済み。
# "Group "接頭辞付きの同名グループはProperty Mappingによる誤生成のゴミのため対象外):
#   部門: 企画 / 会計 / 出店 / 出演 / 広報 / 総務
#   全権限: 管理者 (既存) / リーダー (未作成、Authentik側で作成要)
#   資格情報専用グループ: Googleアカウント (未作成、Authentik側で作成要)
# Organizationは "荒牧祭実行委員会" の単一構成。Collectionは8件:
#   部門名と1:1の6件 (企画/会計/出店/出演/広報/総務) + Googleアカウント専用 + 管理者専用。
# 一般部門メンバー・Googleアカウントグループの権限は「can_use」(=can_view_except_passwords。
# Autofill等で利用できるがパスワード平文の閲覧・コピーはできない。can_viewは使用しない方針)。
# 管理者・リーダーは全8Collection (管理者専用Collection含む) に対しcan_manage。
# 部門グループは管理者専用Collectionへのアクセス権を持たない。
#
# collection_id は実UUID反映済み (2026-06-25、Organization「荒牧祭実行委員会」と8Collection作成完了、
# task 1.5の一部完了)。Authentikグループ`リーダー`/`Googleアカウント`の新規作成、および
# `VAULTWARDEN_RBAC_SYNC_AUTHENTIK_API_TOKEN`への`authentik_core.view_group`権限付与は別途必要。
apiVersion: v1
kind: ConfigMap
metadata:
  name: vaultwarden-rbac-sync-mapping
  namespace: prod
data:
  mapping.json: |
