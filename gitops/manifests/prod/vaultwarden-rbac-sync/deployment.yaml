---
# Trigger Receiver (Requirement 13.1, 13.2, 13.3, 13.4)。
# --mode=serve で sync.py を起動し、Authentikのログイン/グループ変更イベントから
# POST /trigger (Bearer認証) を受け取りSyncOrchestratorを非同期起動する常駐Deployment。
# cronjob.yaml と同一の script-configmap.yaml (sync.py) をマウントし、command の --mode 引数のみが異なる。
#
# 凍結中 (2026-07-11): replicas: 0。Vaultwarden本体が停止中のためtrigger受信不要
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vaultwarden-rbac-sync
  namespace: prod
  labels:
    app: vaultwarden-rbac-sync
spec:
  replicas: 0
  selector:
    matchLabels:
      app: vaultwarden-rbac-sync
  template:
    metadata:
      labels:
        app: vaultwarden-rbac-sync
    spec:
      serviceAccountName: vaultwarden-rbac-sync
      containers:
        - name: trigger-receiver
          image: alpine/k8s:1.32.13
          command: ["python3", "/scripts/sync.py", "--mode=serve"]
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: AUTHENTIK_BASE_URL
              value: "http://authentik-server.prod.svc.cluster.local"
            - name: VAULTWARDEN_BASE_URL
              value: "http://vaultwarden.prod.svc.cluster.local"
          envFrom:
            - secretRef:
                name: vaultwarden-rbac-sync-secrets
          volumeMounts:
            - name: script
              mountPath: /scripts
            - name: mapping
              mountPath: /etc/vaultwarden-rbac-sync
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 15
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
      volumes:
        - name: script
          configMap:
            name: vaultwarden-rbac-sync-script
        - name: mapping
          configMap:
            name: vaultwarden-rbac-sync-mapping
