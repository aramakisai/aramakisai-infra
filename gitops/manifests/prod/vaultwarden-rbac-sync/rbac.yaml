---
# vaultwarden-rbac-sync 専用 ServiceAccount
# CronJob (--mode=cron) と Trigger Receiver Deployment (--mode=serve) の両方から使う。
# Lease (vaultwarden-rbac-sync-lock) の get/create/update のみを許可する最小権限。
apiVersion: v1
kind: ServiceAccount
metadata:
  name: vaultwarden-rbac-sync
  namespace: prod
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: vaultwarden-rbac-sync-lock
  namespace: prod
rules:
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    resourceNames: ["vaultwarden-rbac-sync-lock"]
    verbs: ["get", "update"]
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: vaultwarden-rbac-sync-lock
  namespace: prod
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: vaultwarden-rbac-sync-lock
subjects:
  - kind: ServiceAccount
    name: vaultwarden-rbac-sync
    namespace: prod
