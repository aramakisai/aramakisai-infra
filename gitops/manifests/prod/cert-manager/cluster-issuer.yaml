---
# Let's Encrypt 本番 ClusterIssuer (Cloudflare DNS-01)
#
# ClusterIssuer はクラスタースコープのため namespace は関係ない。
# cloudflare-api-token Secret は cert-manager namespace に存在する必要がある。
#
# DNS-01 チャレンジ: Cloudflare API でTXTレコードを自動作成・削除する。
# mail.aramakisai.com は proxied=false の直接 A レコードのため HTTP-01 も可だが
# DNS-01 の方がポート開放不要で安全。
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: admin@aramakisai.com # confidential:allow
    privateKeySecretRef:
      name: letsencrypt-prod-account-key
    solvers:
      - dns01:
          cloudflare:
            apiTokenSecretRef:
              name: cloudflare-api-token
              key: api-token
