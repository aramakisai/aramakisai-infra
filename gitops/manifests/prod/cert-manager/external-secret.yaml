---
# cert-manager namespace 用 ExternalSecret
# ClusterIssuer が Cloudflare DNS-01 チャレンジに使用する API トークンを取得する
#
# Infisical キー: STALWART_CF_API_TOKEN
#   Zone:DNS:Edit 権限のみの最小権限トークン (全権 CLOUDFLARE_API_TOKEN とは別)
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: cloudflare-api-token
  namespace: cert-manager
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: cloudflare-api-token
    creationPolicy: Owner
  data:
    - secretKey: api-token
      remoteRef:
        key: STALWART_CF_API_TOKEN
