---
# Authentik 用 PostgreSQL クラスター (CloudNativePG)
# CNPG operator (wave: -1) が先にインストールされている前提
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: authentik-db
  namespace: prod
  annotations:
    # DR recovery 時に既存 WAL archive を継続して使うためチェックをスキップ
    cnpg.io/skipEmptyWalArchiveCheck: enabled
spec:
  instances: 1
  # 新しいイメージに skipEmptyWalArchiveCheck アノテーションを認識する
  # instance manager が含まれているため明示指定する
  imageName: ghcr.io/cloudnative-pg/postgresql:16.8

  postgresql:
    parameters:
      max_connections: "100"
      shared_buffers: "64MB"
      effective_cache_size: "128MB"
      work_mem: "4MB"

  # DR / 移行共通の recovery bootstrap
  # skipEmptyWalArchiveCheck: enabled で WAL archive チェックをスキップし、
  # 同一 S3 パス・同一 serverName で recovery と backup を継続運用する。
  # → DR を何度繰り返しても常に最新バックアップから復元される。
  bootstrap:
    recovery:
      source: authentik-db-source

  externalClusters:
    - name: authentik-db-source
      barmanObjectStore:
        destinationPath: "s3://aramakisai-backups/cnpg/authentik-db"
        endpointURL: "https://s3.us-west-004.backblazeb2.com"
        serverName: authentik-db
        s3Credentials:
          accessKeyId:
            name: b2-credentials
            key: ACCESS_KEY_ID
          secretAccessKey:
            name: b2-credentials
            key: SECRET_ACCESS_KEY
        wal:
          compression: gzip

  backup:
    barmanObjectStore:
      destinationPath: "s3://aramakisai-backups/cnpg/authentik-db"
      endpointURL: "https://s3.us-west-004.backblazeb2.com"
      serverName: authentik-db
      s3Credentials:
        accessKeyId:
          name: b2-credentials
          key: ACCESS_KEY_ID
        secretAccessKey:
          name: b2-credentials
          key: SECRET_ACCESS_KEY
      wal:
        compression: gzip
      data:
        compression: gzip
    retentionPolicy: "7d"

  storage:
    size: 5Gi

  resources:
    requests:
      memory: "256Mi"
      cpu: "250m"
    limits:
      memory: "512Mi"
      cpu: "500m"
