---
# Authentik 用 PostgreSQL クラスター (CloudNativePG)
# CNPG operator (wave: -1) が先にインストールされている前提
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: authentik-db
  namespace: prod
spec:
  instances: 1

  postgresql:
    parameters:
      max_connections: "100"
      shared_buffers: "64MB"
      effective_cache_size: "128MB"
      work_mem: "4MB"

  # B2 の最新バックアップからリストア (DR / シングルノード移行共通経路)
  # クラスターが既に初期化済みの場合 CNPG はこのセクションを無視する
  bootstrap:
    recovery:
      source: b2-backup

  externalClusters:
    - name: b2-backup
      barmanObjectStore:
        destinationPath: "s3://aramakisai-backups/cnpg/authentik-db"
        endpointURL: "https://s3.us-west-004.backblazeb2.com"
        s3Credentials:
          accessKeyId:
            name: b2-credentials
            key: ACCESS_KEY_ID
          secretAccessKey:
            name: b2-credentials
            key: SECRET_ACCESS_KEY
        wal:
          compression: gzip

  backup:
    barmanObjectStore:
      destinationPath: "s3://aramakisai-backups/cnpg/authentik-db"
      endpointURL: "https://s3.us-west-004.backblazeb2.com"
      s3Credentials:
        accessKeyId:
          name: b2-credentials
          key: ACCESS_KEY_ID
        secretAccessKey:
          name: b2-credentials
          key: SECRET_ACCESS_KEY
      wal:
        compression: gzip
      data:
        compression: gzip
    retentionPolicy: "7d"

  storage:
    size: 5Gi

  resources:
    requests:
      memory: "256Mi"
      cpu: "250m"
    limits:
      memory: "512Mi"
      cpu: "500m"
