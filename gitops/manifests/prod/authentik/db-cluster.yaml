---
# Authentik 用 PostgreSQL クラスター (CloudNativePG)
# CNPG operator (wave: -1) が先にインストールされている前提
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: authentik-db
  namespace: prod
spec:
  instances: 1   # 3ノード構成だが DB は1インスタンスで運用 (コスト優先)

  postgresql:
    parameters:
      max_connections: "100"

  bootstrap:
    initdb:
      database: authentik
      owner: authentik
      secret:
        name: authentik-db-credentials   # ESO が生成する Secret

  storage:
    size: 5Gi

  resources:
    requests:
      memory: "256Mi"
      cpu: "250m"
    limits:
      memory: "512Mi"
      cpu: "500m"
