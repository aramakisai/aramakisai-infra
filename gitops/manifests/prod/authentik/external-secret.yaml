---
# Authentik アプリケーション用シークレット
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: authentik-secrets
  namespace: prod
  annotations:
    argocd.argoproj.io/sync-options: Replace=true
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: authentik-secrets
    creationPolicy: Owner
  data:
    - secretKey: AUTHENTIK_SECRET_KEY
      remoteRef:
        key: AUTHENTIK_SECRET_KEY
    - secretKey: DB_PASSWORD
      remoteRef:
        key: AUTHENTIK_DB_PASSWORD
    - secretKey: NOREPLY_SMTP_PASSWORD
      remoteRef:
        key: NOREPLY_SMTP_PASSWORD
---
# CloudNativePG Cluster 用 DB 認証情報
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: authentik-db-credentials
  namespace: prod
  annotations:
    argocd.argoproj.io/sync-options: Replace=true
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: authentik-db-credentials
    creationPolicy: Owner
    template:
      data:
        username: "authentik"
        password: "{{ .AUTHENTIK_DB_PASSWORD }}"
  data:
    - secretKey: AUTHENTIK_DB_PASSWORD
      remoteRef:
        key: AUTHENTIK_DB_PASSWORD
