---
# Authentik 用 Redis (公式イメージ使用)
# Bitnami Redis は Docker Hub から撤退したため subchart を無効化し直接管理する。
# サービス名 authentik-redis-master は Authentik Helm chart のデフォルトホスト名に合わせる。
apiVersion: apps/v1
kind: Deployment
metadata:
  name: authentik-redis-master
  namespace: prod
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/instance: authentik
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: redis
      app.kubernetes.io/instance: authentik
  template:
    metadata:
      labels:
        app.kubernetes.io/name: redis
        app.kubernetes.io/instance: authentik
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
              name: redis
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: authentik-redis-master
  namespace: prod
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/instance: authentik
spec:
  type: ClusterIP
  ports:
    - port: 6379
      targetPort: 6379
      name: redis
  selector:
    app.kubernetes.io/name: redis
    app.kubernetes.io/instance: authentik
