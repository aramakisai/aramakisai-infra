---
# Authentik DB 週次フルバックアップ (毎週日曜 02:00 UTC)
# WAL archiving は継続的に行われるため、フルバックアップ間の変更も
# WAL再生によりPITR可能 (retentionPolicy: 14d で2世代分のフルバックアップを保持)
apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: authentik-db-daily
  namespace: prod
spec:
  schedule: "0 0 2 * * 0"
  backupOwnerReference: self
  cluster:
    name: authentik-db
  target: prefer-standby
