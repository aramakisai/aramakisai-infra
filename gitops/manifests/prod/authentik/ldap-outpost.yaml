---
# Authentik LDAP Outpost — K3s クラスター内 LDAP サービス
#
# 役割:
#   Docker Mailserver (DMS) の IMAP/SMTP 認証を Authentik に委譲するためのプロキシ。
#   クラスター内から ldap://authentik-ldap-outpost.prod.svc.cluster.local:389 で到達できる。
#
# アクセス制限:
#   制限はなく、Authentik に登録されている全ユーザーが DMS を利用できます。
#
# 前提:
#   LDAP Provider ("DMS LDAP") / Application ("dms-ldap") / Outpost ("dms-ldap-outpost")
#   は terraform/authentik_ldap.tf で管理する (詳細は下部コメント参照)。
#   Outpost Token のみ手動で取得し Infisical に AUTHENTIK_LDAP_OUTPOST_TOKEN として登録する。
#
# バージョン管理:
#   Authentik Helm chart (helm-values/prod/authentik.yaml: targetRevision: "2026.*") と
#   同じバージョンに合わせること。
#   確認: kubectl get pods -n prod -l app.kubernetes.io/name=authentik \
#           -o jsonpath='{.items[0].spec.containers[0].image}'
apiVersion: apps/v1
kind: Deployment
metadata:
  name: authentik-ldap-outpost
  namespace: prod
  labels:
    app: authentik-ldap-outpost
  annotations:
    # Outpost Token が更新されたら自動再起動
    secret.reloader.stakater.com/reload: "authentik-ldap-outpost-token"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: authentik-ldap-outpost
  template:
    metadata:
      labels:
        app: authentik-ldap-outpost
    spec:
      containers:
        - name: ldap
          # ⚠️  Authentik サーバーと同じバージョンに合わせること
          # 最新リリース: https://github.com/goauthentik/authentik/releases
          image: ghcr.io/goauthentik/ldap:2026.5.3
          ports:
            - name: ldap
              containerPort: 3389
            - name: ldaps
              containerPort: 6636
            - name: metrics
              containerPort: 9300
          env:
            - name: AUTHENTIK_HOST
              # Authentik サーバーの URL (クラスター内 Service 経由)
              # 外部URL (Cloudflare Tunnel) を指定すると LDAP bind のたびに
              # インターネット往復が発生しレイテンシが悪化するため使わない
              value: "http://authentik-server.prod.svc.cluster.local"
            - name: AUTHENTIK_INSECURE
              value: "false"
            - name: AUTHENTIK_TOKEN
              valueFrom:
                secretKeyRef:
                  name: authentik-ldap-outpost-token
                  key: token
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
          livenessProbe:
            httpGet:
              path: /outpost.goauthentik.io/ping
              port: 9300
            initialDelaySeconds: 15
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /outpost.goauthentik.io/ping
              port: 9300
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: authentik-ldap-outpost
  namespace: prod
  labels:
    app: authentik-ldap-outpost
spec:
  selector:
    app: authentik-ldap-outpost
  ports:
    - name: ldap
      port: 389
      targetPort: 3389
    - name: ldaps
      port: 636
      targetPort: 6636
---
# Authentik LDAP Outpost サービストークン
#
# このトークンは LDAP Outpost コンテナ (AUTHENTIK_TOKEN) の
# Authentik API への接続認証にのみ使用する。
#
# DMS の LDAP bind (cn=mailserver-service) は別の認証情報
# (Infisical: MAILSERVER_LDAP_BIND_PASSWORD) を使用する。
# (gitops/manifests/prod/mailserver/external-secret.yaml 参照)
#
# Infisical キー名: AUTHENTIK_LDAP_OUTPOST_TOKEN
# 取得方法: Authentik WebUI → Admin → Outposts → <outpost名> →
#           Service account → Token をコピー
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: authentik-ldap-outpost-token
  namespace: prod
  annotations:
    argocd.argoproj.io/sync-options: Replace=true
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: authentik-ldap-outpost-token
    creationPolicy: Owner
  data:
    - secretKey: token
      remoteRef:
        key: AUTHENTIK_LDAP_OUTPOST_TOKEN

# ============================================================
# Authentik 設定手順 (初回のみ)
# ============================================================
#
# ①〜③ LDAP Provider ("DMS LDAP") / Application ("dms-ldap") / Outpost
#       ("dms-ldap-outpost") は terraform/authentik_ldap.tf
#       (authentik_provider_ldap.dms / authentik_application.dms_ldap /
#       authentik_outpost.dms_ldap) で管理する。terraform apply 後、
#       Admin → Applications → Outposts → dms-ldap-outpost →
#       "View Deployment Info" → TOKEN 値をコピーし、
#       Infisical に AUTHENTIK_LDAP_OUTPOST_TOKEN として登録する。
#
# ④⑤ OAuth2/OIDC Provider ("Roundcube", client_id: aramakisai-mail) /
#       Application は terraform/authentik_apps.tf
#       (authentik_provider_oauth2.roundcube) で管理する。
#       Webmail SSO と DMS (Dovecot) の OAUTHBEARER token 検証
#       (introspection endpoint) の両方でこの client を使用する。
# ============================================================
