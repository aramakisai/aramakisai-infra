---
# Room Presence Tracker 用 PostgreSQL クラスター (CloudNativePG)
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: presence-db
  namespace: prod
  annotations:
    cnpg.io/skipEmptyWalArchiveCheck: enabled
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:16.8

  postgresql:
    parameters:
      max_connections: "50"
      shared_buffers: "32MB"
      effective_cache_size: "64MB"
      work_mem: "4MB"
      wal_compression: "on"

  bootstrap:
    initdb: {}

  backup:
    barmanObjectStore:
      destinationPath: "s3://aramakisai-backups/cnpg/presence-db"
      endpointURL: "https://fsn1.your-objectstorage.com"
      serverName: presence-db
      s3Credentials:
        accessKeyId:
          name: hetzner-os-credentials
          key: ACCESS_KEY_ID
        secretAccessKey:
          name: hetzner-os-credentials
          key: SECRET_ACCESS_KEY
      wal:
        compression: gzip
      data:
        compression: gzip
    retentionPolicy: "7d"

  storage:
    size: 5Gi

  resources:
    requests:
      memory: "64Mi"
      cpu: "50m"
    limits:
      memory: "128Mi"
      cpu: "100m"
