---
# Room Presence Tracker 用 PostgreSQL クラスター (CloudNativePG)
# 凍結中 (2026-07-12): cnpg.io/hibernation: "on" でハイバネート。
# spec.instances は CRD バリデーションで 0 不可 (>=1必須) のため hibernation アノテーションを使う。
# PVC/バックアップは削除しない (再開手順は room-presence.yaml 参照。解除は本annotation削除)
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: presence-db
  namespace: prod
  annotations:
    cnpg.io/skipEmptyWalArchiveCheck: enabled
    cnpg.io/hibernation: "on"
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:16.8

  postgresql:
    parameters:
      max_connections: "50"
      shared_buffers: "32MB"
      effective_cache_size: "64MB"
      work_mem: "4MB"
      wal_compression: "on"

  bootstrap:
    recovery:
      source: presence-db

  externalClusters:
    - name: presence-db
      barmanObjectStore:
        destinationPath: "s3://aramakisai-backups/cnpg/presence-db"
        endpointURL: "https://fsn1.your-objectstorage.com"
        serverName: presence-db
        s3Credentials:
          accessKeyId:
            name: hetzner-os-credentials
            key: ACCESS_KEY_ID
          secretAccessKey:
            name: hetzner-os-credentials
            key: SECRET_ACCESS_KEY
          region:
            name: hetzner-os-credentials
            key: REGION
        wal:
          compression: gzip
        data:
          compression: gzip

  backup:
    barmanObjectStore:
      destinationPath: "s3://aramakisai-backups/cnpg/presence-db"
      endpointURL: "https://fsn1.your-objectstorage.com"
      serverName: presence-db
      s3Credentials:
        accessKeyId:
          name: hetzner-os-credentials
          key: ACCESS_KEY_ID
        secretAccessKey:
          name: hetzner-os-credentials
          key: SECRET_ACCESS_KEY
        region:
          name: hetzner-os-credentials
          key: REGION
      wal:
        compression: gzip
      data:
        compression: gzip
    retentionPolicy: "7d"

  storage:
    size: 5Gi

  resources:
    requests:
      memory: "64Mi"
      cpu: "50m"
    limits:
      # postgres + barman-cloud (backup) は同一cgroupでOOM Killされるため、
      # バックアップ実行時の合算ピークに対して128Miは不足していた (2026-06-19 OOM発生)。
      memory: "256Mi"
      cpu: "100m"
