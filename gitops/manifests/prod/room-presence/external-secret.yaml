---
# Room Presence Tracker アプリケーション用シークレット
# Infisical の prod 環境から取得する
#
# AUTHENTIK_CLIENT_SECRET は Authentik 側 (authentik_apps.tf の room_presence Provider) の
# client_secret と同一の値を Terraform が var.authentik_room_presence_client_secret
# (Infisical キー: TF_VAR_authentik_room_presence_client_secret) として使っている。
# 重複キーを作らないため、ここも同じキーを直接参照する。
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: presence-secrets
  namespace: prod
  annotations:
    argocd.argoproj.io/sync-options: Replace=true
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: presence-secrets
    creationPolicy: Owner
  data:
    - secretKey: AUTH_SECRET
      remoteRef:
        key: PRESENCE_AUTH_SECRET
    - secretKey: AUTHENTIK_CLIENT_SECRET
      remoteRef:
        key: TF_VAR_authentik_room_presence_client_secret
    - secretKey: AUTHENTIK_API_TOKEN
      remoteRef:
        key: PRESENCE_AUTHENTIK_API_TOKEN
    - secretKey: RESET_SECRET
      remoteRef:
        key: PRESENCE_RESET_SECRET
    - secretKey: DISCORD_BOT_TOKEN
      remoteRef:
        key: PRESENCE_DISCORD_BOT_TOKEN
