---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: roundcube-secrets
  namespace: prod
  annotations:
    argocd.argoproj.io/sync-options: Replace=true
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: roundcube-secrets
    creationPolicy: Owner
  data:
    # aramakisai-mail OAuth2 クライアントシークレット (Confidential client)
    - secretKey: MAIL_OAUTH2_CLIENT_SECRET
      remoteRef:
        key: MAIL_OAUTH2_CLIENT_SECRET
    # セッション暗号化キー — 正確に 24 文字のランダム文字列
    # 生成例: openssl rand -base64 18
    - secretKey: ROUNDCUBE_DES_KEY
      remoteRef:
        key: ROUNDCUBE_DES_KEY
