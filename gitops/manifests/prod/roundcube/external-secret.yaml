---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: roundcube-secrets
  namespace: prod
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: roundcube-secrets
    creationPolicy: Owner
  data:
    # Authentik OAuth2 プロバイダー (slug: aramakisai-mail) のクライアントシークレット
    # Roundcube・Thunderbird 共用アプリ
    - secretKey: MAIL_OAUTH2_CLIENT_SECRET
      remoteRef:
        key: MAIL_OAUTH2_CLIENT_SECRET
    # セッション暗号化キー — 正確に 24 文字のランダム文字列
    # 生成例: openssl rand -base64 18
    - secretKey: ROUNDCUBE_DES_KEY
      remoteRef:
        key: ROUNDCUBE_DES_KEY
