---
# Directus staging自動凍結機能 (GitHub App 認証) 用 ExternalSecret。
# ArgoCD ApplicationSet と同じ Infisical の鍵を再利用し、staging namespace に同期する。
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: directus-staging-freeze-sync-github-app
  namespace: staging
  annotations:
    argocd.argoproj.io/sync-options: Replace=true
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: directus-staging-freeze-sync-github-app
    creationPolicy: Owner
  data:
    - secretKey: githubAppID
      remoteRef:
        key: ARGOCD_APPLICATIONSET_GITHUB_APP_ID
    - secretKey: githubAppInstallationID
      remoteRef:
        key: ARGOCD_APPLICATIONSET_GITHUB_APP_INSTALLATION_ID
    - secretKey: githubAppPrivateKey
      remoteRef:
        key: ARGOCD_APPLICATIONSET_GITHUB_APP_PRIVATE_KEY
