---
# アクティブな directus-schema-* PRがない間、Directus staging の directus Deploymentを
# replicas=0 に自動スケールダウンする。DBは常時起動を維持
# (schema-apply Job / PR毎のephemeral検証Jobが常にDBに接続する必要があるため)。
# gitops/apps/staging/directus.yaml の ignoreDifferences で /spec/replicas はGit管理外として既に除外済み。
apiVersion: batch/v1
kind: CronJob
metadata:
  name: directus-staging-freeze-sync
  namespace: staging
spec:
  schedule: "*/5 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        spec:
          serviceAccountName: directus-staging-freeze-sync
          restartPolicy: Never
          containers:
            - name: sync
              image: alpine/k8s:1.36.2
              command: ["python3", "/scripts/sync.py"]
              env:
                - name: GITHUB_APP_ID
                  valueFrom:
                    secretKeyRef:
                      name: directus-staging-freeze-sync-github-app
                      key: githubAppID
                - name: GITHUB_APP_INSTALLATION_ID
                  valueFrom:
                    secretKeyRef:
                      name: directus-staging-freeze-sync-github-app
                      key: githubAppInstallationID
                - name: GITHUB_APP_PRIVATE_KEY
                  valueFrom:
                    secretKeyRef:
                      name: directus-staging-freeze-sync-github-app
                      key: githubAppPrivateKey
              volumeMounts:
                - name: script
                  mountPath: /scripts
              resources:
                requests:
                  cpu: 10m
                  memory: 64Mi
                limits:
                  cpu: 200m
                  memory: 128Mi
          volumes:
            - name: script
              configMap:
                name: directus-staging-freeze-sync-script
