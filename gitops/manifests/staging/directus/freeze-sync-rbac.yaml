---
# Directus staging自動凍結機能 用の ServiceAccount と RBAC。
# directus Deployment に対する get, scale (patch) のみを許可する最小権限。
apiVersion: v1
kind: ServiceAccount
metadata:
  name: directus-staging-freeze-sync
  namespace: staging
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: directus-staging-freeze-sync
  namespace: staging
rules:
  - apiGroups: ["apps"]
    resources: ["deployments", "deployments/scale"]
    resourceNames: ["directus"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: directus-staging-freeze-sync
  namespace: staging
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: directus-staging-freeze-sync
subjects:
  - kind: ServiceAccount
    name: directus-staging-freeze-sync
    namespace: staging
