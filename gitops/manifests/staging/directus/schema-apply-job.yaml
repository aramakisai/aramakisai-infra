---
# Directus スキーマ適用 PostSync Job (staging)
# ArgoCD sync 後に自動実行: schema apply + migration
# schema-configmap.yaml が更新されるたびに再実行される
#
# カスタム migration (extensions/migrations/*.js) は `directus database
# migrate:latest` / `bootstrap` 経由では実行されない。この Directus バージョンでは
# 起動時に `select "version" from directus_migrations`(ORDER BY なし)の結果で
# 「outstanding migrations あり」と誤判定し、"Skipping CLI extensions
# initialization due to outstanding migrations." のログとともに拡張機能
# (custom migrations 含む) のロード自体を毎回スキップしてしまう既知動作のため。
# 回避策として、Directus 内蔵の knex を直接 require し、migration ファイルを
# ESM (.mjs) としてコピーした上で up() を直接呼び出す。
apiVersion: batch/v1
kind: Job
metadata:
  name: directus-schema-apply
  namespace: staging
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
spec:
  ttlSecondsAfterFinished: 3600
  backoffLimit: 1
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: schema-apply
          image: directus/directus:12.1.1
          command: [sh, -c]
          args:
            - |
              set -euo pipefail
              echo "[1/3] Applying schema snapshot..."
              node /directus/cli.js schema apply --yes /snapshot/snapshot.yaml
              echo "[2/3] Running core database migrations..."
              node /directus/cli.js database migrate:latest

              echo "[3/3] Running custom migrations (extensions/migrations)..."
              mkdir -p /tmp/mig
              for f in /directus/extensions/migrations/*.js; do
                base=$(basename "$f" .js)
                cp "$f" "/tmp/mig/${base}.mjs"
              done
              node -e '
              const knex = require("/directus/node_modules/.pnpm/node_modules/knex")({
                client: "pg",
                connection: {
                  host: process.env.DB_HOST,
                  port: Number(process.env.DB_PORT),
                  database: process.env.DB_DATABASE,
                  user: process.env.DB_USER,
                  password: process.env.DB_PASSWORD,
                },
              });
              (async () => {
                const fs = require("fs");
                const files = fs.readdirSync("/tmp/mig").sort();
                for (const f of files) {
                  console.log("Running custom migration:", f);
                  const mod = await import("/tmp/mig/" + f);
                  await mod.up(knex);
                }
                await knex.destroy();
                console.log("Custom migrations done.");
              })().catch((err) => {
                console.error(err);
                process.exit(1);
              });
              '
              echo "Done."
          envFrom:
            - secretRef:
                name: directus-staging-secrets
          env:
            - name: DB_CLIENT
              value: pg
            - name: DB_HOST
              value: directus-staging-db-rw.staging.svc.cluster.local
            - name: DB_PORT
              value: "5432"
            - name: DB_DATABASE
              value: directus
            - name: DB_USER
              value: directus
            - name: EXTENSIONS_PATH
              value: /directus/extensions
          volumeMounts:
            - name: snapshot
              mountPath: /snapshot
              readOnly: true
            - name: migrations
              mountPath: /directus/extensions/migrations
              readOnly: true
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "250m"
      volumes:
        - name: snapshot
          configMap:
            name: directus-schema
        - name: migrations
          configMap:
            name: directus-migrations
            optional: true
