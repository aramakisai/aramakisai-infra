---
# Directus Staging
# prod とは別 DB・別 Secret を使用
# staging から prod へのアクセス禁止
apiVersion: apps/v1
kind: Deployment
metadata:
  name: directus
  namespace: staging
  labels:
    app: directus
    env: staging
spec:
  replicas: 1
  selector:
    matchLabels:
      app: directus
      env: staging
  template:
    metadata:
      labels:
        app: directus
        env: staging
    spec:
      containers:
        - name: directus
          image: directus/directus:11.1.2
          ports:
            - containerPort: 8055
          envFrom:
            - secretRef:
                name: directus-staging-secrets
          env:
            - name: DB_CLIENT
              value: pg
            - name: DB_HOST
              value: directus-staging-db-rw.staging.svc.cluster.local
            - name: DB_PORT
              value: "5432"
            - name: DB_DATABASE
              value: directus
            - name: DB_USER
              value: directus
            - name: PUBLIC_URL
              value: https://stg-api.aramakisai.com
            - name: CORS_ENABLED
              value: "true"
            - name: CORS_ORIGIN
              value: "*"
            # Authentik OIDC SSO
            - name: AUTH_PROVIDERS
              value: authentik
            - name: AUTH_AUTHENTIK_DRIVER
              value: openid
            - name: AUTH_AUTHENTIK_CLIENT_ID
              value: directus-stg
            - name: AUTH_AUTHENTIK_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: directus-staging-secrets
                  key: AUTH_AUTHENTIK_CLIENT_SECRET
            - name: AUTH_AUTHENTIK_ISSUER_URL
              value: https://idp.aramakisai.com/application/o/directus-stg/
            - name: AUTH_AUTHENTIK_IDENTIFIER_KEY
              value: email
            - name: AUTH_AUTHENTIK_ALLOW_PUBLIC_REGISTRATION
              value: "true"
            # AUTH_AUTHENTIK_ROLE_CLAIM は Directus に存在しない変数名だったため、
            # groups クレームが一切 role に変換されず role=null で全ユーザーが作成される
            # バグを生んでいた (2026-07-18 発覚)。正しくは GROUP_CLAIM_NAME (デフォルト groups) +
            # ROLE_MAPPING の組み合わせ。role id は migrations-configmap.yaml の
            # EXECUTIVE_ROLE_ID / STUDENT_EXHIBITOR_ROLE_ID と一致させること。
            - name: AUTH_AUTHENTIK_ROLE_MAPPING
              value: '{"executive": "65869bf1-6622-4bab-8aec-785d0db2c32a", "student_exhibitor": "49c93d00-c61f-418b-a1db-5118260f4667"}'
            - name: STORAGE_LOCATIONS
              value: local
            - name: STORAGE_LOCAL_ROOT
              value: /directus/uploads
          volumeMounts:
            - name: uploads
              mountPath: /directus/uploads
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
      volumes:
        - name: uploads
          emptyDir: {}   # staging はデータ永続化不要
