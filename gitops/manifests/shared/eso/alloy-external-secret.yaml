---
# Grafana Alloy 用シークレット (Loki / Prometheus 接続情報)
# monitoring namespace に alloy-secrets Secret を展開する
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: alloy-secrets
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: alloy-secrets
    creationPolicy: Owner
  data:
    - secretKey: LOKI_URL
      remoteRef:
        key: LOKI_URL
    - secretKey: LOKI_USERNAME
      remoteRef:
        key: LOKI_USERNAME
    - secretKey: LOKI_PASSWORD
      remoteRef:
        key: LOKI_PASSWORD
    - secretKey: PROMETHEUS_REMOTE_WRITE_URL
      remoteRef:
        key: PROMETHEUS_REMOTE_WRITE_URL
    - secretKey: PROMETHEUS_USERNAME
      remoteRef:
        key: PROMETHEUS_USERNAME
    - secretKey: PROMETHEUS_PASSWORD
      remoteRef:
        key: PROMETHEUS_PASSWORD
