---
# ClusterSecretStore — Infisical 接続設定
#
# 前提: infisical-auth Secret は Ansible (Play 6) が以下で作成済み:
#   kubectl create secret generic infisical-auth
#     --from-literal=clientId=<INFISICAL_CLIENT_ID>
#     --from-literal=clientSecret=<INFISICAL_CLIENT_SECRET>
#     -n argocd
#
# このリソースは ESO が CRD を提供した後 (wave -1 の後半) に適用される。
# ArgoCD の retry 設定により、ESO の CRD が揃うまで自動でリトライする。
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: infisical
spec:
  provider:
    infisical:
      auth:
        universalAuthCredentials:
          clientId:
            name: infisical-auth
            namespace: argocd
            key: clientId
          clientSecret:
            name: infisical-auth
            namespace: argocd
            key: clientSecret
      secretsScope:
        projectSlug: aramakisai-infra   # Infisical プロジェクトの slug (URL で確認)
        environmentSlug: prod
