---
# Hetzner Object Storage 認証情報 (CNPG barman / VolSync restic 共通)
# prod namespace に hetzner-os-credentials Secret を展開する
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: hetzner-os-credentials
  namespace: prod
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: hetzner-os-credentials
    creationPolicy: Owner
  data:
    - secretKey: ACCESS_KEY_ID
      remoteRef:
        key: HETZNER_OS_ACCESS_KEY_ID
    - secretKey: SECRET_ACCESS_KEY
      remoteRef:
        key: HETZNER_OS_SECRET_ACCESS_KEY
    - secretKey: REGION
      remoteRef:
        key: HETZNER_OS_REGION
