---
# Falcosidekick が config.existingSecret として envFrom で読み込むSecret
# DISCORD_OPS_WEBHOOK_URL は Falcosidekick/Healthchecks.io/dr-trigger で共有するWebhook
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: falcosidekick-secrets
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: falcosidekick-secrets
    creationPolicy: Owner
  data:
    - secretKey: DISCORD_WEBHOOKURL
      remoteRef:
        key: DISCORD_OPS_WEBHOOK_URL
