---
# Netdata Cloud Claim 用シークレット (Claim Token / Room ID)
# monitoring namespace に netdata-secrets Secret を展開する
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: netdata-secrets
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: netdata-secrets
    creationPolicy: Owner
  data:
    - secretKey: NETDATA_CLAIM_TOKEN
      remoteRef:
        key: NETDATA_CLAIM_TOKEN
    - secretKey: NETDATA_CLAIM_ROOMS
      remoteRef:
        key: NETDATA_CLAIM_ROOMS
