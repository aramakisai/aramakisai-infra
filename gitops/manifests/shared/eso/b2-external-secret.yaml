---
# Backblaze B2 認証情報 (CNPG barman / VolSync restic / rclone 共通)
# prod namespace に b2-credentials Secret を展開する
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: b2-credentials
  namespace: prod
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: b2-credentials
    creationPolicy: Owner
  data:
    - secretKey: ACCESS_KEY_ID
      remoteRef:
        key: B2_KEY_ID
    - secretKey: SECRET_ACCESS_KEY
      remoteRef:
        key: B2_APPLICATION_KEY
