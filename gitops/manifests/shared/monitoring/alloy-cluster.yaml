---
# Alloy クラスター集計用 Deployment (1レプリカ)
# kube-state-metrics など 1台のみがスクレイプすべきクラスター全体メトリクスを担当する
apiVersion: v1
kind: ConfigMap
metadata:
  name: alloy-cluster-config
  namespace: monitoring
data:
  config.alloy: |
    prometheus.remote_write "default" {
      endpoint {
        url = env("PROMETHEUS_REMOTE_WRITE_URL")
        basic_auth {
          username = env("PROMETHEUS_USERNAME")
          password = env("PROMETHEUS_PASSWORD")
        }
      }
    }

    // kube-state-metrics — Pod/Deployment/Node 等の Kubernetes オブジェクト状態
    prometheus.scrape "kube_state_metrics" {
      targets = [{
        __address__ = "kube-state-metrics.monitoring.svc.cluster.local:8080",
      }]
      forward_to = [prometheus.remote_write.default.receiver]
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alloy-cluster
  namespace: monitoring
  labels:
    app: alloy-cluster
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alloy-cluster
  template:
    metadata:
      labels:
        app: alloy-cluster
    spec:
      serviceAccountName: alloy
      containers:
        - name: alloy
          image: grafana/alloy:v1.3.1
          args:
            - run
            - /etc/alloy/config.alloy
          envFrom:
            - secretRef:
                name: alloy-secrets
          volumeMounts:
            - name: config
              mountPath: /etc/alloy
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
      volumes:
        - name: config
          configMap:
            name: alloy-cluster-config
