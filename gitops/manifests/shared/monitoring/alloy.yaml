---
# Grafana Alloy — メトリクス・ログ収集エージェント
# DaemonSet で全ノードにデプロイし、Pod ログとノードメトリクスを収集する
apiVersion: v1
kind: Namespace
metadata:
  name: monitoring
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: alloy-config
  namespace: monitoring
data:
  config.alloy: |
    // ───── ログ収集 ─────

    discovery.kubernetes "pods" {
      role = "pod"
    }

    loki.source.kubernetes "pods" {
      targets    = discovery.kubernetes.pods.targets
      forward_to = [loki.write.default.receiver]
    }

    loki.write "default" {
      endpoint {
        url = env("LOKI_URL")
        basic_auth {
          username = env("LOKI_USERNAME")
          password = env("LOKI_PASSWORD")
        }
      }
    }

    // ───── Prometheus remote write ─────

    prometheus.remote_write "default" {
      endpoint {
        url = env("PROMETHEUS_REMOTE_WRITE_URL")
        basic_auth {
          username = env("PROMETHEUS_USERNAME")
          password = env("PROMETHEUS_PASSWORD")
        }
      }
    }

    // ───── メトリクスフィルタリング (relabel) ─────

    prometheus.relabel "keep_essential_metrics" {
      forward_to = [prometheus.remote_write.default.receiver]

      // 必要な主要メトリクスのみをホワイトリスト形式で保持
      rule {
        source_labels = ["__name__"]
        regex         = "(container_cpu_usage_seconds_total|container_memory_working_set_bytes|container_fs_usage_bytes|container_fs_limit_bytes|container_network_receive_bytes_total|container_network_transmit_bytes_total|kubelet_running_pods|kubelet_volume_stats_used_bytes|kubelet_volume_stats_capacity_bytes|node_cpu_seconds_total|node_memory_Active_bytes|node_memory_MemTotal_bytes|node_memory_MemAvailable_bytes|node_filesystem_size_bytes|node_filesystem_free_bytes|node_load1|node_load5|node_load15|node_disk_io_time_seconds_total|node_disk_read_bytes_total|node_disk_written_bytes_total|alloy_build_info)"
        action        = "keep"
      }
    }

    // ───── Alloy 自身のメトリクス ─────

    prometheus.scrape "alloy_self" {
      targets = [{ __address__ = "localhost:12345" }]
      forward_to = [prometheus.relabel.keep_essential_metrics.receiver]
    }

    // ───── ノードメトリクス (unix exporter — 自ノードのみ) ─────

    prometheus.exporter.unix "node" {}

    prometheus.scrape "node_unix" {
      targets    = prometheus.exporter.unix.node.targets
      forward_to = [prometheus.relabel.keep_essential_metrics.receiver]
    }

    // ───── kubelet / cAdvisor (API サーバープロキシ経由・自ノードのみ) ─────
    // 直接 10250 ポートに接続するのではなく kubernetes.default.svc をプロキシとして使う

    discovery.kubernetes "nodes" {
      role = "node"
    }

    discovery.relabel "kubelet_node" {
      targets = discovery.kubernetes.nodes.targets
      rule {
        source_labels = ["__meta_kubernetes_node_name"]
        action        = "keep"
        regex         = env("MY_NODE_NAME")
      }
      rule {
        replacement  = "kubernetes.default.svc:443"
        target_label = "__address__"
      }
      rule {
        source_labels = ["__meta_kubernetes_node_name"]
        regex         = "(.+)"
        replacement   = "/api/v1/nodes/${1}/proxy/metrics"
        target_label  = "__metrics_path__"
      }
    }

    discovery.relabel "cadvisor_node" {
      targets = discovery.kubernetes.nodes.targets
      rule {
        source_labels = ["__meta_kubernetes_node_name"]
        action        = "keep"
        regex         = env("MY_NODE_NAME")
      }
      rule {
        replacement  = "kubernetes.default.svc:443"
        target_label = "__address__"
      }
      rule {
        source_labels = ["__meta_kubernetes_node_name"]
        regex         = "(.+)"
        replacement   = "/api/v1/nodes/${1}/proxy/metrics/cadvisor"
        target_label  = "__metrics_path__"
      }
    }

    prometheus.scrape "kubelet" {
      targets   = discovery.relabel.kubelet_node.output
      scheme    = "https"
      bearer_token_file = "/var/run/secrets/kubernetes.io/serviceaccount/token"
      tls_config {
        ca_file = "/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
      }
      forward_to = [prometheus.relabel.keep_essential_metrics.receiver]
    }

    prometheus.scrape "cadvisor" {
      targets   = discovery.relabel.cadvisor_node.output
      scheme    = "https"
      bearer_token_file = "/var/run/secrets/kubernetes.io/serviceaccount/token"
      tls_config {
        ca_file = "/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
      }
      forward_to = [prometheus.relabel.keep_essential_metrics.receiver]
    }

    // ───── ArgoCD メトリクス ─────
    // DaemonSet 全 Pod がスクレイプするが ArgoCD メトリクス is small-scale so acceptable

    prometheus.scrape "argocd" {
      targets = [
        {__address__ = "argocd-metrics.argocd.svc.cluster.local:8082"},
        {__address__ = "argocd-server-metrics.argocd.svc.cluster.local:8083"},
        {__address__ = "argocd-repo-server.argocd.svc.cluster.local:8084"},
      ]
      forward_to = [prometheus.relabel.keep_essential_metrics.receiver]
    }
---
# DaemonSet "alloy" は Grafana Cloud 利用停止 (無料枠超過のためアカウント削除依頼中) により停止。
# ConfigMap / RBAC は VictoriaMetrics 等への移行検討用に残す。
apiVersion: v1
kind: ServiceAccount
metadata:
  name: alloy
  namespace: monitoring
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: alloy
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "nodes", "nodes/metrics", "nodes/proxy", "namespaces", "endpoints", "services"]
    verbs: ["get", "list", "watch"]
  - nonResourceURLs: ["/metrics", "/metrics/cadvisor"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: alloy
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: alloy
subjects:
  - kind: ServiceAccount
    name: alloy
    namespace: monitoring
