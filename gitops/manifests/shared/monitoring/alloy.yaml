---
# Grafana Alloy — メトリクス・ログ収集エージェント
# DaemonSet で全ノードにデプロイし、Pod ログとノードメトリクスを収集する
apiVersion: v1
kind: Namespace
metadata:
  name: monitoring
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: alloy-config
  namespace: monitoring
data:
  config.alloy: |
    // ───── ログ収集 ─────

    discovery.kubernetes "pods" {
      role = "pod"
    }

    loki.source.kubernetes "pods" {
      targets    = discovery.kubernetes.pods.targets
      forward_to = [loki.write.default.receiver]
    }

    loki.write "default" {
      endpoint {
        url = env("LOKI_URL")
        basic_auth {
          username = env("LOKI_USERNAME")
          password = env("LOKI_PASSWORD")
        }
      }
    }

    // ───── Prometheus remote write ─────

    prometheus.remote_write "default" {
      endpoint {
        url = env("PROMETHEUS_REMOTE_WRITE_URL")
        basic_auth {
          username = env("PROMETHEUS_USERNAME")
          password = env("PROMETHEUS_PASSWORD")
        }
      }
    }

    // ───── Alloy 自身のメトリクス ─────

    prometheus.scrape "alloy_self" {
      targets = [{ __address__ = "localhost:12345" }]
      forward_to = [prometheus.remote_write.default.receiver]
    }

    // ───── ノードメトリクス (unix exporter — 自ノードのみ) ─────

    prometheus.exporter.unix "node" {}

    prometheus.scrape "node_unix" {
      targets    = prometheus.exporter.unix.node.targets
      forward_to = [prometheus.remote_write.default.receiver]
    }

    // ───── kubelet / cAdvisor (自ノードのみ) ─────
    // MY_NODE_NAME Downward API でノード名を取得し、自ノードの IP のみ対象にする

    discovery.kubernetes "nodes" {
      role = "node"
    }

    discovery.relabel "local_node" {
      targets = discovery.kubernetes.nodes.targets
      rule {
        source_labels = ["__meta_kubernetes_node_name"]
        action        = "keep"
        regex         = env("MY_NODE_NAME")
      }
      rule {
        source_labels = ["__meta_kubernetes_node_address_InternalIP"]
        target_label  = "__address__"
        replacement   = "$1:10250"
      }
    }

    prometheus.scrape "kubelet" {
      targets   = discovery.relabel.local_node.output
      scheme    = "https"
      bearer_token_file = "/var/run/secrets/kubernetes.io/serviceaccount/token"
      tls_config { insecure_skip_verify = true }
      forward_to = [prometheus.remote_write.default.receiver]
    }

    prometheus.scrape "cadvisor" {
      targets      = discovery.relabel.local_node.output
      scheme       = "https"
      metrics_path = "/metrics/cadvisor"
      bearer_token_file = "/var/run/secrets/kubernetes.io/serviceaccount/token"
      tls_config { insecure_skip_verify = true }
      forward_to = [prometheus.remote_write.default.receiver]
    }

    // ───── ArgoCD メトリクス ─────
    // DaemonSet 全 Pod がスクレイプするが ArgoCD メトリクスは小規模のため許容

    prometheus.scrape "argocd" {
      targets = [
        {__address__ = "argocd-metrics.argocd.svc.cluster.local:8082"},
        {__address__ = "argocd-server-metrics.argocd.svc.cluster.local:8083"},
        {__address__ = "argocd-repo-server.argocd.svc.cluster.local:8084"},
      ]
      forward_to = [prometheus.remote_write.default.receiver]
    }
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: alloy
  namespace: monitoring
  labels:
    app: alloy
spec:
  selector:
    matchLabels:
      app: alloy
  template:
    metadata:
      labels:
        app: alloy
    spec:
      serviceAccountName: alloy
      containers:
        - name: alloy
          image: grafana/alloy:v1.3.1
          args:
            - run
            - /etc/alloy/config.alloy
          env:
            - name: MY_NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          envFrom:
            - secretRef:
                name: alloy-secrets   # ESO が生成
          volumeMounts:
            - name: config
              mountPath: /etc/alloy
            - name: varlog
              mountPath: /var/log
              readOnly: true
            - name: proc
              mountPath: /proc
              readOnly: true
            - name: sys
              mountPath: /sys
              readOnly: true
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
      volumes:
        - name: config
          configMap:
            name: alloy-config
        - name: varlog
          hostPath:
            path: /var/log
        - name: proc
          hostPath:
            path: /proc
        - name: sys
          hostPath:
            path: /sys
      tolerations:
        - operator: Exists   # 全ノードにデプロイ (taint があっても)
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: alloy
  namespace: monitoring
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: alloy
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "nodes", "nodes/metrics", "namespaces", "endpoints", "services"]
    verbs: ["get", "list", "watch"]
  - nonResourceURLs: ["/metrics", "/metrics/cadvisor"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: alloy
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: alloy
subjects:
  - kind: ServiceAccount
    name: alloy
    namespace: monitoring
