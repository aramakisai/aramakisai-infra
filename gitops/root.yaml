---
# App of Apps エントリーポイント
# Ansible の Play 5 で kubectl apply -n argocd -f gitops/root.yaml として一度だけ適用する。
# 以降は ArgoCD が gitops/apps/ を監視して自律的に sync する。
#
# このファイル自体は gitops/apps/ の外に置くことで、
# root Application が自分自身を再帰的に apply するループを防ぐ。
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/aramakisai/aramakisai-infra
    targetRevision: main
    path: gitops/apps
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
