# Authentik Helm values — prod
# Chart: https://charts.goauthentik.io (authentik)

authentik:
  # シークレットキー (secretKeyRef で注入するためここには書かない)
  secret_key: ""

  # PostgreSQL: CNPG Cluster を使用 (subchart の PostgreSQL は無効)
  postgresql:
    host: authentik-db-rw.prod.svc.cluster.local
    port: 5432
    name: authentik
    user: authentik
    # password は secretKeyRef で注入するためここには書かない
    # (envFrom の $(VAR) 置換は Kubernetes では動作しないため)

  # Redis: subchart を使用
  redis:
    host: "{{ .Release.Name }}-redis-master"

  # ログレベル
  log_level: info

# Bitnami Redis subchart は無効化
# Docker Hub から Bitnami Redis イメージが撤退したため、
# gitops/manifests/prod/authentik/redis.yaml で公式 redis:7-alpine を直接管理する。
# サービス名 authentik-redis-master に合わせて authentik.redis.host は変更不要。
redis:
  enabled: false

# PostgreSQL subchart は CNPG を使うため無効化
postgresql:
  enabled: false

# Server
server:
  replicas: 1
  resources:
    requests:
      memory: "500Mi"
      cpu: "250m"
    limits:
      # 実使用量は約512Mi (single tenant)。chart既定2Giはノードの151%オーバーコミットの
      # 主要因だったため、実使用量+余裕を見て1Giへ削減。
      memory: "1Gi"
      cpu: "1500m"
  # DB パスワードは secretKeyRef で直接注入 (envFrom の $(VAR) 置換は不可)
  env:
    - name: AUTHENTIK_POSTGRESQL__PASSWORD
      valueFrom:
        secretKeyRef:
          name: authentik-secrets
          key: DB_PASSWORD
    - name: AUTHENTIK_SECRET_KEY
      valueFrom:
        secretKeyRef:
          name: authentik-secrets
          key: AUTHENTIK_SECRET_KEY
    - name: AUTHENTIK_WEB__WORKERS
      value: "1"
    - name: AUTHENTIK_EMAIL__HOST
      value: "mailserver.prod.svc.cluster.local"
    - name: AUTHENTIK_EMAIL__PORT
      value: "587"
    - name: AUTHENTIK_EMAIL__USERNAME
      value: "noreply"
    - name: AUTHENTIK_EMAIL__PASSWORD
      valueFrom:
        secretKeyRef:
          name: authentik-secrets
          key: NOREPLY_SMTP_PASSWORD
    - name: AUTHENTIK_EMAIL__FROM
      value: "noreply@aramakisai.com"
  envFrom:
    - secretRef:
        name: authentik-secrets   # ESO が生成: AUTHENTIK_SECRET_KEY, DB_PASSWORD
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchLabels:
                cnpg.io/cluster: authentik-db
            topologyKey: kubernetes.io/hostname

# Worker
worker:
  replicas: 1
  resources:
    requests:
      memory: "500Mi"
      cpu: "200m"
    limits:
      # 実使用量は約279Mi。chart既定2Giはノードの151%オーバーコミットの
      # 主要因だったため、実使用量+余裕を見て768Miへ削減。
      memory: "768Mi"
      cpu: "1000m"
  env:
    - name: AUTHENTIK_POSTGRESQL__PASSWORD
      valueFrom:
        secretKeyRef:
          name: authentik-secrets
          key: DB_PASSWORD
    - name: AUTHENTIK_SECRET_KEY
      valueFrom:
        secretKeyRef:
          name: authentik-secrets
          key: AUTHENTIK_SECRET_KEY
    - name: AUTHENTIK_EMAIL__HOST
      value: "mailserver.prod.svc.cluster.local"
    - name: AUTHENTIK_EMAIL__PORT
      value: "587"
    - name: AUTHENTIK_EMAIL__USERNAME
      value: "noreply"
    - name: AUTHENTIK_EMAIL__PASSWORD
      valueFrom:
        secretKeyRef:
          name: authentik-secrets
          key: NOREPLY_SMTP_PASSWORD
    - name: AUTHENTIK_EMAIL__FROM
      value: "noreply@aramakisai.com"
  envFrom:
    - secretRef:
        name: authentik-secrets
