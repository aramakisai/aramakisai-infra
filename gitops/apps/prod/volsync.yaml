---
# VolSync — PVC バックアップ/レプリケーション operator
# wave: -1 — ReplicationSource CRD を stalwart より先に提供する
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: volsync
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://backube.github.io/helm-charts
    chart: volsync
    targetRevision: "0.9.*"
  destination:
    server: https://kubernetes.default.svc
    namespace: volsync
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
