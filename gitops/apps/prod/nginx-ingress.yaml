---
# nginx-ingress — SNI 対応 TLS リバースプロキシ
# wave: 1 — stalwart (wave: 0) が port 443 を解放してから起動
#
# hostNetwork: true で prod-node-1 の port 443/80 を直接バインドする。
# K3s + Cilium 環境では hostPort が機能しないため hostNetwork を使用。
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nginx-ingress
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://kubernetes.github.io/ingress-nginx
    chart: ingress-nginx
    targetRevision: "4.12.*"
    helm:
      valuesObject:
        controller:
          kind: DaemonSet
          hostNetwork: true
          dnsPolicy: ClusterFirstWithHostNet
          nodeSelector:
            kubernetes.io/hostname: prod-node-1
          # hostPort は K3s + Cilium で機能しない (スケジューラーがポート衝突判定)
          # hostNetwork: true だけで十分なため hostPort を無効化
          hostPort:
            enabled: false
          # admission webhook を無効化:
          # stalwart sync 時に nginx-ingress がまだ起動していないと循環デッドロックになるため
          # (stalwart sync → Ingress webhook → nginx-ingress 未起動 → 失敗 → port 443 解放されず)
          admissionWebhooks:
            enabled: false
          # ClusterIP のみ: hostNetwork で直接バインドするため外部 LB は不要
          service:
            enabled: true
            type: ClusterIP
          # IngressClass "nginx" を default に設定
          ingressClassResource:
            name: nginx
            enabled: true
            default: true
          # Cloudflare CDN (proxied=false のため実 IP が到達する)
          config:
            use-forwarded-headers: "false"
            # proxy-real-ip-cidr はアップストリームが Cloudflare Tunnel を使う場合のみ設定
          # リソース制限
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
  destination:
    server: https://kubernetes.default.svc
    namespace: ingress-nginx
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
