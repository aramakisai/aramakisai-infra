---
# cloudflared — Cloudflare Tunnel
# wave: 0 — Ansible がブートストラップ時に起動したリソースを ArgoCD が adopt する
#
# Ansible bootstrap フロー:
#   1. Ansible が gitops/manifests/prod/cloudflared/ を kubectl apply で適用
#   2. ArgoCD (この Application) が sync すると、既存リソースの
#      argocd.argoproj.io/managed-by アノテーションを確認して adopt 完了
#   3. 以降は ArgoCD が管理
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cloudflared
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/aramakisai/aramakisai-infra
    targetRevision: main
    path: gitops/manifests/prod/cloudflared
  destination:
    server: https://kubernetes.default.svc
    namespace: cloudflared
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
