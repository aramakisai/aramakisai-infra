---
# Stalwart Ingress ルール — nginx-ingress 経由で port 443 を公開
# wave: 2 — nginx-ingress (wave: 1) が Ready になってから適用
#
# wave 0 (stalwart) でリソースを揃えて PostSync job で port 8080 に切り替え、
# wave 1 (nginx-ingress) が port 443 をバインドした後に Ingress を作成する。
# こうすることで循環デッドロックを回避する:
#   stalwart health check が Ingress に依存しなくなる
#   → PostSync job が確実に実行される
#   → port 443 が解放される
#   → nginx-ingress が起動できる
#   → Ingress が有効になる
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: stalwart-ingress
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: git@github.com:aramakisai/aramakisai-infra.git
    targetRevision: main
    path: gitops/manifests/prod/stalwart-ingress
  destination:
    server: https://kubernetes.default.svc
    namespace: prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true
