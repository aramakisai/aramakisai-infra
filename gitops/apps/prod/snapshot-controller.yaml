---
# external-snapshotter — VolumeSnapshot CRD + snapshot-controller
# wave: -1 — VolSync が VolumeSnapshot リソースを監視するために先にインストールする
# K3s はデフォルトで snapshot-controller を含まないため別途インストールが必要
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: snapshot-controller
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://piraeus.io/helm-charts
    chart: snapshot-controller
    targetRevision: "2.*"
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true
