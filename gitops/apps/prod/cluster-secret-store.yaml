---
# ClusterSecretStore (Infisical 接続設定)
# wave: -1 — ESO CRD が揃った後に適用する (ESO と同じ wave だが数値的に後)
#
# 前提: infisical-auth Secret は Ansible (Play 5) が kubectl apply で作成済み。
#       この Secret だけは ESO を経由しない唯一の Secret。
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cluster-secret-store
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: git@github.com:aramakisai/aramakisai-infra.git
    targetRevision: main
    path: gitops/manifests/shared/eso
  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 10
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m
    syncOptions:
      - ServerSideApply=true
