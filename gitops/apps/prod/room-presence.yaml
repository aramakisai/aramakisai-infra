---
# Room Presence Tracker — 実行委員室 在室管理
# wave: 0 — DB (room-presence-db, wave -1) が揃った後にデプロイ
#
# room-presence-tracker repo の Helm chart のみを source とする。
# CNPG Cluster / ExternalSecret は room-presence-db.yaml (wave -1) に分離済み
# (migrate Job が pre-install/pre-upgrade hook = PreSync のため、
#  同一 Application 内で DB を Sync フェーズに置くと DB 未作成のまま
#  migrate Job が走り永久に失敗するため)
# 本番固有の値 (イメージリポジトリ・Authentik 接続情報など) は helm.valuesObject で上書きする
# (room-presence-tracker repo の values.yaml はテンプレートのプレースホルダーのまま保つ方針)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: room-presence
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: git@github.com:aramakisai/room-presence-tracker.git
    targetRevision: main
    path: helm/room-presence
    helm:
      valuesObject:
        image:
          repository: ghcr.io/aramakisai/room-presence-tracker
        migrate:
          image:
            repository: ghcr.io/aramakisai/room-presence-tracker-migrate
        app:
          config:
            AUTHENTIK_ISSUER: "https://idp.aramakisai.com/application/o/room-presence/"
            AUTHENTIK_CLIENT_ID: "aramakisai-room-presence"
            # Discord Bot 未作成のため空欄。作成後に値を設定すること
            DISCORD_APPLICATION_ID: ""
            DISCORD_PUBLIC_KEY: ""
            NEXT_PUBLIC_APP_URL: "https://presence.aramakisai.com"
  destination:
    server: https://kubernetes.default.svc
    namespace: prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
  ignoreDifferences:
    - group: external-secrets.io
      kind: ExternalSecret
      jqPathExpressions:
        - .spec.data[].remoteRef.conversionStrategy
        - .spec.data[].remoteRef.decodingStrategy
        - .spec.data[].remoteRef.metadataPolicy
        - .spec.target.deletionPolicy
