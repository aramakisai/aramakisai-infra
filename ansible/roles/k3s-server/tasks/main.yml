---
# K3s サーバーロール: インストールと初期設定

# 1. 前提パッケージのインストール
- name: 前提パッケージのインストール
  apt:
    name:
      - curl
      - open-iscsi   # Longhorn (分散ストレージ) 用
      - nfs-common   # NFS マウント用
    state: present
    update_cache: true

# 2. K3s 設定ディレクトリを作成
- name: K3s 設定ディレクトリを作成
  file:
    path: /etc/rancher/k3s
    state: directory
    owner: root
    group: root
    mode: '0755'

# 3. K3s config.yaml を配置 (インストール前に置くことでインストーラが読み込む)
- name: K3s config.yaml を配置
  template:
    src: config.yaml.j2
    dest: /etc/rancher/k3s/config.yaml
    owner: root
    group: root
    mode: '0600'
  notify: Restart k3s

# 4. K3s をインストール
# K3S_URL は設定しない: 環境変数に K3S_URL があると K3s インストールスクリプトが
# k3s-agent.service をインストールする (agent モード) ため、server モードにならない。
# join 先の URL は config.yaml の server: キーで指定する。
- name: K3s をインストール
  shell: curl -sfL https://get.k3s.io | sh -
  environment:
    INSTALL_K3S_VERSION: "{{ k3s_version }}"
    K3S_TOKEN: "{{ k3s_token }}"
  args:
    creates: /usr/local/bin/k3s
  register: k3s_install_result
  until: k3s_install_result is succeeded
  retries: 3
  delay: 10

# 5. config.yaml の変更を K3s に反映させる (wait_for より前にハンドラーを実行)
- name: ハンドラーを即時実行 (config 変更を反映)
  meta: flush_handlers

# 6. K3s サービスが起動するまで待機
- name: K3s サービスが起動するまで待機 (port 6443)
  wait_for:
    port: 6443
    host: "{{ ansible_host }}"
    timeout: 180
    state: started
    delay: 10
