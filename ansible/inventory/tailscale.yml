---
# Tailscale MagicDNS ベースのインベントリ
# SSH は Tailscale 経由のみ (ポート 22 はパブリックに閉じている)
#
# 注意: ansible_host の MagicDNS ホスト名は tailnet 固有の値です。
#       初回 terraform apply 後に tailscale admin console で確認し、
#       prod-node-1.tail<hash>.ts.net の形式に書き換えてください。
#
# 確認方法:
#   tailscale status
#   または https://login.tailscale.com/admin/machines で確認

all:
  children:
    # シングルノード構成 (CX33 8GB)
    # HA 復帰時は k3s_server_worker グループを追加し prod-node-2/3 を登録する
    k3s_server:
      hosts:
        prod-node-1:
          ansible_host: prod-node-1
          k3s_role: server
          k3s_cluster_init: true
          k3s_private_ip: 10.0.1.1  # Hetzner private network IP

  vars:
    ansible_user: root
    ansible_ssh_extra_args: "-o ConnectTimeout=10"
    k3s_version: v1.32.3+k3s1
    k3s_token: "{{ lookup('env', 'K3S_TOKEN') }}"  # Infisical または環境変数から取得
