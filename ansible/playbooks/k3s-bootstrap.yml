---
# K3s クラスタ全体の初期ブートストラップ Playbook
# 実行順序:
#   0. 全ノードに swap ファイルを作成 (ホスト側プロセスの OOM 安全弁) ・OS自動更新設定 (unattended-upgrades)
#   1. cp-node に K3s を --cluster-init でインストール (etcd 初期化)
#   2. prod-node-1/2 に K3s をローリングでインストール (etcd 参加 + ワークロード)
#   3. Cilium をインストール (flannel-backend: none のため CNI が必須 / ノードを Ready にする)
#   4. cloudflared を事前インストール (ArgoCD への外部アクセス経路を確保)
#   5. kubeconfig を手元に取得
#   6. ArgoCD をインストール・App of Apps を適用


# ============================================================
# Play 0: swap ファイル作成・OS自動更新設定 (全ノード共通)
# K3s インストール前に行う: kubelet-arg fail-swap-on=false を config.yaml に
# 設定済みでも、swap が無効な状態で K3s が先に起動していると反映には再起動が要る。
# 先に swap を有効化しておけば K3s は最初から swap 前提で起動する。
# ============================================================
- name: ホストの swap ファイル作成・OS自動更新設定
  hosts: all
  become: true
  vars:
    discord_ops_webhook_url: "{{ lookup('env', 'DISCORD_OPS_WEBHOOK_URL') }}"
  roles:
    - role: swap
    - role: os-auto-update


# ============================================================
# Play 1: K3s クラスタ初期化 (cp-node)
# ============================================================
- name: K3s server (cluster-init) のセットアップ
  hosts: k3s_server
  become: true
  roles:
    - role: k3s-server


# ============================================================
# Play 2: K3s server+worker ノード (prod-node-1/2) のセットアップ
# ============================================================
- name: K3s server+worker のセットアップ
  hosts: k3s_server_worker
  become: true
  serial: 1          # ローリングアップデート: 1台ずつ順番に処理
  roles:
    - role: k3s-server


# ============================================================
# Play 3: Cilium インストール
# flannel-backend: none のため、K3s は CNI を持たない。
# Cilium がいないとノードが NotReady のままで全 Pod が Pending になる。
# ArgoCD (GitOps) より先に Ansible で直接インストールする。
# ============================================================
- name: Cilium のインストール
  hosts: k3s_server
  run_once: true
  become: true
  vars:
    cilium_version: "1.17.3"
  tasks:
    - name: Helm がインストールされているか確認
      ansible.builtin.command: helm version --short
      register: helm_check
      failed_when: false
      changed_when: false

    - name: Helm をインストール
      ansible.builtin.shell: curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
      when: helm_check.rc != 0

    - name: Cilium Helm リポジトリを追加
      ansible.builtin.command: helm repo add cilium https://helm.cilium.io/
      changed_when: false

    - name: Helm リポジトリを更新
      ansible.builtin.command: helm repo update
      changed_when: false

    - name: Cilium をインストール (既にインストール済みの場合は upgrade)
      ansible.builtin.shell: >
        helm upgrade --install cilium cilium/cilium
        --version {{ cilium_version }}
        --namespace kube-system
        --set operator.replicas=1
        --set ipam.mode=kubernetes
        --set kubeProxyReplacement=false
        --wait --timeout=300s
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml

    - name: 全ノードが Ready になるまで待機
      ansible.builtin.command: kubectl wait node --all --for=condition=Ready --timeout=120s
      retries: 5
      delay: 10
      register: node_ready_result
      until: node_ready_result.rc == 0


# ============================================================
# Play 4: cloudflared 事前インストール
# ArgoCD より先にインストールし、外部アクセス経路を確保する
# ============================================================
- name: cloudflared の事前インストール
  hosts: k3s_server
  run_once: true
  become: true
  vars:
    cloudflared_tunnel_token: "{{ lookup('env', 'CLOUDFLARE_TUNNEL_TOKEN') }}"
    cloudflared_tunnel_id: "{{ lookup('env', 'CLOUDFLARE_TUNNEL_ID') }}"
  tasks:
    - name: cloudflared namespace 作成
      ansible.builtin.shell: >
        kubectl create namespace cloudflared --dry-run=client -o yaml
        | kubectl apply -f -

    - name: Cloudflare Tunnel token を Secret として登録
      ansible.builtin.shell: >
        kubectl create secret generic cloudflared-token
        --from-literal=token={{ cloudflared_tunnel_token }}
        -n cloudflared
        --dry-run=client -o yaml
        | kubectl apply -f -
      no_log: true

    - name: cloudflared マニフェストをノードに転送
      # Single Source of Truth: gitops/manifests/prod/cloudflared/ が唯一の定義場所
      # terraform/templates/cloudflared.yaml.j2 は廃止済み
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../../gitops/manifests/prod/cloudflared/"
        dest: /tmp/cloudflared/

    - name: cloudflared Deployment を適用
      ansible.builtin.command: kubectl apply -f /tmp/cloudflared/

    - name: cloudflared の ProgressDeadlineExceeded 条件をクリア
      # 過去の失敗 rollout に ProgressDeadlineExceeded 条件が残っている場合のみ restart する。
      # kubectl apply で spec が変わっていれば新しい rollout が既に開始されているため、
      # 条件が "ProgressDeadlineExceeded" の場合だけ restart して余分な二重 rollout を防ぐ。
      ansible.builtin.shell: >
        kubectl get deployment cloudflared -n cloudflared
        -o jsonpath='{.status.conditions[?(@.type=="Progressing")].reason}'
        | grep -q ProgressDeadlineExceeded
        && kubectl rollout restart deployment/cloudflared -n cloudflared
        || true

    - name: cloudflared が Ready になるまで待機
      ansible.builtin.command: >
        kubectl rollout status deployment/cloudflared
        -n cloudflared --timeout=240s


# ============================================================
# Play 5: kubeconfig を手元に取得
# ============================================================
- name: kubeconfig を手元に取得
  hosts: k3s_server
  run_once: true
  become: true
  tasks:
    - name: kubeconfig をフェッチ
      ansible.builtin.fetch:
        src: /etc/rancher/k3s/k3s.yaml
        dest: "{{ playbook_dir }}/../../kubeconfig"
        flat: true

    - name: kubeconfig のサーバーアドレスを Tailscale IP に書き換え
      delegate_to: localhost
      become: false   # ローカルファイルへの書き換えに sudo は不要
      ansible.builtin.replace:
        path: "{{ playbook_dir }}/../../kubeconfig"
        regexp: 'https://127\.0\.0\.1:6443'
        replace: "https://{{ ansible_host }}:6443"

    - name: kubeconfig を Infisical に登録 (Single Source of Truth)
      delegate_to: localhost
      become: false
      ansible.builtin.shell: |
        KUBECONFIG_CONTENT=$(cat {{ playbook_dir }}/../../kubeconfig)
        infisical secrets set --env=prod KUBECONFIG="$KUBECONFIG_CONTENT"
      no_log: true

    - name: ローカルの kubeconfig を無効化 (Infisical が Single Source of Truth のため)
      delegate_to: localhost
      become: false
      ansible.builtin.copy:
        dest: "{{ playbook_dir }}/../../kubeconfig"
        content: |
          # ============================================================
          # kubeconfig [DISABLED]
          # ============================================================
          # DO NOT USE THIS FILE. USE INFISICAL INSTEAD.
          # RUN commands via Makefile (e.g., make kubectl ARGS="get pods -A")
          # ============================================================
          apiVersion: v1
          kind: Config
          clusters:
          - cluster:
              server: https://do-not-use-this-file.use-infisical.invalid
            name: do-not-use
          contexts:
          - context:
              cluster: do-not-use
              user: do-not-use
            name: do-not-use
          current-context: do-not-use
          users:
          - name: do-not-use
            user: {}


# ============================================================
# Play 6: ArgoCD の初期 bootstrap
# ============================================================
- name: ArgoCD の初期 bootstrap
  hosts: k3s_server
  run_once: true
  become: true
  tasks:
    - name: ArgoCD namespace 作成
      ansible.builtin.shell: >
        kubectl create namespace argocd --dry-run=client -o yaml
        | kubectl apply -f -

    - name: ArgoCD インストール
      # --server-side: ArgoCD の CRD が大きく last-applied-configuration アノテーションが
      # 262144 バイト制限を超えるため、Server-Side Apply を使用する
      # --force-conflicts: 初回 client-side apply との field ownership 競合を解消する
      # バージョンは明示固定 (stable は移動タグのため再実行ごとに無意識アップグレードされる。
      # 2026-06-19: stable 経由で v3.4.4 に上がり configmap informer のラベル要件変更で
      # argocd-cm/argocd-rbac-cm が見えなくなり全コンポーネントが crash した実績あり)
      ansible.builtin.command: >
        kubectl apply -n argocd --server-side --force-conflicts
        -f https://raw.githubusercontent.com/argoproj/argo-cd/v3.4.4/manifests/install.yaml

    - name: ArgoCD が Ready になるまで待機
      ansible.builtin.command: >
        kubectl rollout status deployment/argocd-server
        -n argocd --timeout=300s

    - name: infisical-auth Secret を作成 (ESO を経由しない唯一の Secret)
      # この Secret だけは ESO を経由せず直接 kubectl apply で作成する
      # ClusterSecretStore (universalAuthCredentials) に合わせて
      # clientId / clientSecret キーで登録する (serviceToken 形式ではない)
      ansible.builtin.shell: >
        kubectl create secret generic infisical-auth
        --from-literal=clientId={{ lookup('env', 'INFISICAL_CLIENT_ID') }}
        --from-literal=clientSecret={{ lookup('env', 'INFISICAL_CLIENT_SECRET') }}
        -n argocd
        --dry-run=client -o yaml
        | kubectl apply -f -
      no_log: true

    - name: GitHub Deploy Key を ArgoCD Repository Secret として登録
      # プライベートリポジトリへのアクセスに必要
      # Deploy Key は GitHub → Settings → Deploy keys で生成・登録すること
      # 秘密鍵は Infisical の ARGOCD_GITHUB_DEPLOY_KEY に保存
      ansible.builtin.shell: |
        kubectl create secret generic aramakisai-infra-repo \
          --from-literal=type=git \
          --from-literal=url=git@github.com:aramakisai/aramakisai-infra.git \
          --from-literal=sshPrivateKey="{{ lookup('env', 'ARGOCD_GITHUB_DEPLOY_KEY') }}" \
          -n argocd \
          --dry-run=client -o yaml \
          | kubectl label --local -f - argocd.argoproj.io/secret-type=repository -o yaml \
          | kubectl apply -f -
      no_log: true

    - name: root.yaml の repoURL を SSH 形式に確認 (念のため)
      # root.yaml は SSH URL を使うこと:
      #   git@github.com:aramakisai/aramakisai-infra.git
      # HTTPS + PAT でもよいが Deploy Key の場合は SSH URL が必要
      ansible.builtin.debug:
        msg: "repoURL は git@github.com:aramakisai/aramakisai-infra.git を使用すること"

    - name: App of Apps (root.yaml) をノードに転送
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../../gitops/root.yaml"
        dest: /tmp/root.yaml

    - name: App of Apps (root.yaml) を適用
      ansible.builtin.command: kubectl apply -n argocd -f /tmp/root.yaml
      # 適用後は ArgoCD が自律的に sync を開始:
      #   wave: -1  ESO (Helm Chart) + ClusterSecretStore
      #   wave: 0   Authentik, Directus, mailserver, cloudflared (adopt), ...
      # cloudflared は既に稼働しているため ArgoCD が同名リソースを adopt する
