repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: \.md$
      - id: end-of-file-fixer
        exclude: \.md$
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-merge-conflict
      - id: mixed-line-ending
        args: [--fix=lf]

  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.99.4
    hooks:
      - id: terraform_fmt
      - id: terraform_validate

  - repo: https://github.com/adrienverge/yamllint
    rev: v1.35.1
    hooks:
      - id: yamllint
        args: [-c=.yamllint.yaml]

  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck

  - repo: local
    hooks:
      - id: ansible-lint
        name: Ansible Lint
        entry: ansible-lint
        language: system
        files: ^ansible/
        types: [yaml]
        pass_filenames: false

      - id: kubeconform
        name: kubeconform
        entry: kubeconform
        args:
          - -strict
          - -ignore-missing-schemas
          - -kubernetes-version
          - "1.32.3"
        language: system
        files: ^gitops/manifests/.*\.yaml$
        exclude: /kustomization\.yaml$
        types: [yaml]

      - id: check-confidential-info
        name: Check Confidential Info
        entry: uv run python scripts/check-confidential-info.py
        language: system
        files: \.(py|sh|yaml|yml|json|md|txt|tf|tfvars|cfg)$
        pass_filenames: true

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.23.0
    hooks:
      - id: gitleaks
        args: ["--config=.gitleaks.toml"]
