name: Intrusion Response

on:
  workflow_dispatch:
    inputs:
      namespace:
        description: '対象 namespace (必須、例: prod)'
        required: true
        type: string
      pod_selector:
        description: 'Pod セレクター (任意、空の場合は namespace 全 Pod を対象)'
        required: false
        default: ''
        type: string

concurrency:
  group: intrusion-response
  cancel-in-progress: false

permissions:
  contents: read
  actions: write

jobs:
  forensics:
    name: Forensics — 証拠保全
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Validate inputs
        run: |
          if [[ -z "${{ inputs.namespace }}" ]]; then
            echo "::error::namespace が空です。対象 namespace を指定してください"
            exit 1
          fi

      - uses: actions/checkout@v4

      - name: Install kubectl
        run: |
          KUBECTL_VERSION=$(curl -Ls https://dl.k8s.io/release/stable.txt)
          curl -LO "https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/amd64/kubectl"
          chmod +x kubectl && sudo mv kubectl /usr/local/bin/

      - name: Collect forensics data
        env:
          INFISICAL_CLIENT_ID: ${{ secrets.INFISICAL_CLIENT_ID }}
          INFISICAL_CLIENT_SECRET: ${{ secrets.INFISICAL_CLIENT_SECRET }}
          INFISICAL_PROJECT_ID: ${{ secrets.INFISICAL_PROJECT_ID }}
          IR_NAMESPACE: ${{ inputs.namespace }}
          IR_POD_SELECTOR: ${{ inputs.pod_selector }}
        run: |
          KUBECONFIG_FILE="/tmp/kubeconfig-ir"
          mkdir -p /tmp/forensics

          # Infisical REST API で ACCESS_TOKEN を取得
          _ACCESS_TOKEN=$(curl -sf -X POST \
            "https://app.infisical.com/api/v1/auth/universal-auth/login" \
            -H "Content-Type: application/json" \
            -d "{\"clientId\":\"${INFISICAL_CLIENT_ID}\",\"clientSecret\":\"${INFISICAL_CLIENT_SECRET}\"}" \
            | jq -r '.accessToken') \
            || { echo "::error::Infisical 認証に失敗しました"; exit 1; }

          # KUBECONFIG を取得
          curl -sf \
            "https://app.infisical.com/api/v3/secrets/raw/KUBECONFIG?workspaceId=${INFISICAL_PROJECT_ID}&environment=prod" \
            -H "Authorization: Bearer ${_ACCESS_TOKEN}" \
            | jq -r '.secret.secretValue' > "${KUBECONFIG_FILE}" \
            || { echo "::error::KUBECONFIG の取得に失敗しました"; exit 1; }
          chmod 600 "${KUBECONFIG_FILE}"

          # Tailscale API Key と Tailnet を Infisical から取得
          _TS_API_KEY=$(curl -sf \
            "https://app.infisical.com/api/v3/secrets/raw/TAILSCALE_API_KEY?workspaceId=${INFISICAL_PROJECT_ID}&environment=prod" \
            -H "Authorization: Bearer ${_ACCESS_TOKEN}" \
            | jq -r '.secret.secretValue') \
            || { echo "::error::TAILSCALE_API_KEY の取得に失敗しました"; exit 1; }
          echo "::add-mask::${_TS_API_KEY}"

          _TS_TAILNET=$(curl -sf \
            "https://app.infisical.com/api/v3/secrets/raw/TAILSCALE_TAILNET?workspaceId=${INFISICAL_PROJECT_ID}&environment=prod" \
            -H "Authorization: Bearer ${_ACCESS_TOKEN}" \
            | jq -r '.secret.secretValue') \
            || { echo "::error::TAILSCALE_TAILNET の取得に失敗しました"; exit 1; }

          # Tailscale API で prod-node-1 の Tailscale IP を取得 (接続不要)
          _TS_IP=$(curl -sf \
            "https://api.tailscale.com/api/v2/tailnet/${_TS_TAILNET}/devices" \
            -u "${_TS_API_KEY}:" \
            | jq -r '.devices[] | select(.hostname == "prod-node-1") | .addresses[0]' 2>/dev/null \
            || echo "")
          echo "prod-node-1 Tailscale IP: ${_TS_IP:-NOT FOUND}"

          if [[ -n "${_TS_IP}" ]] && [[ "${_TS_IP}" =~ ^100\. ]]; then
            # 一時 Auth Key を生成 (10分有効, ephemeral, preauthorized)
            _TS_AUTH_KEY=$(curl -sf -X POST \
              "https://api.tailscale.com/api/v2/tailnet/${_TS_TAILNET}/keys" \
              -u "${_TS_API_KEY}:" \
              -H "Content-Type: application/json" \
              -d '{"capabilities":{"devices":{"create":{"reusable":false,"ephemeral":true,"preauthorized":true}}},"expirySeconds":600}' \
              | jq -r '.key') \
              || { echo "::warning::Tailscale Auth Key 生成に失敗しました"; }
            echo "::add-mask::${_TS_AUTH_KEY}"

            if [[ -n "${_TS_AUTH_KEY}" ]]; then
              # tailscale をインストールして Tailnet に接続
              curl -fsSL https://tailscale.com/install.sh | sh 2>/dev/null
              sudo tailscaled --state=mem: 2>/tmp/tailscaled.log &
              sleep 3
              if sudo tailscale up --authkey="${_TS_AUTH_KEY}" --accept-routes \
                --hostname="gh-ci-ir-${GITHUB_RUN_ID}" 2>&1; then
                echo "Tailscale 接続完了"
              else
                echo "::warning::tailscale up に失敗しました (kubectl も失敗します)"
                tail -20 /tmp/tailscaled.log || true
              fi
            fi

            # KUBECONFIG の hostname を Tailscale IP に置換
            sed -i "s/prod-node-1/${_TS_IP}/g" "${KUBECONFIG_FILE}"
            echo "KUBECONFIG: prod-node-1 → ${_TS_IP} に置換"
          else
            echo "::warning::prod-node-1 の Tailscale IP が取得できませんでした"
          fi

          kubectl --kubeconfig="${KUBECONFIG_FILE}" logs \
            -n "${IR_NAMESPACE}" --all-containers --tail=1000 \
            > /tmp/forensics/pod-logs.txt 2>&1 \
            || echo "::warning::Pod ログの取得に失敗しました (部分取得の可能性あり)"

          kubectl --kubeconfig="${KUBECONFIG_FILE}" get events \
            -n "${IR_NAMESPACE}" --sort-by='.lastTimestamp' \
            > /tmp/forensics/events.txt 2>&1 \
            || echo "::warning::Events の取得に失敗しました"

          kubectl --kubeconfig="${KUBECONFIG_FILE}" get networkpolicy \
            -n "${IR_NAMESPACE}" -o yaml \
            > /tmp/forensics/networkpolicies.yaml 2>&1 \
            || echo "::warning::NetworkPolicy の取得に失敗しました"

          kubectl --kubeconfig="${KUBECONFIG_FILE}" get pods \
            -n "${IR_NAMESPACE}" -o wide \
            > /tmp/forensics/pods.txt 2>&1 \
            || echo "::warning::Pod 一覧の取得に失敗しました"

          echo "namespace=${IR_NAMESPACE}" > /tmp/forensics/metadata.txt
          echo "pod_selector=${IR_POD_SELECTOR}" >> /tmp/forensics/metadata.txt
          echo "collected_at=$(date -u '+%Y-%m-%dT%H:%M:%SZ')" >> /tmp/forensics/metadata.txt

      - name: Upload forensics artifacts
        uses: actions/upload-artifact@v4
        with:
          name: forensics-${{ inputs.namespace }}-${{ github.run_id }}
          path: /tmp/forensics/
          retention-days: 90

  isolate:
    name: Isolate — ネットワーク遮断
    runs-on: ubuntu-latest
    needs: forensics
    timeout-minutes: 10

    steps:
      - name: Install kubectl
        run: |
          KUBECTL_VERSION=$(curl -Ls https://dl.k8s.io/release/stable.txt)
          curl -LO "https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/amd64/kubectl"
          chmod +x kubectl && sudo mv kubectl /usr/local/bin/

      - name: Apply isolation NetworkPolicy
        env:
          INFISICAL_CLIENT_ID: ${{ secrets.INFISICAL_CLIENT_ID }}
          INFISICAL_CLIENT_SECRET: ${{ secrets.INFISICAL_CLIENT_SECRET }}
          INFISICAL_PROJECT_ID: ${{ secrets.INFISICAL_PROJECT_ID }}
          IR_NAMESPACE: ${{ inputs.namespace }}
        run: |
          KUBECONFIG_FILE="/tmp/kubeconfig-ir"

          # Infisical REST API で ACCESS_TOKEN を取得
          _ACCESS_TOKEN=$(curl -sf -X POST \
            "https://app.infisical.com/api/v1/auth/universal-auth/login" \
            -H "Content-Type: application/json" \
            -d "{\"clientId\":\"${INFISICAL_CLIENT_ID}\",\"clientSecret\":\"${INFISICAL_CLIENT_SECRET}\"}" \
            | jq -r '.accessToken') \
            || { echo "::error::Infisical 認証に失敗しました"; exit 1; }

          # KUBECONFIG を取得
          curl -sf \
            "https://app.infisical.com/api/v3/secrets/raw/KUBECONFIG?workspaceId=${INFISICAL_PROJECT_ID}&environment=prod" \
            -H "Authorization: Bearer ${_ACCESS_TOKEN}" \
            | jq -r '.secret.secretValue' > "${KUBECONFIG_FILE}" \
            || { echo "::error::KUBECONFIG の取得に失敗しました"; exit 1; }
          chmod 600 "${KUBECONFIG_FILE}"

          # Tailscale API Key と Tailnet を Infisical から取得
          _TS_API_KEY=$(curl -sf \
            "https://app.infisical.com/api/v3/secrets/raw/TAILSCALE_API_KEY?workspaceId=${INFISICAL_PROJECT_ID}&environment=prod" \
            -H "Authorization: Bearer ${_ACCESS_TOKEN}" \
            | jq -r '.secret.secretValue') \
            || { echo "::error::TAILSCALE_API_KEY の取得に失敗しました"; exit 1; }
          echo "::add-mask::${_TS_API_KEY}"

          _TS_TAILNET=$(curl -sf \
            "https://app.infisical.com/api/v3/secrets/raw/TAILSCALE_TAILNET?workspaceId=${INFISICAL_PROJECT_ID}&environment=prod" \
            -H "Authorization: Bearer ${_ACCESS_TOKEN}" \
            | jq -r '.secret.secretValue') \
            || { echo "::error::TAILSCALE_TAILNET の取得に失敗しました"; exit 1; }

          # Tailscale API で prod-node-1 の Tailscale IP を取得 (接続不要)
          _TS_IP=$(curl -sf \
            "https://api.tailscale.com/api/v2/tailnet/${_TS_TAILNET}/devices" \
            -u "${_TS_API_KEY}:" \
            | jq -r '.devices[] | select(.hostname == "prod-node-1") | .addresses[0]' 2>/dev/null \
            || echo "")
          echo "prod-node-1 Tailscale IP: ${_TS_IP:-NOT FOUND}"

          if [[ -n "${_TS_IP}" ]] && [[ "${_TS_IP}" =~ ^100\. ]]; then
            # 一時 Auth Key を生成 (10分有効, ephemeral, preauthorized)
            _TS_AUTH_KEY=$(curl -sf -X POST \
              "https://api.tailscale.com/api/v2/tailnet/${_TS_TAILNET}/keys" \
              -u "${_TS_API_KEY}:" \
              -H "Content-Type: application/json" \
              -d '{"capabilities":{"devices":{"create":{"reusable":false,"ephemeral":true,"preauthorized":true}}},"expirySeconds":600}' \
              | jq -r '.key') \
              || { echo "::error::Tailscale Auth Key 生成に失敗しました"; exit 1; }
            echo "::add-mask::${_TS_AUTH_KEY}"

            # tailscale をインストールして Tailnet に接続
            curl -fsSL https://tailscale.com/install.sh | sh 2>/dev/null
            sudo tailscaled --state=mem: 2>/tmp/tailscaled.log &
            sleep 3
            sudo tailscale up --authkey="${_TS_AUTH_KEY}" --accept-routes \
              --hostname="gh-ci-ir-${GITHUB_RUN_ID}" 2>&1 \
              || { echo "::error::tailscale up に失敗しました"; tail -20 /tmp/tailscaled.log; exit 1; }
            echo "Tailscale 接続完了"

            # KUBECONFIG の hostname を Tailscale IP に置換
            sed -i "s/prod-node-1/${_TS_IP}/g" "${KUBECONFIG_FILE}"
            echo "KUBECONFIG: prod-node-1 → ${_TS_IP} に置換"
          else
            echo "::error::prod-node-1 の Tailscale IP が取得できませんでした"
            exit 1
          fi

          kubectl --kubeconfig="${KUBECONFIG_FILE}" apply --validate=false -f - <<EOF
          apiVersion: networking.k8s.io/v1
          kind: NetworkPolicy
          metadata:
            name: intrusion-isolation
            namespace: ${IR_NAMESPACE}
          spec:
            podSelector: {}
            policyTypes:
              - Ingress
              - Egress
          EOF

          echo "NetworkPolicy 適用完了: namespace=${IR_NAMESPACE} の全 Pod の ingress/egress を遮断しました"

  notify:
    name: Notify — Discord ローテーション通知
    runs-on: ubuntu-latest
    needs: isolate
    timeout-minutes: 5

    steps:
      - name: Send Discord notification
        run: |
          NAMESPACE="${{ inputs.namespace }}"
          POD_SELECTOR="${{ inputs.pod_selector }}"
          PS_DISPLAY="${POD_SELECTOR:-全 Pod}"
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          BODY=$(jq -n \
            --arg ns "${NAMESPACE}" \
            --arg ps "${PS_DISPLAY}" \
            --arg url "${RUN_URL}" \
            '{
              content: ("🚨 **侵入対応実行完了** 🚨\n\n**対象 namespace**: `" + $ns + "`\n**Pod セレクター**: `" + $ps + "`\n**実行ログ**: " + $url + "\n\n**実施済み**:\n• forensics 保存済み (GitHub Actions Artifacts 90日保持)\n• NetworkPolicy 適用済み (ingress/egress 全遮断)\n\n**ローテーション必須シークレット一覧 (Infisical)**:\n`HCLOUD_TOKEN` `CLOUDFLARE_API_TOKEN` `TAILSCALE_OAUTH_CLIENT_ID` `TAILSCALE_OAUTH_CLIENT_SECRET`\n`TF_VAR_k3s_token` `TF_VAR_tailscale_api_key` `TF_VAR_authentik_cf_client_id` `TF_VAR_authentik_cf_client_secret`\n`K3S_TOKEN` `CLOUDFLARE_TUNNEL_TOKEN` `CLOUDFLARE_TUNNEL_ID` `INFISICAL_CLIENT_ID` `INFISICAL_CLIENT_SECRET`\n`ARGOCD_GITHUB_DEPLOY_KEY` `TFC_API_TOKEN` `TFC_WORKSPACE_ID` `TAILSCALE_API_KEY` `TAILSCALE_TAILNET`\n`AUTHENTIK_SECRET_KEY` `AUTHENTIK_DB_PASSWORD` `NOREPLY_SMTP_PASSWORD`\n`MAILSERVER_LDAP_BIND_PASSWORD` `MAILSERVER_DKIM_KEY` `MAILSERVER_RESTIC_PASSWORD` `B2_APPLICATION_KEY_ID` `B2_APPLICATION_KEY`\n`DIRECTUS_SECRET` `DIRECTUS_ADMIN_EMAIL` `DIRECTUS_ADMIN_PASSWORD` `DIRECTUS_DB_PASSWORD`\n`LOKI_URL` `LOKI_USERNAME` `LOKI_PASSWORD` `PROMETHEUS_REMOTE_WRITE_URL` `PROMETHEUS_USERNAME` `PROMETHEUS_PASSWORD`\n`MAIL_OAUTH2_CLIENT_SECRET` `ROUNDCUBE_DES_KEY`\n`TF_VAR_authentik_room_presence_client_secret` `PRESENCE_AUTH_SECRET` `PRESENCE_AUTHENTIK_API_TOKEN` `PRESENCE_RESET_SECRET` `PRESENCE_DISCORD_BOT_TOKEN`\n`VAULTWARDEN_ADMIN_TOKEN` `VAULTWARDEN_DB_PASSWORD` `VAULTWARDEN_OIDC_CLIENT_ID` `VAULTWARDEN_OIDC_CLIENT_SECRET` `VAULTWARDEN_RESTIC_PASSWORD`\n`VAULTWARDEN_RBAC_SYNC_AUTHENTIK_API_TOKEN` `VAULTWARDEN_RBAC_SYNC_SERVICE_ACCOUNT_CLIENT_ID` `VAULTWARDEN_RBAC_SYNC_SERVICE_ACCOUNT_CLIENT_SECRET`\n`TF_VAR_vaultwarden_rbac_sync_trigger_token` `DISCORD_OPS_WEBHOOK_URL`\n\n**GitHub Actions Secrets もローテーション**:\n`INFISICAL_CLIENT_ID` `INFISICAL_CLIENT_SECRET`\n\n⚠️ **次のアクション**:\n1. 上記すべてのシークレットを Infisical でローテーション\n2. GitHub Actions Secrets の `INFISICAL_CLIENT_ID`/`INFISICAL_CLIENT_SECRET` もローテーション\n3. **ローテーション完了後**に `dr-recovery` を手動 dispatch\n\n🔴 **ローテーション完了前に `dr-recovery` を実行しないこと**")
            }')

          curl -sf -X POST "${{ secrets.DISCORD_OPS_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "${BODY}" \
            || { echo "::error::Discord 通知の送信に失敗しました"; exit 1; }
