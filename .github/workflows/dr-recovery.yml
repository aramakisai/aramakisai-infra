name: DR Recovery

on:
  repository_dispatch:
    types: [dr-recovery]

# 同時に複数の復旧が走るのを防ぐ
concurrency:
  group: dr-recovery
  cancel-in-progress: false

jobs:
  recover:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      # GitHub Actions ランナーを tailnet に参加させる (Ansible SSH 経路の確保)
      # 前提: Tailscale ACL に tag:ci が定義されていること
      - name: Setup Tailscale
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Install tools
        run: |
          # Ansible
          pip install --quiet ansible

          # kubectl
          KUBECTL_VERSION=$(curl -Ls https://dl.k8s.io/release/stable.txt)
          curl -LO "https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/amd64/kubectl"
          chmod +x kubectl && sudo mv kubectl /usr/local/bin/

          # Infisical CLI
          curl -1sLf 'https://dl.cloudsmith.io/public/infisical/infisical-cli/setup.deb.sh' | sudo -E bash
          sudo apt-get install -y infisical

      - name: Run recovery
        env:
          INFISICAL_CLIENT_ID: ${{ secrets.INFISICAL_CLIENT_ID }}
          INFISICAL_CLIENT_SECRET: ${{ secrets.INFISICAL_CLIENT_SECRET }}
          INFISICAL_PROJECT_ID: ${{ secrets.INFISICAL_PROJECT_ID }}
        run: |
          infisical run --env=prod -- bash .github/scripts/recovery.sh

      - name: Notify failure
        if: failure()
        run: |
          echo "::error::DR 復旧が失敗しました。手動フォールバック手順を参照: docs/dr-runbook.md"
